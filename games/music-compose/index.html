<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Music Compose</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#06050e;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrl{position:fixed;top:8px;right:8px;display:flex;gap:8px;z-index:5;}
#ctrl button{width:38px;height:38px;border-radius:10px;border:1.5px solid rgba(140,120,255,.4);background:rgba(10,8,22,.82);color:#e8e4ff;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
#ctrl button:active{background:rgba(80,60,180,.6);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrl">
<button id="btnHint" title="Hint">💡</button>
<button id="btnClear" title="Clear grid">⌫</button>
<button id="btnMute" title="Mute">🔊</button>
<button id="btnPause" title="Pause">⏸</button>
</div>
<div id="hint">Click grid cells to toggle notes &middot; PLAY to listen &middot; match the target melody &middot; SUBMIT when ready</div>
<script>
'use strict';
// Music Compose (#48)
// A simple step-sequencer grid (8 steps x 6 pitches, growing with round).
// A short "target melody" plays; recreate it by clicking cells.
// 8 rounds. Theme: composing your own life song, not following
// someone else's sheet music.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const STEPS_BASE=8,ROWS=6,TOTAL=8;
const FREQS=[261.63,293.66,329.63,349.23,392.00,440.00]; // C D E F G A
const NOTE_NAMES=['C','D','E','F','G','A'];
const GX=140,GY=110,CELL_W=88,CELL_H=52;
const BT_PLAY_X=GX+STEPS_BASE*CELL_W+16,BT_Y=GY+40;
const BT_W=120,BT_H=48,BT_GAP=18;
const BT_MINE_Y=BT_Y+BT_H+BT_GAP;
const BT_SUBMIT_X=BT_PLAY_X,BT_SUBMIT_Y=BT_MINE_Y+BT_H+BT_GAP;
const BT_HINT_X=BT_PLAY_X,BT_HINT_Y=BT_SUBMIT_Y+BT_H+BT_GAP;
let STEPS=STEPS_BASE;
function bestKey(){return 'musicCompose.best';}
function loadBest(){try{const v=localStorage.getItem(bestKey());return v?parseInt(v,10)||0:0;}catch(e){return 0;}}
function saveBest(v){try{localStorage.setItem(bestKey(),String(v));}catch(e){}}
const game={state:'title',time:0,round:1,score:0,best:loadBest(),lives:3,playHead:-1,playing:false,paused:false,muted:false,
  correctAnim:0,wrongAnim:0,shakeT:0,streak:0,bestStreak:0,roundsPerfect:0,roundsPassed:0,hintsUsed:0,
  popups:[],particles:[],roundTimer:0,firstTry:true,lowLifePulse:0};
let grid=[],target=[],rng,playInterval=null;
function emptyGrid(rows,steps){return Array.from({length:rows},()=>Array(steps).fill(0));}
function stepsForRound(r){return r>=6?STEPS_BASE+1:STEPS_BASE;}
function buildRound(r){
  rng=seeded(r*4507+29);
  STEPS=clamp(stepsForRound(r),STEPS_BASE,STEPS_BASE+1);
  target=emptyGrid(ROWS,STEPS);
  const activeCap=clamp(2+Math.floor(r/2),2,ROWS-1);
  const dualChance=clamp(0.25+r*0.03,0.25,0.55);
  let active=0;
  for(let s=0;s<STEPS;s++){
    const row=Math.floor(rng()*ROWS);
    target[row][s]=1;
    if(rng()<dualChance&&active<activeCap){
      const r2=(row+1+Math.floor(rng()*(ROWS-1)))%ROWS;
      target[r2][s]=1;active++;
    }
  }
  grid=emptyGrid(ROWS,STEPS);
  game.state='playing';
  game.playHead=-1;
  game.correctAnim=0;
  game.wrongAnim=0;
  game.roundTimer=0;
  game.firstTry=true;
}
function matchThreshold(r){return clamp(0.75+Math.floor((r-1)/3)*0.03,0.75,0.85);}
function resetGame(){
  game.round=1;game.score=0;game.shakeT=0;game.lives=3;game.streak=0;game.bestStreak=0;
  game.roundsPerfect=0;game.roundsPassed=0;game.hintsUsed=0;game.popups=[];game.particles=[];
  game.state='playing';game.paused=false;
  buildRound(1);
}
function toggleCell(row,col){
  if(game.paused||game.state!=='playing')return;
  grid[row][col]=grid[row][col]?0:1;
  playNote(row);
  const correctCell=!!target[row][col];
  spawnParticles(GX+col*CELL_W+CELL_W/2,GY+row*CELL_H+CELL_H/2,correctCell&&grid[row][col]);
}
function cellAt(mx,my){const col=Math.floor((mx-GX)/CELL_W),row=Math.floor((my-GY)/CELL_H);if(col>=0&&col<STEPS&&row>=0&&row<ROWS)return{row,col};return null;}
function playNote(row){tone(FREQS[ROWS-1-row],0.12,'sine',0.05);}
function stopSequence(){if(playInterval){clearInterval(playInterval);playInterval=null;}game.playing=false;game.playHead=-1;}
function playSequence(g,cb){
  if(game.playing){stopSequence();return;}
  let s=0;game.playing=true;
  if(playInterval)clearInterval(playInterval);
  playInterval=setInterval(()=>{
    if(game.paused)return;
    game.playHead=s;
    for(let r=0;r<ROWS;r++){if(g[r][s])playNote(r);}
    s++;
    if(s>=STEPS){clearInterval(playInterval);playInterval=null;game.playing=false;game.playHead=-1;if(cb)cb();}
  },220);
}
function spawnParticles(x,y,good){
  const n=8;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i)/n+Math.random()*0.4;
    const sp=60+Math.random()*60;
    game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:400,maxLife:400,good});
  }
}
function spawnPopup(text,x,y,good){game.popups.push({text,x,y,life:900,maxLife:900,good});}
function clearGrid(){if(game.state!=='playing'||game.playing)return;grid=emptyGrid(ROWS,STEPS);}
function useHint(){
  if(game.state!=='playing'||game.playing)return;
  for(let r=0;r<ROWS;r++)for(let s=0;s<STEPS;s++){
    if(target[r][s]&&!grid[r][s]){
      grid[r][s]=1;
      game.score=Math.max(0,game.score-2);
      game.hintsUsed++;
      spawnParticles(GX+s*CELL_W+CELL_W/2,GY+r*CELL_H+CELL_H/2,true);
      return;
    }
  }
}
function submit(){
  if(game.playing||game.paused||game.state!=='playing')return;
  let correct=0,total=0;
  for(let r=0;r<ROWS;r++)for(let s=0;s<STEPS;s++){if(target[r][s])total++;if(target[r][s]&&grid[r][s])correct++;}
  const pct=total>0?correct/total:0;
  const thresh=matchThreshold(game.round);
  if(pct>=thresh){
    let base=Math.round(pct*10);
    if(pct>=0.999){base+=5;game.roundsPerfect++;}
    game.streak=game.firstTry?game.streak+1:0;
    if(game.firstTry)game.roundsPassed++;
    game.bestStreak=Math.max(game.bestStreak,game.streak);
    const mult=1+Math.min(game.streak,5)*0.1;
    const gained=Math.round(base*mult);
    game.score+=gained;
    game.correctAnim=700;
    spawnPopup('+'+gained,W/2,GY-30,true);
    sndWin2();
    setTimeout(()=>{
      if(game.round>=TOTAL){
        if(game.score>game.best){game.best=game.score;saveBest(game.best);}
        sndWin();
        game.state='won';
      }else{
        game.round++;
        buildRound(game.round);
      }
    },700);
  }else{
    game.wrongAnim=500;
    game.shakeT=300;
    game.streak=0;
    game.firstTry=false;
    game.lives=Math.max(0,game.lives-1);
    spawnPopup('MISS',W/2,GY-30,false);
    sndBad();
    if(game.lives<=0){
      setTimeout(()=>{
        if(game.score>game.best){game.best=game.score;saveBest(game.best);}
        game.state='gameover';
      },500);
    }
  }
}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(game.muted)return;
  const a=AC();if(!a)return;
  try{
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||0.15)+0.02);
  }catch(e){}
}
const sndBad=()=>tone(200,0.3,'sawtooth',0.05);
const sndWin2=()=>{[528,660,792].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.06),i*70));};
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};
function togglePause(){
  if(game.state!=='playing'&&game.state!=='gameover')return;
  if(game.state==='gameover')return;
  game.paused=!game.paused;
}
function toggleMute(){game.muted=!game.muted;}
function update(dt){
  dt=clamp(dt,0,48);
  if(game.paused)return;
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.correctAnim>0)game.correctAnim=Math.max(0,game.correctAnim-dt);
  if(game.wrongAnim>0)game.wrongAnim=Math.max(0,game.wrongAnim-dt);
  if(game.state==='playing'&&!game.playing)game.roundTimer+=dt;
  game.lowLifePulse+=dt;
  for(let i=game.particles.length-1;i>=0;i--){
    const p=game.particles[i];
    p.life-=dt;
    if(p.life<=0){game.particles.splice(i,1);continue;}
    p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;p.vy+=300*dt/1000;
  }
  for(let i=game.popups.length-1;i>=0;i--){
    const p=game.popups[i];
    p.life-=dt;
    if(p.life<=0){game.popups.splice(i,1);continue;}
    p.y-=dt*0.03;
  }
}
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#06050e'],[1,'#04030b']]);ctx.fillRect(0,0,W,H);}
function drawGrid(){
  for(let r=0;r<ROWS;r++){const y=GY+r*CELL_H;ctx.fillStyle='rgba(200,220,255,.4)';ctx.font='11px Arial';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(NOTE_NAMES[ROWS-1-r],GX-8,y+CELL_H/2);}
  for(let r=0;r<ROWS;r++)for(let s=0;s<STEPS;s++){
    const x=GX+s*CELL_W,y=GY+r*CELL_H;const on=grid[r][s];const isHead=s===game.playHead;
    ctx.fillStyle=isHead?'rgba(255,220,80,.15)':on?'rgba(100,160,255,.15)':'rgba(30,40,70,.4)';
    rr(x+2,y+2,CELL_W-4,CELL_H-4,6);ctx.fill();
    if(on){
      ctx.shadowColor='rgba(100,160,255,.5)';ctx.shadowBlur=8;
      ctx.fillStyle='rgba(100,160,255,.85)';rr(x+6,y+6,CELL_W-12,CELL_H-12,4);ctx.fill();ctx.shadowBlur=0;
      // filled dot glyph for colorblind accessibility
      ctx.beginPath();ctx.arc(x+CELL_W-14,y+CELL_H-12,4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();
    }else{
      // empty ring glyph
      ctx.beginPath();ctx.arc(x+CELL_W-14,y+CELL_H-12,4,0,Math.PI*2);ctx.strokeStyle='rgba(160,180,220,.35)';ctx.lineWidth=1.2;ctx.stroke();
    }
    if(isHead){
      ctx.beginPath();ctx.moveTo(x+CELL_W/2,y+3);ctx.lineTo(x+CELL_W/2-5,y+10);ctx.lineTo(x+CELL_W/2+5,y+10);ctx.closePath();
      ctx.fillStyle='rgba(255,220,80,.9)';ctx.fill();
    }
    ctx.strokeStyle=isHead?'rgba(255,220,80,.4)':'rgba(60,80,140,.3)';ctx.lineWidth=1;rr(x+2,y+2,CELL_W-4,CELL_H-4,6);ctx.stroke();
  }
}
function drawBtn(x,y,w,h,label,fill,stroke,textColor,disabled){
  ctx.globalAlpha=disabled?0.4:1;
  ctx.fillStyle=fill;rr(x,y,w,h,10);ctx.fill();
  ctx.strokeStyle=stroke;ctx.lineWidth=1.5;rr(x,y,w,h,10);ctx.stroke();
  ctx.fillStyle=textColor;ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2);
  ctx.globalAlpha=1;
}
function drawButtons(){
  drawBtn(BT_PLAY_X,BT_Y,BT_W,BT_H,game.playing?'■ STOP':'▶ MELODY','rgba(20,40,80,.8)','rgba(80,140,255,.5)','rgba(160,200,255,.9)',false);
  drawBtn(BT_PLAY_X,BT_MINE_Y,BT_W,BT_H,game.playing?'■ STOP':'▶ MINE','rgba(20,60,30,.8)','rgba(80,180,100,.5)','rgba(160,220,180,.9)',false);
  const allMatch=()=>{let c=0,t=0;for(let r=0;r<ROWS;r++)for(let s=0;s<STEPS;s++){if(target[r][s])t++;if(target[r][s]&&grid[r][s])c++;}return t>0&&c/t>=matchThreshold(game.round);};
  drawBtn(BT_SUBMIT_X,BT_SUBMIT_Y,BT_W,BT_H,'SUBMIT','rgba(40,80,40,.8)','rgba(100,200,100,.5)','rgba(180,240,180,.9)',game.playing);
  drawBtn(BT_HINT_X,BT_HINT_Y,BT_W,BT_H,'HINT (-2)','rgba(80,60,20,.8)','rgba(220,180,80,.5)','rgba(240,220,160,.9)',game.playing);
}
function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(3,2,7,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#b0a0ff';ctx.font='bold 13px Arial';
  ctx.fillText('Music Compose  Round '+game.round+' / '+TOTAL,18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Match ≥'+Math.round(matchThreshold(game.round)*100)+'% to pass  ·  Streak x'+game.streak,18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Score '+game.score+'  Best '+game.best,W-18,8);
  // lives
  const pulse=game.lives<=1?0.6+0.4*Math.sin(game.lowLifePulse*0.008):1;
  for(let i=0;i<3;i++){
    ctx.globalAlpha=i<game.lives?(game.lives<=1?pulse:1):0.2;
    ctx.fillStyle=i<game.lives?(game.lives<=1?'rgba(255,80,80,.9)':'rgba(255,180,80,.9)'):'rgba(120,120,120,.4)';
    ctx.beginPath();ctx.arc(W-24-i*20,28,6,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}
function drawParticles(){
  for(const p of game.particles){
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.good?'rgba(100,220,140,1)':'rgba(220,90,90,1)';
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawPopups(){
  for(const p of game.popups){
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.good?'rgba(120,240,160,1)':'rgba(240,110,110,1)';
    ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.globalAlpha=1;
}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(3,2,7,.78)';ctx.fillRect(0,0,W,H);
  const pw=560,ph=340,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(10,8,22,.97)'],[1,'rgba(6,5,14,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(140,120,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#b0a0ff';ctx.font='bold 32px Arial';ctx.fillText(title,W/2,py+58);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+94;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=25;}
  ctx.restore();
}
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    let dx=0,dy=0;
    if(game.shakeT>0){const m=game.shakeT/300*5;dx=Math.sin(game.time*.06)*m;dy=Math.cos(game.time*.08)*m;}
    ctx.save();ctx.translate(dx,dy);
    drawBg();
    if(game.state==='playing'||game.state==='paused-visual'){drawGrid();drawButtons();drawParticles();drawPopups();}
    if(game.correctAnim>0){ctx.fillStyle=`rgba(80,220,140,${(game.correctAnim/700*0.25).toFixed(2)})`;ctx.fillRect(0,0,W,H);}
    if(game.wrongAnim>0){ctx.fillStyle=`rgba(220,80,80,${(game.wrongAnim/500*0.25).toFixed(2)})`;ctx.fillRect(0,0,W,H);}
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.state==='title'){
      panelDraw('Music Compose',['Listen to the target melody.','Click grid cells to recreate it.','Press SUBMIT when the threshold is met.','Rounds get denser — accuracy needed rises too.','','Your life song, composed by you.','','Click / tap to begin.']);
    }else if(game.state==='won'){
      panelDraw('Song Complete! ✓',['Score: '+game.score+'   Best: '+game.best,'Rounds perfect: '+game.roundsPerfect+' / '+TOTAL,'Rounds passed first try: '+game.roundsPassed+' / '+TOTAL,'Best streak: x'+game.bestStreak,'Hints used: '+game.hintsUsed,'','Your melody. Your tempo. Your song.','','Click / tap to play again.']);
    }else if(game.state==='gameover'){
      panelDraw('Out of Chances',['Score: '+game.score+'   Best: '+game.best,'Reached round '+game.round+' / '+TOTAL,'Best streak: x'+game.bestStreak,'','Every song has false starts.','That is not the end of the music.','','Click / tap to try again.']);
    }
    if(game.paused&&game.state==='playing'){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff';ctx.font='bold 30px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('PAUSED',W/2,H/2);
    }
    ctx.restore();
  }catch(e){}
}
function pointerDown(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  let px2,py2;
  if(e.touches){px2=(e.touches[0].clientX-rect.left)*sx;py2=(e.touches[0].clientY-rect.top)*sy;}
  else{px2=(e.clientX-rect.left)*sx;py2=(e.clientY-rect.top)*sy;}
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  e.preventDefault();
  if(game.state==='title'||game.state==='won'||game.state==='gameover'){resetGame();return;}
  if(game.state!=='playing')return;
  if(game.paused)return;
  const cell=cellAt(px2,py2);
  if(cell){toggleCell(cell.row,cell.col);return;}
  if(px2>=BT_PLAY_X&&px2<=BT_PLAY_X+BT_W&&py2>=BT_Y&&py2<=BT_Y+BT_H){playSequence(target,null);return;}
  if(px2>=BT_PLAY_X&&px2<=BT_PLAY_X+BT_W&&py2>=BT_MINE_Y&&py2<=BT_MINE_Y+BT_H){playSequence(grid,null);return;}
  if(px2>=BT_SUBMIT_X&&px2<=BT_SUBMIT_X+BT_W&&py2>=BT_SUBMIT_Y&&py2<=BT_SUBMIT_Y+BT_H&&!game.playing){submit();return;}
  if(px2>=BT_HINT_X&&px2<=BT_HINT_X+BT_W&&py2>=BT_HINT_Y&&py2<=BT_HINT_Y+BT_H&&!game.playing){useHint();return;}
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();pointerDown(e);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e);},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.key==='m'||e.key==='M')toggleMute();
  if(e.key==='p'||e.key==='P')togglePause();
  if(e.key==='h'||e.key==='H')useHint();
  if(e.key==='c'||e.key==='C')clearGrid();
});
function wireButtons(){
  const bp=document.getElementById('btnPause');
  const bm=document.getElementById('btnMute');
  const bh=document.getElementById('btnHint');
  const bc=document.getElementById('btnClear');
  if(bp)bp.addEventListener('click',e=>{e.preventDefault();togglePause();bp.textContent=game.paused?'▶':'⏸';});
  if(bm)bm.addEventListener('click',e=>{e.preventDefault();toggleMute();bm.textContent=game.muted?'🔇':'🔊';});
  if(bh)bh.addEventListener('click',e=>{e.preventDefault();useHint();});
  if(bc)bc.addEventListener('click',e=>{e.preventDefault();clearGrid();});
}
if(typeof document!=='undefined'&&document.readyState){
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wireButtons);
  else wireButtons();
}
let last=0;
function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={
  get game(){return game;},
  get grid(){return grid;},
  get target(){return target;},
  get STEPS(){return STEPS;},
  resetGame,buildRound,toggleCell,submit,playSequence,stopSequence,emptyGrid,update,draw,
  useHint,clearGrid,togglePause,toggleMute,
  STEPS_BASE,ROWS,TOTAL,FREQS,NOTE_NAMES,cellAt
};
</script>
</body>
