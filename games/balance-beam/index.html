<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Balance Beam</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
canvas{display:block;background:#070a0e;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:5;}
#ctrls button{width:44px;height:44px;border-radius:10px;border:1px solid rgba(128,192,255,.35);background:rgba(6,9,14,.75);color:#eaf2f6;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;}
#ctrls button:active{background:rgba(80,160,255,.35);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="btnMute" aria-label="Mute" title="Mute (M)">&#128266;</button>
  <button id="btnPause" aria-label="Pause" title="Pause (P)">&#10074;&#10074;</button>
</div>
<div id="hint">Click / tap left or right half to drop a weight &middot; keep the beam balanced &middot; P pause &middot; M mute</div>
<script>
'use strict';
// Balance Beam (#37)
// Weights labelled "commitment", "pressure", "joy", etc. fall
// from above. Click left or right half of the screen to place
// them on that side. Keep the beam within 15° for 60 seconds.
// Theme: balancing your life's commitments mindfully.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const CX=W/2,PIVOT_Y=320,BEAM_LEN=360;
const MAX_ANGLE=0.28; // ~16°
const GOOD=['rest','joy','play','friends','art','music','nature','movement','growth','peace'];
const BAD=['guilt','fomo','rush','compare','should','pressure','nag','conform','obligation','noise'];
const ALL_WEIGHTS=[...GOOD.map(l=>({label:l,val:1,col:'#5be0b0'})),...BAD.map(l=>({label:l,val:-1,col:'#f07070'}))];

// ---- persistence ----
const BEST_KEY='balance-beam-best';
function loadBest(){try{const v=localStorage.getItem(BEST_KEY);return v?parseInt(v,10)||0:0;}catch(e){return 0;}}
function saveBest(v){try{localStorage.setItem(BEST_KEY,String(v));}catch(e){}}

const game={state:'title',time:0,survived:0,score:0,best:loadBest(),lives:3,shakeT:0,muted:false,combo:0,bestCombo:0,endless:false,popups:[],flashT:0,dangerFlashT:0,lowLifeFlashT:0};
let angle=0,angleV=0,weights=[],falling=null,spawnT=0,SPAWN_MS=2800,rng;
let seedOverride=null; // window.__cfq test hook can set a deterministic seed

function resetGame(endless){
  angle=0;angleV=0;weights=[];falling=null;spawnT=0;SPAWN_MS=2800;
  game.score=0;game.survived=0;game.lives=3;game.shakeT=0;game.combo=0;game.bestCombo=0;
  game.endless=!!endless;game.popups=[];game.flashT=0;game.dangerFlashT=0;game.lowLifeFlashT=0;
  const seed=(seedOverride!=null)?seedOverride:(Date.now()%99997);
  rng=seeded(seed);
  game.state='playing';
  spawnFalling();
}

function spawnFalling(){
  const heavy=game.survived>25&&rng()<clamp(0.15+game.survived*0.002,0.15,0.35);
  const w=ALL_WEIGHTS[Math.floor(rng()*ALL_WEIGHTS.length)];
  const mult=heavy?2:1;
  falling={...w,val:w.val*mult,heavy,x:CX+(rng()-.5)*80,y:60,vy:0,placed:false};
}

function addPopup(x,y,text,col){game.popups.push({x,y,text,col,t:0,life:800});}

function placeFalling(left){
  if(!falling||falling.placed)return;
  const side=left?-1:1;
  const dx=side*(40+Math.floor(rng()*BEAM_LEN*0.45));
  const accuracy=1-Math.abs(dx)/(BEAM_LEN*0.45+40); // near-center placements score higher
  weights.push({...falling,dx,placed:true});
  const torque=falling.val*dx*0.00015;
  angleV+=torque;
  angleV=clamp(angleV,-0.05,0.05);
  sndPlace();
  const good=falling.val>0;
  let pts;
  if(good){
    game.combo++;
    if(game.combo>game.bestCombo)game.bestCombo=game.combo;
    const comboBonus=Math.min(20,(game.combo-1)*3);
    const accBonus=Math.round(accuracy*10);
    pts=10+comboBonus+accBonus;
    if(game.combo>0&&game.combo%5===0){
      // streak stabilizing bonus: extra damping / grace window
      angleV*=0.5;
    }
  }else{
    game.combo=0;
    pts=Math.max(2,Math.round(4*accuracy)); // bad placements still give minimal points, but far less
    game.shakeT=Math.max(game.shakeT,150); // small shake feedback on bad placement
  }
  game.score+=pts;
  addPopup(CX+dx*0.0+falling.x*0,falling.y,'+'+pts,good?'#5be0b0':'#f07070');
  falling=null;
}

function update(dt){
  dt=clamp(dt,0,48);
  const s=dt/1000;
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.flashT>0)game.flashT=Math.max(0,game.flashT-dt);
  if(game.dangerFlashT>0)game.dangerFlashT=Math.max(0,game.dangerFlashT-dt);
  if(game.lowLifeFlashT>0)game.lowLifeFlashT=Math.max(0,game.lowLifeFlashT-dt);
  for(let i=game.popups.length-1;i>=0;i--){const p=game.popups[i];p.t+=dt;p.y-=dt*0.03;if(p.t>=p.life)game.popups.splice(i,1);}
  if(game.state!=='playing')return;
  game.survived+=s;
  spawnT+=dt;
  const fallSpeedScale=clamp(1+game.survived*0.01,1,2.2);
  if(spawnT>=SPAWN_MS&&!falling){
    spawnT=0;
    SPAWN_MS=Math.max(1200,2800-game.survived*6);
    spawnFalling();
  }
  // physics
  const totalTorque=weights.reduce((acc,w)=>acc+w.val*w.dx*0.0001,0);
  angleV+=totalTorque*s;
  angleV*=0.98; // damping
  angleV=clamp(angleV,-0.05,0.05); // clamp per-frame angular velocity to prevent violent overshoot
  angle+=angleV;

  const dangerRatio=Math.abs(angle)/MAX_ANGLE;
  if(dangerRatio>=0.8&&dangerRatio<1){
    game.dangerFlashT=Math.max(game.dangerFlashT,1); // continuous near-danger cue while above threshold
  }

  if(Math.abs(angle)>MAX_ANGLE){
    game.lives--;
    game.combo=0;
    game.shakeT=400;
    game.flashT=250;
    angle=clamp(angle,-MAX_ANGLE,MAX_ANGLE);
    angleV=-angleV*0.3;
    sndBad();
    if(game.lives===1)game.lowLifeFlashT=1200;
    if(game.lives<=0){
      if(game.score>game.best){game.best=game.score;saveBest(game.best);}
      game.state='gameover';
    }
  }
  if(falling){
    falling.y+=200*fallSpeedScale*s;
    if(falling.y>H-50){
      // missed — now has real consequence: score penalty + combo reset
      sndMiss();
      game.combo=0;
      game.score=Math.max(0,game.score-5);
      falling=null;
    }
  }
  if(!game.endless&&game.survived>=60){
    if(game.score>game.best){game.best=game.score;saveBest(game.best);}
    sndWin();
    game.state='won';
  }
}

// ---- audio ----
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(game.muted)return;
  const a=AC();if(!a)return;
  try{
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||0.15)+0.02);
  }catch(e){}
}
const sndPlace=()=>tone(380,0.1,'sine',0.05);
const sndBad=()=>tone(200,0.3,'sawtooth',0.06);
const sndMiss=()=>tone(250,0.12,'sine',0.04);
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};

function toggleMute(){game.muted=!game.muted;btnMute.innerHTML=game.muted?'&#128263;':'&#128266;';}
function togglePause(){
  if(game.state==='playing'){game.state='paused';btnPause.innerHTML='&#9654;';}
  else if(game.state==='paused'){game.state='playing';btnPause.innerHTML='&#10074;&#10074;';}
}

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#070a0e'],[1,'#030508']]);ctx.fillRect(0,0,W,H);}

function drawZones(){
  // faint dividing line + directional arrows so players know the screen is split
  ctx.save();
  ctx.strokeStyle='rgba(128,192,255,.14)';
  ctx.lineWidth=2;
  ctx.setLineDash([6,10]);
  ctx.beginPath();ctx.moveTo(CX,50);ctx.lineTo(CX,H-20);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(128,192,255,.18)';
  ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('←',CX-W/4,H-34);
  ctx.fillText('→',CX+W/4,H-34);
  ctx.restore();
}

function drawBeam(){
  ctx.save();ctx.translate(CX,PIVOT_Y);ctx.rotate(angle);
  const danger=Math.abs(angle)/MAX_ANGLE;
  ctx.fillStyle=`rgba(${Math.floor(80+danger*120)},${Math.floor(160-danger*80)},${Math.floor(200-danger*100)},.8)`;
  ctx.fillRect(-BEAM_LEN,-6,BEAM_LEN*2,12);
  for(const w of weights){
    ctx.fillStyle=w.col+'cc';
    const wy=-6-14;
    const wide=w.heavy;
    rr(w.dx-(wide?24:18),wy,(wide?48:36),14,4);ctx.fill();
    if(wide){ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;rr(w.dx-24,wy,48,14,4);ctx.stroke();}
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.font='bold 7px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(w.label,w.dx,wy+7);
  }
  ctx.fillStyle='rgba(100,120,160,.7)';ctx.fillRect(-4,0,8,40);
  ctx.beginPath();ctx.moveTo(-14,40);ctx.lineTo(14,40);ctx.lineTo(4,0);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawFalling(){
  if(!falling)return;
  ctx.shadowColor=falling.col;ctx.shadowBlur=10;ctx.fillStyle=falling.col+'aa';
  const wide=falling.heavy;
  rr(falling.x-(wide?28:22),falling.y-8,(wide?56:44),18,5);ctx.fill();
  ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
  rr(falling.x-(wide?28:22),falling.y-8,(wide?56:44),18,5);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(falling.label,falling.x,falling.y);
}

function drawPopups(){
  ctx.save();ctx.textAlign='center';ctx.font='bold 14px Arial';
  for(const p of game.popups){
    const a=1-p.t/p.life;
    ctx.globalAlpha=clamp(a,0,1);
    ctx.fillStyle=p.col;
    ctx.fillText(p.text,p.x||CX,p.y);
  }
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(3,5,7,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#80c0ff';ctx.font='bold 13px Arial';ctx.fillText('Balance Beam',18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText(game.endless?'Endless — how long can you stay balanced?':'Survive 60s  |  Click left or right to place',18,28);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('SCORE',W/2,8);
  ctx.fillStyle='#ffd580';ctx.font='bold 22px Arial';ctx.fillText(game.score,W/2,22);
  ctx.textAlign='right';
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  const timeStr=game.endless?(Math.floor(game.survived)+'s'):(Math.max(0,60-Math.floor(game.survived))+'s');
  ctx.fillText('♥'.repeat(game.lives)+'  '+timeStr,W-18,8);
  if(game.combo>1){ctx.fillStyle='#5be0b0';ctx.font='bold 11px Arial';ctx.fillText('streak x'+game.combo,W-18,26);}
  ctx.restore();
}

function drawFlashes(){
  if(game.flashT>0){ctx.fillStyle=`rgba(240,60,60,${(game.flashT/250)*0.25})`;ctx.fillRect(0,0,W,H);}
  if(game.dangerFlashT>0){
    const g=ctx.createLinearGradient(0,0,0,H);
    const a=0.12;
    g.addColorStop(0,`rgba(240,80,80,${a})`);g.addColorStop(0.08,'rgba(240,80,80,0)');
    g.addColorStop(1,`rgba(240,80,80,${a})`);g.addColorStop(0.92,'rgba(240,80,80,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }
  if(game.lowLifeFlashT>0){
    const pulse=Math.abs(Math.sin(game.time*0.01));
    ctx.strokeStyle=`rgba(255,80,80,${0.5*pulse})`;ctx.lineWidth=10;ctx.strokeRect(5,5,W-10,H-10);
  }
}

function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}

function panelDraw(title,lines){
  ctx.save();ctx.fillStyle='rgba(3,5,7,.78)';ctx.fillRect(0,0,W,H);
  const pw=560,ph=320,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(10,14,20,.97)'],[1,'rgba(6,9,14,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(80,160,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#80c0ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+98;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}

function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);
    let dx=0,dy=0;
    if(game.shakeT>0){const m=game.shakeT/400*6;dx=Math.sin(game.time*.06)*m;dy=Math.cos(game.time*.08)*m;}
    ctx.save();ctx.translate(dx,dy);
    drawBg();
    if(game.state!=='title'){drawZones();drawBeam();drawFalling();drawPopups();}
    drawFlashes();
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.state==='paused'){
      drawHUD();
      panelDraw('Paused',['Score: '+game.score,'','Press P or tap the pause button to resume.','','Take a breath.']);
    }
    if(game.state==='title')panelDraw('Balance Beam',['Weights fall from above.','Click left or right to place them.','Keep the beam within 15° for 60 seconds.','','Balance your commitments mindfully.','','Click / tap to begin.']);
    else if(game.state==='won')panelDraw('Balanced! ✓',['Score: '+game.score+'  Best: '+game.best,'Best streak: '+game.bestCombo,'You held the balance for 60 seconds.','','Click / tap to play again.','Press E for endless mode.']);
    else if(game.state==='gameover')panelDraw('Tipped Over',['Score: '+game.score+'  Best: '+game.best,'','Balance is a practice, not a destination.','','Click / tap to try again.']);
    ctx.restore();
  }catch(e){}
}

// ---- input ----
function onPrimary(px){
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'||game.state==='gameover'){resetGame(false);return;}
  if(game.state==='won'){resetGame(false);return;}
  if(game.state==='playing')placeFalling(px<W/2);
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();const px=(e.clientX-r.left)*W/r.width;onPrimary(px);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();const px=(e.touches[0].clientX-r.left)*W/r.width;onPrimary(px);},{passive:false});

window.addEventListener('keydown',e=>{
  if(e.code==='KeyP'){e.preventDefault();if(game.state==='playing'||game.state==='paused')togglePause();}
  if(e.code==='KeyM'){e.preventDefault();toggleMute();}
  if(e.code==='ArrowLeft'&&game.state==='playing'){e.preventDefault();placeFalling(true);}
  if(e.code==='ArrowRight'&&game.state==='playing'){e.preventDefault();placeFalling(false);}
  if(e.code==='KeyE'&&game.state==='won'){e.preventDefault();resetGame(true);}
});

const btnMute=document.getElementById('btnMute');
const btnPause=document.getElementById('btnPause');
btnMute.addEventListener('click',e=>{e.stopPropagation();toggleMute();});
btnMute.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();toggleMute();},{passive:false});
btnPause.addEventListener('click',e=>{e.stopPropagation();togglePause();});
btnPause.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();togglePause();},{passive:false});

// ---- letterboxing: preserve 960x540 aspect ratio, center with black bars ----
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const scale=Math.min(vw/W,vh/H);
  const cw=Math.round(W*scale),ch=Math.round(H*scale);
  canvas.style.width=cw+'px';
  canvas.style.height=ch+'px';
}
window.addEventListener('resize',resize);
resize();

let last=0;
function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},
  get angle(){return angle;},
  get weights(){return weights;},
  get falling(){return falling;},
  resetGame,placeFalling,update,draw,ALL_WEIGHTS,
  toggleMute,togglePause,
  setSeed(s){seedOverride=s;}
};
</script>
</body>
</html>
