<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Emoji Decode</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#06080e;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;max-width:100vw;max-height:100vh;aspect-ratio:960/540;object-fit:contain;}
#ctrls{position:fixed;top:8px;right:8px;display:flex;gap:8px;z-index:5;}
#ctrls button{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(120,160,255,.4);background:rgba(6,9,16,.75);color:#bcd4ff;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;}
#ctrls button:active{background:rgba(80,140,255,.35);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="btnMute" title="Mute/Unmute">🔊</button>
  <button id="btnPause" title="Pause/Resume">⏸</button>
</div>
<script>
'use strict';
// Emoji Decode (#43)
// An emoji sequence is shown that encodes a childfree concept.
// Pick the correct meaning from 4 options. 15 questions, timed.
// Theme: decoding your own life through new symbols.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const QUESTIONS=[
  {emoji:'🚫👶',answer:'Childfree by choice',wrong:['No children nearby','Anti-baby shower','Quiet zone'],why:'The prohibition sign paired with the child icon reads as a deliberate, chosen life direction.'},
  {emoji:'🛑📜',answer:'Rejecting the script',wrong:['Stop reading','No scrolls allowed','Pause story'],why:'Stopping a scroll/script symbolizes declining a pre-written life plan handed down by others.'},
  {emoji:'🧘‍♀️🕊️',answer:'Inner peace',wrong:['Yoga with birds','Meditating outdoors','Calm weather'],why:'Meditation plus a dove together signal calm, settled peace of mind rather than a literal outdoor scene.'},
  {emoji:'🚪➡️🌍',answer:'Freedom to leave',wrong:['Door to the world','Travel exit','Open borders'],why:'A door opening onto the globe represents unrestricted freedom of movement and choice.'},
  {emoji:'🌱🪴',answer:'Personal growth',wrong:['Planting season','Gardening hobby','Green thumb'],why:'Sprouting plants are a common metaphor for ongoing self-development, not literal gardening.'},
  {emoji:'🧠💡',answer:'Self-awareness',wrong:['Brain power','Smart idea','Study time'],why:'A brain lighting up represents insight into oneself, not raw intellect or study.'},
  {emoji:'🔇🗣️',answer:'Silencing external noise',wrong:['Muting a call','Quiet speaker','No loud talking'],why:'Muting a speaking mouth icon reflects tuning out outside opinions and pressure.'},
  {emoji:'🛡️❤️',answer:'Protecting your heart',wrong:['Love shield','Heart guard','Safe romance'],why:'A shield over a heart conveys emotional self-protection and boundary-setting.'},
  {emoji:'🗺️✍️',answer:'Writing your own path',wrong:['Map-making hobby','Travel journal','Navigation notes'],why:'A map plus a writing hand signals authoring your own life direction.'},
  {emoji:'⚖️😌',answer:'Life balance',wrong:['Legal calm','Judge satisfied','Even scales'],why:'Balanced scales paired with a content face represent overall life equilibrium.'},
  {emoji:'🔑🚪',answer:'Unlocking new freedom',wrong:['Spare key','Door unlocked','Key found'],why:'A key opening a door is a classic symbol for newly gained freedom or opportunity.'},
  {emoji:'🌙⭐',answer:'Chosen solitude',wrong:['Night sky','Stargazing','Camping alone'],why:'Night and star imagery together evoke quiet, intentionally chosen alone time.'},
  {emoji:'💬❌',answer:'Setting verbal boundaries',wrong:['No texting','Speech off','Mute chat'],why:'A crossed-out speech bubble represents refusing unwanted conversations or comments.'},
  {emoji:'🏃‍♀️🕊️',answer:'Running toward freedom',wrong:['Jogging with birds','Marathon dove','Escape run'],why:'A runner with a dove combines motion and liberty into forward momentum toward freedom.'},
  {emoji:'🌺🙋',answer:'Thriving on your terms',wrong:['Flower picker','Happy gardener','Spring greeting'],why:'A blooming flower with a raised hand signals confidently flourishing by your own definition.'},
];
const TIME_BASE=8000,TIME_FLOOR=5000,TOTAL=15;
const BEST_KEY='emojiDecode_best';
function loadBest(){try{const v=localStorage.getItem(BEST_KEY);return v?parseInt(v,10)||0:0;}catch(e){return 0;}}
function saveBest(v){try{localStorage.setItem(BEST_KEY,String(v));}catch(e){}}
let playCount=0;
const game={state:'title',time:0,qIdx:0,score:0,best:loadBest(),chosen:-1,answered:false,correctAnim:0,wrongAnim:0,shakeT:0,streak:0,bestStreak:0,correctCount:0,totalAnswered:0,muted:false,paused:false,popups:[],particles:[],missed:[]};
let queue=[],current=null,barT=0,rng,curTimeLimit=TIME_BASE,pendingTimeout=null;
function shuffle(arr,r){for(let i=arr.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function startGame(){playCount++;rng=seeded(Date.now()^(playCount*2654435761));queue=[...QUESTIONS];shuffle(queue,rng);game.qIdx=0;game.score=0;game.shakeT=0;game.streak=0;game.correctCount=0;game.totalAnswered=0;game.missed=[];game.popups=[];game.particles=[];nextQ();}
function nextQ(){if(pendingTimeout){clearTimeout(pendingTimeout);pendingTimeout=null;}if(game.qIdx>=TOTAL){if(game.score>game.best){game.best=game.score;saveBest(game.best);}sndWin();game.state='won';return;}current=queue[game.qIdx%queue.length];const opts=[current.answer,...current.wrong].slice(0,4);shuffle(opts,rng);current._opts=opts;current._ansIdx=opts.indexOf(current.answer);curTimeLimit=Math.max(TIME_FLOOR,TIME_BASE-game.qIdx*200);game.qIdx++;barT=0;game.chosen=-1;game.answered=false;game.correctAnim=0;game.wrongAnim=0;game.state='playing';}
function addPopup(text,x,y,color){game.popups.push({text,x,y,t:900,color:color||'#8ff0a8'});}
function burstParticles(x,y,color){for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.2;game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,t:600,life:600,color:color||'#8ff0a8'});}}
function choose(i){if(game.answered||game.state!=='playing')return;game.answered=true;game.chosen=i;game.totalAnswered++;const ow=380,oh=56,gap=12;const totalH=current._opts.length*(oh+gap)-gap;const startY=(H+50-totalH)/2;const sx=W/2-ow/2;const oy=startY+i*(oh+gap)+oh/2;if(i===current._ansIdx){const speedBonus=barT<curTimeLimit*0.35?2:barT<curTimeLimit*0.65?1:0;game.streak++;if(game.streak>game.bestStreak)game.bestStreak=game.streak;const mult=1+Math.min(2,Math.floor(game.streak/3)*0.5);const gained=Math.round((1+speedBonus)*mult);game.score+=gained;game.correctCount++;game.correctAnim=700;sndGood();addPopup('+'+gained+(game.streak>=3?'  Streak x'+game.streak:''),sx+ow/2,oy,'#8ff0a8');burstParticles(sx+ow/2,oy,'#8ff0a8');pendingTimeout=setTimeout(()=>nextQ(),600);}else{game.streak=0;game.missed.push(current);game.wrongAnim=500;game.shakeT=300;sndBad();addPopup('Missed',sx+ow/2,oy,'#ff9090');pendingTimeout=setTimeout(()=>nextQ(),900);}}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndGood=()=>{tone(528,0.15,'sine',0.07);setTimeout(()=>tone(660,0.15,'sine',0.06),80);};
const sndBad=()=>tone(200,0.35,'sawtooth',0.06);
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};
function update(dt){dt=clamp(dt,0,48);if(game.paused)return;game.time+=dt;if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);if(game.correctAnim>0)game.correctAnim=Math.max(0,game.correctAnim-dt);if(game.wrongAnim>0)game.wrongAnim=Math.max(0,game.wrongAnim-dt);for(let i=game.popups.length-1;i>=0;i--){const p=game.popups[i];p.t-=dt;p.y-=dt*0.03;if(p.t<=0)game.popups.splice(i,1);}for(let i=game.particles.length-1;i>=0;i--){const p=game.particles[i];p.t-=dt;p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;if(p.t<=0)game.particles.splice(i,1);}if(game.state!=='playing'||game.answered)return;barT+=dt;if(barT>=curTimeLimit){// timeout
if(game.answered)return;game.answered=true;game.chosen=-2;game.totalAnswered++;game.streak=0;game.missed.push(current);sndBad();game.shakeT=300;pendingTimeout=setTimeout(()=>nextQ(),900);}}
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function optionAt(mx,my){if(!current||!current._opts)return-1;const ow=380,oh=56,gap=12;const totalH=current._opts.length*(oh+gap)-gap;const startY=(H+50-totalH)/2;const sx=W/2-ow/2;for(let i=0;i<current._opts.length;i++){const y=startY+i*(oh+gap);if(mx>=sx&&mx<=sx+ow&&my>=y&&my<=y+oh)return i;}return-1;}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#06080e'],[1,'#03040a']]);ctx.fillRect(0,0,W,H);}
function drawQuestion(){if(!current)return;// emoji
ctx.font='52px serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(current.emoji,W/2,70);// question mark hint
ctx.fillStyle='rgba(200,220,255,.4)';ctx.font='14px Arial';ctx.fillText('What does this emoji sequence mean?',W/2,136);
// options
const ow=380,oh=56,gap=12;const totalH=current._opts.length*(oh+gap)-gap;const startY=(H+50-totalH)/2;const sx=W/2-ow/2;const answered=game.answered;for(let i=0;i<current._opts.length;i++){const y=startY+i*(oh+gap);const chosen=game.chosen===i;const isCorrect=i===current._ansIdx;let bg='rgba(20,28,50,.85)',stroke='rgba(60,90,160,.4)',tc='rgba(220,235,255,.8)',prefix='';if(answered){if(isCorrect){bg='rgba(40,120,60,.8)';stroke='rgba(80,200,100,.6)';tc='rgba(200,255,220,.9)';prefix='✓ ';}else if(chosen){bg='rgba(100,30,30,.8)';stroke='rgba(200,80,80,.5)';tc='rgba(255,180,180,.9)';prefix='✗ ';}}else if(chosen){stroke='rgba(150,190,255,.9)';}ctx.fillStyle=bg;rr(sx,y,ow,oh,10);ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=answered?1.5:(chosen?2.5:1.5);rr(sx,y,ow,oh,10);ctx.stroke();ctx.fillStyle=tc;ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(prefix+current._opts[i],W/2,y+oh/2);}
// why explanation on wrong/timeout
if(answered&&game.chosen!==current._ansIdx){ctx.fillStyle='rgba(200,220,255,.55)';ctx.font='12px Arial';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(current.why||'',W/2,startY+totalH+14);}
// bar
const bw=W-120,bh=8,bx=60,by=56;const t=clamp(1-barT/curTimeLimit,0,1);ctx.fillStyle='rgba(255,255,255,.08)';rr(bx,by,bw,bh,4);ctx.fill();ctx.fillStyle=t>0.5?'#6090ff':t>0.25?'#ffd560':'#ff6060';rr(bx,by,bw*t,bh,4);ctx.fill();}
function drawHUD(){ctx.save();ctx.fillStyle='rgba(3,4,7,.88)';rr(0,0,W,46,0);ctx.fill();ctx.textBaseline='top';ctx.textAlign='left';ctx.fillStyle='#80c0ff';ctx.font='bold 13px Arial';ctx.fillText('Emoji Decode',18,8);ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Question '+game.qIdx+' / '+TOTAL,18,28);if(game.streak>=2){ctx.fillStyle='#ffb060';ctx.font='bold 11px Arial';ctx.fillText('🔥 Streak '+game.streak,140,28);}ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Score  '+game.score+'  Best  '+game.best,W-18,8);const acc=game.totalAnswered?Math.round(100*game.correctCount/game.totalAnswered):100;ctx.fillText('Accuracy  '+acc+'%',W-18,28);ctx.restore();}
function drawPopups(){for(const p of game.popups){const a=clamp(p.t/900,0,1);ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.text,p.x,p.y);ctx.restore();}}
function drawParticles(){for(const p of game.particles){const a=clamp(p.t/p.life,0,1);ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();ctx.restore();}}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){ctx.save();ctx.fillStyle='rgba(3,4,7,.78)';ctx.fillRect(0,0,W,H);const pw=560,ph=lines.length*24+140,px=(W-pw)/2,py=(H-ph)/2;ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(10,14,26,.97)'],[1,'rgba(6,9,16,.97)']]);rr(px,py,pw,ph,22);ctx.fill();ctx.strokeStyle='rgba(80,160,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillStyle='#80c0ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';let ly=py+98;for(const l of lines){ctx.fillText(l,W/2,ly);ly+=24;}ctx.restore();}
function drawPauseOverlay(){ctx.save();ctx.fillStyle='rgba(3,4,7,.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#80c0ff';ctx.font='bold 30px Arial';ctx.fillText('Paused',W/2,H/2);ctx.restore();}
function draw(){try{ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);let dx=0,dy=0;if(game.shakeT>0){const m=game.shakeT/300*5;dx=Math.sin(game.time*.06)*m;dy=Math.cos(game.time*.08)*m;}ctx.save();ctx.translate(dx,dy);drawBg();if(game.state==='playing')drawQuestion();if(game.correctAnim>0){ctx.fillStyle=`rgba(80,220,140,${(game.correctAnim/700*0.25).toFixed(2)})`;ctx.fillRect(0,0,W,H);}if(game.wrongAnim>0){ctx.fillStyle=`rgba(220,80,80,${(game.wrongAnim/500*0.25).toFixed(2)})`;ctx.fillRect(0,0,W,H);}if(game.state==='playing'){drawParticles();drawPopups();}vignette();if(game.state==='playing')drawHUD();if(game.state==='title')panelDraw('Emoji Decode',['An emoji sequence encodes a concept.','Choose the correct meaning from 4 options.','Timer speeds up as you go — answer fast for bonus points.','Build streaks for a score multiplier.','','Decode life on your own terms.','','Click / tap to begin.']);else if(game.state==='won'){const acc=game.totalAnswered?Math.round(100*game.correctCount/game.totalAnswered):100;const missedList=game.missed.slice(0,3).map(m=>m.emoji+' = '+m.answer);const lines=['Score: '+game.score+'  |  Best: '+game.best,'Accuracy: '+acc+'%  |  Best streak: '+game.bestStreak,''];if(missedList.length){lines.push('Missed:');for(const m of missedList)lines.push(m);lines.push('');}else{lines.push('Perfect round!','');}lines.push('You speak the language of freedom.','','Click / tap to play again.');panelDraw('All Decoded!',lines);}if(game.paused&&game.state==='playing')drawPauseOverlay();ctx.restore();}catch(e){}}
function pointerDown(e){const rect=canvas.getBoundingClientRect();const sx=W/rect.width,sy=H/rect.height;let px,py;if(e.touches){px=(e.touches[0].clientX-rect.left)*sx;py=(e.touches[0].clientY-rect.top)*sy;}else{px=(e.clientX-rect.left)*sx;py=(e.clientY-rect.top)*sy;}const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}e.preventDefault();if(game.paused)return;if(game.state==='title'||game.state==='won'){startGame();return;}if(game.state!=='playing')return;const i=optionAt(px,py);if(i>=0)choose(i);}
canvas.addEventListener('mousedown',e=>{e.preventDefault();pointerDown(e);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e);},{passive:false});
function togglePause(){if(game.state!=='playing')return;game.paused=!game.paused;btnPause.textContent=game.paused?'▶':'⏸';}
function toggleMute(){game.muted=!game.muted;btnMute.textContent=game.muted?'🔇':'🔊';}
const btnPause=document.getElementById('btnPause'),btnMute=document.getElementById('btnMute');
btnPause.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();togglePause();});
btnMute.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();toggleMute();});
window.addEventListener('keydown',e=>{if(e.key==='p'||e.key==='P')togglePause();if(e.key==='m'||e.key==='M')toggleMute();});
let last=0;function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={get game(){return game;},get current(){return current;},startGame,nextQ,choose,update,draw,QUESTIONS,TOTAL,get TIME_PER(){return curTimeLimit;},optionAt};
</script>
</body>
</html>
