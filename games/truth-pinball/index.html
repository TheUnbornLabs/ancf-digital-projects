<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Truth Pinball</title>
<style>
  *{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;overflow:hidden;background:#08060f;font-family:Arial,Helvetica,sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{width:100vw;height:100vh;display:block;}
  #hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
  #hud-btns{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:5;}
  .hud-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid rgba(180,140,255,.4);background:rgba(10,7,22,.82);color:#eaf2f6;font-size:18px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;cursor:pointer;padding:0;}
  .hud-btn:active{background:rgba(60,40,100,.9);}
  .low-lives{animation:pulseVig 1.1s ease-in-out infinite;}
  @keyframes pulseVig{0%,100%{opacity:.35;}50%{opacity:.85;}}
  #lowlife-vig{position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 120px 30px rgba(220,30,30,.55);opacity:0;z-index:4;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="lowlife-vig"></div>
<div id="hud-btns">
  <button id="btnPause" class="hud-btn" type="button" title="Pause" aria-label="Pause">&#10074;&#10074;</button>
  <button id="btnMute" class="hud-btn" type="button" title="Mute" aria-label="Mute">&#128266;</button>
</div>
<div id="hint">Z / Left-click — left flipper &middot; / / Right-click — right flipper &middot; P pause</div>
<script>
'use strict';

// =========================================================
// Truth Pinball (#18)
// Pinball table. Ball bounces off bumpers labelled with
// myths; each hit scores and flashes a rebuttal. Flippers
// at the bottom keep the ball alive. Lives drain if ball
// falls past flippers.
// Theme: truth keeps bouncing back; myths don't stand.
// =========================================================

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

// ---- Physics constants ----
const GRAVITY_BASE=0.18;
let GRAVITY=GRAVITY_BASE;
const GRAVITY_MAX=0.30;
const BALL_R=10;
const FLIPPER_W=90;
const FLIPPER_H=10;
const FLIPPER_R=8;
const FLIPPER_UP=-0.42;   // radians (up)
const FLIPPER_DOWN=0.38;  // radians (down)
const FLIPPER_SPEED=0.18; // radians/frame
const LEFT_PIVOT={x:W*0.27,y:H-68};
const RIGHT_PIVOT={x:W*0.73,y:H-68};
const MAX_SPEED=16; // hard cap on ball velocity magnitude per axis-combined
function clampBallSpeed(b){
  const sp=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  if(sp>MAX_SPEED){const k=MAX_SPEED/sp;b.vx*=k;b.vy*=k;}
}

// ---- Difficulty curve (clamped, mild) ----
const BUMP_BOOST_BASE=1.25;
const BUMP_BOOST_MAX=1.5;
const DIFF_HIT_STEP=12;   // every N total bumper hits, nudge difficulty
const DIFF_TIME_STEP=30000; // or every 30s
function difficultyLevel(){
  const byHits=Math.floor(game.totalHits/DIFF_HIT_STEP);
  const byTime=Math.floor(game.time/DIFF_TIME_STEP);
  return clamp(Math.max(byHits,byTime),0,6);
}
function applyDifficulty(){
  const lvl=difficultyLevel();
  GRAVITY=clamp(GRAVITY_BASE+lvl*0.018,GRAVITY_BASE,GRAVITY_MAX);
  game.bumpBoost=clamp(BUMP_BOOST_BASE+lvl*0.04,BUMP_BOOST_BASE,BUMP_BOOST_MAX);
}

// ---- Bumper definitions ----
const BUMPER_DATA=[
  {x:W*0.25,y:140,r:30,myth:'Selfish',rebut:'Self-directed'},
  {x:W*0.50,y:120,r:30,myth:'Regret',rebut:'Your call alone'},
  {x:W*0.75,y:140,r:30,myth:'Unnatural',rebut:'Humans vary'},
  {x:W*0.33,y:240,r:26,myth:'Incomplete',rebut:'Whole as you are'},
  {x:W*0.67,y:240,r:26,myth:'Selfish',rebut:'Self-authored'},
  {x:W*0.50,y:330,r:24,myth:'Pressure',rebut:'Your pace'},
  {x:W*0.20,y:330,r:22,myth:'Clock',rebut:'Your timeline'},
  {x:W*0.80,y:330,r:22,myth:'Script',rebut:'Rewrite it'},
];

// ---- Slingshots ----
const SLINGS=[
  {x1:W*0.15,y1:H-180,x2:W*0.22,y2:H-120,hit:false,hitT:0},
  {x1:W*0.85,y1:H-180,x2:W*0.78,y2:H-120,hit:false,hitT:0},
];

// ---- Persistence ----
function loadBest(){
  try{
    const v=localStorage.getItem('truthPinballBest');
    const n=v==null?0:parseInt(v,10);
    return Number.isFinite(n)&&n>=0?n:0;
  }catch(e){ return 0; }
}
function saveBest(v){
  try{ localStorage.setItem('truthPinballBest',String(v)); }catch(e){}
}
function loadMuted(){
  try{ return localStorage.getItem('truthPinballMuted')==='1'; }catch(e){ return false; }
}
function saveMuted(v){
  try{ localStorage.setItem('truthPinballMuted',v?'1':'0'); }catch(e){}
}

const CLEAR_THRESHOLD=4; // hits needed to permanently "clear" a myth bumper
const game={
  state:'title',time:0,score:0,best:loadBest(),lives:3,ball:null,shakeT:0,multi:1,
  totalHits:0,bumpBoost:1.25,streak:0,streakWindow:0,muted:loadMuted(),
  respawnTimer:0,pendingRespawn:false,bossMode:false,bossT:0,tableClearedAwarded:false
};
let lFlipAngle=FLIPPER_DOWN, rFlipAngle=FLIPPER_DOWN;
let lFlipTarget=FLIPPER_DOWN, rFlipTarget=FLIPPER_DOWN;
let bumpers=[], rebutAnim=[], flashParticles=[];
const input={left:false,right:false};

function makeBumpers(){
  bumpers=BUMPER_DATA.map(b=>({...b,hits:0,flashT:0,rebut:b.rebut,cleared:false}));
}

function launchBall(){
  game.ball={x:W*0.5,y:H*0.55,vx:(Math.random()-0.5)*3,vy:-9};
  game.pendingRespawn=false;
}

function reset(){
  game.state='playing'; game.score=0; game.lives=3; game.multi=1; game.shakeT=0;
  game.totalHits=0; game.bumpBoost=BUMP_BOOST_BASE; game.streak=0; game.streakWindow=0;
  game.respawnTimer=0; game.pendingRespawn=false; game.bossMode=false; game.bossT=0;
  game.tableClearedAwarded=false; game.time=0;
  GRAVITY=GRAVITY_BASE;
  makeBumpers(); flashParticles=[]; rebutAnim=[];
  lFlipAngle=FLIPPER_DOWN; rFlipAngle=FLIPPER_DOWN;
  lFlipTarget=FLIPPER_DOWN; rFlipTarget=FLIPPER_DOWN;
  launchBall();
}

// ---- Audio ----
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndBump=()=>tone(440+Math.random()*60,0.1,'sine',0.07);
const sndFlip=()=>tone(300,0.06,'triangle',0.05);
const sndDie =()=>{tone(200,0.4,'sawtooth',0.06);setTimeout(()=>{if(!game.muted)tone(140,0.5,'sine',0.05);},90);};
const sndSling=()=>tone(360,0.09,'square',0.06);
const sndClear=()=>{tone(520,0.12,'triangle',0.07);setTimeout(()=>{if(!game.muted)tone(780,0.16,'triangle',0.06);},80);};

// ---- Flipper collision ----
function flipperCollide(ball,pivot,angle,dir){
  const cos=Math.cos(angle),sin=Math.sin(angle);
  const tip={x:pivot.x+cos*FLIPPER_W,y:pivot.y+sin*FLIPPER_W};
  // project ball onto flipper line
  const dx=tip.x-pivot.x,dy=tip.y-pivot.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/len,ny=dy/len;
  const bx=ball.x-pivot.x,by=ball.y-pivot.y;
  const t2=clamp(bx*nx+by*ny,0,len);
  const cx=pivot.x+nx*t2,cy=pivot.y+ny*t2;
  const ddx=ball.x-cx,ddy=ball.y-cy;
  const d=Math.sqrt(ddx*ddx+ddy*ddy);
  if(d<BALL_R+FLIPPER_H/2){
    const overlap=BALL_R+FLIPPER_H/2-d;
    const norm=d>0?{x:ddx/d,y:ddy/d}:{x:0,y:-1};
    ball.x+=norm.x*overlap; ball.y+=norm.y*overlap;
    const dot=ball.vx*norm.x+ball.vy*norm.y;
    const driven=angle<FLIPPER_DOWN-0.1;
    const boost=dir<0&&driven?2.2:1.4;
    ball.vx=(ball.vx-2*dot*norm.x)*boost;
    ball.vy=(ball.vy-2*dot*norm.y)*boost;
    clampBallSpeed(ball);
    // only clack the flipper sound when actively driven up by input, or
    // clearly moving/near its up position — avoids spam on resting grazes
    const activeInput=dir<0?input.left:input.right;
    if(activeInput||driven) sndFlip();
  }
}

// ---- Slingshot ----
function slingCollide(ball,sl){
  const dx=sl.x2-sl.x1,dy=sl.y2-sl.y1;
  const len=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/len,ny=dy/len;
  const px=ball.x-sl.x1,py=ball.y-sl.y1;
  const t2=clamp(px*nx+py*ny,0,len);
  const cx=sl.x1+nx*t2,cy=sl.y1+ny*t2;
  const ddx=ball.x-cx,ddy=ball.y-cy;
  const d=Math.sqrt(ddx*ddx+ddy*ddy);
  if(d<BALL_R+6){
    const norm=d>0?{x:ddx/d,y:ddy/d}:{x:-1,y:0};
    const dot=ball.vx*norm.x+ball.vy*norm.y;
    if(dot<0){
      ball.vx=(ball.vx-2*dot*norm.x)*1.3;
      ball.vy=(ball.vy-2*dot*norm.y)*1.3;
      clampBallSpeed(ball);
      sl.hitT=300; sndSling();
      flashParticles.push(...Array.from({length:5},()=>({x:cx,y:cy,vx:(Math.random()-0.5)*4,vy:-1.5-Math.random()*2.5,life:400,maxLife:400,color:'#ff9d5c',sling:true})));
    }
  }
}

// ---- Scoring helpers ----
function registerBumperHit(bm){
  bm.flashT=500; bm.hits++;
  game.totalHits++;

  // streak/combo: consecutive hits within a rolling time window bump multi
  const STREAK_WINDOW_MS=1800;
  if(game.streakWindow>0){
    game.streak++;
  } else {
    game.streak=1;
  }
  game.streakWindow=STREAK_WINDOW_MS;
  game.multi=clamp(1+Math.floor(game.streak/3),1,5);

  let gained=10*game.multi;
  if(!bm.cleared&&bm.hits>=CLEAR_THRESHOLD){
    bm.cleared=true;
    gained+=150;
    sndClear();
    rebutAnim.push({x:bm.x,y:bm.y-bm.r-34,text:'Myth cleared! +150',t:1200});
    if(bumpers.every(x=>x.cleared)&&!game.tableClearedAwarded){
      game.tableClearedAwarded=true;
      gained+=500;
      game.bossMode=true; game.bossT=0;
      rebutAnim.push({x:W/2,y:H*0.42,text:'All myths cleared! Bonus round!',t:1800});
    }
  }
  game.score+=gained;
  if(game.score>game.best){ game.best=game.score; saveBest(game.best); }
  rebutAnim.push({x:bm.x,y:bm.y-bm.r-18,text:bm.rebut,t:900});
  const col=bm.cleared?'#7dffb0':'#ffd580';
  flashParticles.push(...Array.from({length:6},()=>({x:bm.x,y:bm.y,vx:(Math.random()-0.5)*4,vy:-2-Math.random()*3,life:500,maxLife:500,color:col})));
  sndBump();
}

// ---- Physics step ----
function physicsStep(dt){
  const b=game.ball;
  if(!b) return;
  applyDifficulty();
  const steps=3;
  const dts=dt/steps;
  for(let s=0;s<steps;s++){
    b.vy+=GRAVITY*dts*0.06;
    b.x+=b.vx*dts*0.06;
    b.y+=b.vy*dts*0.06;
    clampBallSpeed(b);

    // wall collisions
    if(b.x<BALL_R){b.x=BALL_R;b.vx=Math.abs(b.vx)*0.85;}
    if(b.x>W-BALL_R){b.x=W-BALL_R;b.vx=-Math.abs(b.vx)*0.85;}
    if(b.y<BALL_R+50){b.y=BALL_R+50;b.vy=Math.abs(b.vy)*0.85;}

    // bumper collisions
    for(const bm of bumpers){
      const ddx=b.x-bm.x,ddy=b.y-bm.y;
      const d=Math.sqrt(ddx*ddx+ddy*ddy);
      if(d<BALL_R+bm.r){
        const overlap=BALL_R+bm.r-d;
        const nx=d>0?ddx/d:0, ny=d>0?ddy/d:-1;
        b.x+=nx*overlap;b.y+=ny*overlap;
        const dot=b.vx*nx+b.vy*ny;
        const boost=game.bumpBoost||BUMP_BOOST_BASE;
        b.vx=(b.vx-2*dot*nx)*boost;
        b.vy=(b.vy-2*dot*ny)*boost;
        clampBallSpeed(b);
        registerBumperHit(bm);
      }
    }

    // flipper collisions
    flipperCollide(b,LEFT_PIVOT,lFlipAngle,-1);
    flipperCollide(b,RIGHT_PIVOT,rFlipAngle,1);
    for(const sl of SLINGS) slingCollide(b,sl);

    // ball lost?
    if(b.y>H+BALL_R*2){
      game.lives=Math.max(0,game.lives-1);
      sndDie(); game.shakeT=400;
      game.ball=null;
      game.multi=1; game.streak=0; game.streakWindow=0;
      if(game.lives<=0){ game.state='gameover'; return; }
      game.respawnTimer=1000; game.pendingRespawn=true;
      return;
    }
  }
}

// ---- Update ----
function update(dt){
  dt=clamp(dt,0,32);
  game.time+=dt;
  if(game.shakeT>0) game.shakeT=Math.max(0,game.shakeT-dt);

  // flipper physics
  const lTarget=input.left?FLIPPER_UP:FLIPPER_DOWN;
  const rTarget=input.right?-FLIPPER_UP:-FLIPPER_DOWN;
  lFlipAngle=lerp(lFlipAngle,lTarget,0.35);
  rFlipAngle=lerp(rFlipAngle,rTarget,0.35);

  for(const bm of bumpers) if(bm.flashT>0) bm.flashT=Math.max(0,bm.flashT-dt);
  for(const sl of SLINGS) if(sl.hitT>0) sl.hitT=Math.max(0,sl.hitT-dt);
  for(let i=rebutAnim.length-1;i>=0;i--){rebutAnim[i].t-=dt;rebutAnim[i].y-=dt*0.03;if(rebutAnim[i].t<=0)rebutAnim.splice(i,1);}
  for(let i=flashParticles.length-1;i>=0;i--){const p=flashParticles[i];p.vy+=0.08;p.x+=p.vx;p.y+=p.vy;p.life-=dt;if(p.life<=0)flashParticles.splice(i,1);}

  if(game.streakWindow>0){
    game.streakWindow=Math.max(0,game.streakWindow-dt);
    if(game.streakWindow<=0){ game.streak=0; game.multi=1; }
  }

  if(game.bossMode){
    game.bossT+=dt;
    // moving bonus bumper: nudge one bumper's position in a gentle orbit
    const bm=bumpers[1];
    if(bm){
      const t=game.bossT*0.0012;
      bm.x=clamp(W*0.5+Math.sin(t)*W*0.16,bm.r+10,W-bm.r-10);
      bm.y=clamp(120+Math.cos(t*1.3)*22,bm.r+54,240);
    }
  }

  // respawn timer replaces setTimeout so pause correctly halts it (bug: ball
  // could previously spawn mid-pause via a background setTimeout)
  if(game.pendingRespawn){
    if(game.state==='playing'){
      game.respawnTimer=Math.max(0,game.respawnTimer-dt);
      if(game.respawnTimer<=0) launchBall();
    }
  }

  if(game.state==='playing') physicsStep(dt);
}

// ---- Draw ----
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rgrad(x,y,r0,r1,stops){const g=ctx.createRadialGradient(x,y,r0,x,y,r1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#0c0820'],[1,'#060410']]);ctx.fillRect(0,0,W,H);}

function drawBumpers(){
  for(const bm of bumpers){
    const lit=bm.flashT>0;
    const cleared=bm.cleared;
    const col=cleared?'#7dffb0':(lit?'#ffd580':'#6050a0');
    ctx.globalAlpha=cleared?0.55:1;
    ctx.shadowColor=col; ctx.shadowBlur=lit?22:(cleared?10:8);
    ctx.fillStyle=cleared?lgrad(bm.x-bm.r,bm.y-bm.r,bm.x+bm.r,bm.y+bm.r,[[0,'#2c4a3a'],[1,'#132a1e']])
      :lgrad(bm.x-bm.r,bm.y-bm.r,bm.x+bm.r,bm.y+bm.r,[[0,lit?'#ffb030':'#3a2870'],[1,lit?'#e08000':'#1e1440']]);
    ctx.beginPath();ctx.arc(bm.x,bm.y,bm.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=cleared?'rgba(125,255,176,.8)':(lit?'rgba(255,213,128,.9)':'rgba(140,100,200,.5)');ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(bm.x,bm.y,bm.r,0,Math.PI*2);ctx.stroke();
    if(cleared){
      // crack glyph: two crossing lines, glyph not just color for accessibility
      ctx.strokeStyle='rgba(125,255,176,.6)';ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(bm.x-bm.r*0.5,bm.y-bm.r*0.5);ctx.lineTo(bm.x+bm.r*0.4,bm.y+bm.r*0.5);
      ctx.moveTo(bm.x+bm.r*0.5,bm.y-bm.r*0.3);ctx.lineTo(bm.x-bm.r*0.3,bm.y+bm.r*0.5);
      ctx.stroke();
    }
    ctx.fillStyle=lit?'#fff':(cleared?'rgba(200,255,220,.85)':'rgba(234,242,246,.7)');
    ctx.font=`bold ${Math.min(11,bm.r*0.42)}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(bm.myth,bm.x,bm.y);
    ctx.globalAlpha=1;
  }
}

function drawSlings(){
  for(const sl of SLINGS){
    const lit=sl.hitT>0;
    ctx.strokeStyle=lit?'rgba(255,180,80,.9)':'rgba(140,100,200,.5)';
    ctx.lineWidth=lit?4:2.5;
    ctx.beginPath();ctx.moveTo(sl.x1,sl.y1);ctx.lineTo(sl.x2,sl.y2);ctx.stroke();
    if(lit){
      // glyph, not just color/thickness change, to mark active state
      const mx=(sl.x1+sl.x2)/2, my=(sl.y1+sl.y2)/2;
      ctx.save();
      ctx.strokeStyle='rgba(255,220,150,.9)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(mx,my,7,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }
}

function drawFlipper(pivot,angle,side){
  const cos=Math.cos(angle),sin=Math.sin(angle);
  ctx.save();ctx.translate(pivot.x,pivot.y);ctx.rotate(angle);
  ctx.fillStyle='#5090d0';
  rr(0,-FLIPPER_H/2,FLIPPER_W,FLIPPER_H,FLIPPER_R);ctx.fill();
  ctx.strokeStyle='rgba(100,180,255,.5)';ctx.lineWidth=1.5;
  rr(0,-FLIPPER_H/2,FLIPPER_W,FLIPPER_H,FLIPPER_R);ctx.stroke();
  ctx.restore();
}

function drawBall(){
  const b=game.ball; if(!b) return;
  ctx.shadowColor='rgba(180,220,255,.8)';ctx.shadowBlur=14;
  ctx.fillStyle=rgrad(b.x-3,b.y-3,2,BALL_R,[[0,'#d0e8ff'],[1,'#6090c0']]);
  ctx.beginPath();ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawParticles(){
  for(const p of flashParticles){
    ctx.save();ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    if(p.sling){
      // slingshot particles get a small square/diamond, not just a color diff
      ctx.translate(p.x,p.y);ctx.rotate(Math.PI/4);
      ctx.fillRect(-2.4,-2.4,4.8,4.8);
    } else {
      ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

function drawRebutAnims(){
  for(const r of rebutAnim){
    ctx.save();ctx.globalAlpha=Math.min(1,r.t/700);
    ctx.fillStyle='#ffd580';ctx.font='bold 13px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(r.text,r.x,r.y);
    ctx.restore();
  }
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(4,3,12,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';
  ctx.textAlign='left';ctx.fillStyle='#ff8080';ctx.font='bold 14px Arial';
  ctx.fillText('♥'.repeat(game.lives)+'♡'.repeat(Math.max(0,3-game.lives)),18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  const clearedCount=bumpers.filter(b=>b.cleared).length;
  ctx.fillText(game.bossMode?'Bonus round — all myths cleared!':`Knock down every myth (${clearedCount}/${bumpers.length} cleared)`,18,28);
  ctx.textAlign='center';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('SCORE',W/2,8);ctx.fillStyle='#ffd580';ctx.font='bold 22px Arial';
  ctx.fillText(game.score,W/2,22);
  if(game.multi>1){
    ctx.fillStyle='#7dffb0';ctx.font='bold 11px Arial';
    ctx.fillText('x'+game.multi+' combo',W/2,40);
  }
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('BEST  '+game.best,W-18,8);
  ctx.restore();
}

function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.88);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.45)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}

function panelDraw(title,lines){
  ctx.save();ctx.fillStyle='rgba(4,3,10,.76)';ctx.fillRect(0,0,W,H);
  const pw=540,ph=310,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(18,12,38,.97)'],[1,'rgba(10,7,22,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(180,140,255,.22)';ctx.lineWidth=1.5;
  rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#c090ff';ctx.font='bold 36px Arial';
  ctx.fillText(title,W/2,py+64);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+102;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}

function updateDomOverlays(){
  const vig=document.getElementById('lowlife-vig');
  if(vig){
    const low=game.state==='playing'&&game.lives===1;
    vig.style.opacity=low?'1':'0';
    vig.classList.toggle('low-lives',low);
  }
  const btnMute=document.getElementById('btnMute');
  if(btnMute) btnMute.textContent=game.muted?'\u{1F507}':'\u{1F50A}';
  const btnPause=document.getElementById('btnPause');
  if(btnPause) btnPause.textContent=game.state==='paused'?'▶':'❮❮';
}

function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);
    let dx=0,dy=0;
    if(game.shakeT>0){const m=game.shakeT/400*5;dx=Math.sin(game.time*.07)*m;dy=Math.cos(game.time*.09)*m;}
    ctx.save();ctx.translate(dx,dy);
    drawBg();drawSlings();drawBumpers();
    drawFlipper(LEFT_PIVOT,lFlipAngle,-1);
    drawFlipper(RIGHT_PIVOT,rFlipAngle,1);
    drawBall();drawParticles();drawRebutAnims();
    vignette();
    if(game.state==='playing'||game.state==='paused') drawHUD();
    if(game.state==='title'){
      panelDraw('Truth Pinball',[
        'Keep the truth ball in play.',
        'Hit bumpers to knock myths apart.',
        'Each bump shows the rebuttal.',
        isTouchDevice()?'Tap left/right half of screen = flippers':'Z / Left-click = left flipper',
        isTouchDevice()?'Use the pause/mute buttons top-right':'/ / Right-click = right flipper','','Click / tap to begin.']);
    } else if(game.state==='paused'){
      panelDraw('Paused',['Breathe.','',isTouchDevice()?'Tap the pause button to resume.':'Press P to resume.']);
    } else if(game.state==='gameover'){
      panelDraw('Myths Won This Round',[`Score: ${game.score}  ·  Best: ${game.best}`,'','Truth keeps bouncing back.','','Click / tap to play again.']);
    }
    ctx.restore();
  }catch(e){}
  updateDomOverlays();
}

// ---- Input ----
function isTouchDevice(){
  try{
    return ('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  }catch(e){ return false; }
}
function setLeft(v){input.left=v;}
function setRight(v){input.right=v;}
function activate(){
  const a2=AC();if(a2&&a2.state==='suspended'){try{a2.resume();}catch(ex){}}
  if(game.state==='title'){reset();return;}
  if(game.state==='gameover'){reset();return;}
}
function togglePause(){
  if(game.state==='playing')game.state='paused';
  else if(game.state==='paused')game.state='playing';
}
function toggleMute(){
  game.muted=!game.muted;
  saveMuted(game.muted);
  updateDomOverlays();
}
canvas.addEventListener('mousedown',e=>{
  e.preventDefault();activate();
  const rx=e.clientX/canvas.getBoundingClientRect().width;
  if(rx<0.5)setLeft(true);else setRight(true);
});
canvas.addEventListener('mouseup',e=>{
  e.preventDefault();
  const rx=e.clientX/canvas.getBoundingClientRect().width;
  if(rx<0.5)setLeft(false);else setRight(false);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();activate();
  for(const t of e.touches){
    const rx=t.clientX/canvas.getBoundingClientRect().width;
    if(rx<0.5)setLeft(true);else setRight(true);
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();setLeft(false);setRight(false);
},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='KeyZ'||e.code==='ArrowLeft')setLeft(true);
  if(e.code==='Slash'||e.code==='ArrowRight')setRight(true);
  if(e.code==='KeyP'){e.preventDefault();togglePause();}
  if(e.code==='KeyM'){e.preventDefault();toggleMute();}
  if(e.code==='Enter'||e.code==='Space'){e.preventDefault();activate();}
});
window.addEventListener('keyup',e=>{
  if(e.code==='KeyZ'||e.code==='ArrowLeft')setLeft(false);
  if(e.code==='Slash'||e.code==='ArrowRight')setRight(false);
});

// on-screen HUD buttons (mobile-visible, real HTML elements; min ~44px tap targets)
const btnPauseEl=document.getElementById('btnPause');
const btnMuteEl=document.getElementById('btnMute');
if(btnPauseEl){
  btnPauseEl.addEventListener('click',e=>{e.preventDefault();togglePause();});
  btnPauseEl.addEventListener('touchend',e=>{e.preventDefault();togglePause();},{passive:false});
}
if(btnMuteEl){
  btnMuteEl.addEventListener('click',e=>{e.preventDefault();toggleMute();});
  btnMuteEl.addEventListener('touchend',e=>{e.preventDefault();toggleMute();},{passive:false});
}
(function initHint(){
  const hint=document.getElementById('hint');
  if(hint&&isTouchDevice()){
    hint.textContent='Tap left/right half of screen — flippers · use top-right buttons to pause/mute';
  }
})();

let last=0;
function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;if(game.state==='playing')update(dt);else game.time+=dt;draw();requestAnimationFrame(loop);}
game.state='title';makeBumpers();draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},get bumpers(){return bumpers;},
  reset,launchBall,physicsStep,update,draw,
  BUMPER_DATA,LEFT_PIVOT,RIGHT_PIVOT,BALL_R,
  input,togglePause,toggleMute,clampBallSpeed,MAX_SPEED,
};
</script>
</body>
</html>
