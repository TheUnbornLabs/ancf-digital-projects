<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Domino Knock</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#060408;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:10;}
#ctrls button{width:44px;height:44px;border-radius:10px;border:1.5px solid rgba(200,160,80,.4);background:rgba(3,2,4,.72);color:#e8c060;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
#ctrls button:active{background:rgba(200,160,80,.25);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="btnMute" aria-label="Mute">&#128266;</button>
  <button id="btnPause" aria-label="Pause">&#10074;&#10074;</button>
</div>
<div id="hint">Tap the highlighted first domino to start the chain &middot; wrong taps cost a life</div>
<script>
'use strict';
// Domino Knock (#51)
// A row of dominoes labelled with childfree myths stand upright.
// Tap the first (highlighted) domino to start a chain reaction — watch all myths fall.
// Wrong taps cost a life. 8 rounds with increasing chain complexity.
// Theme: knocking down myths one by one.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const MYTHS=[
  "selfish","incomplete","lonely","cold","won't regret","missing out",
  "odd","unnatural","immature","irresponsible","heartless","confused",
  "naive","childish","broken"
];
const DW=32,DH=80,GAP=8,TOTAL=8;
const CY=H/2+20;
const LIVES_START=3;

// ---- persistence ----
let LS_OK=true;
function lsGet(k,d){try{const v=localStorage.getItem(k);return v===null?d:v;}catch(e){LS_OK=false;return d;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){LS_OK=false;}}
const bestStored=parseInt(lsGet('domino_knock_best','0'),10)||0;
const mutedStored=lsGet('domino_knock_muted','0')==='1';

const game={
  state:'title',time:0,round:1,score:0,best:bestStored,falling:false,allFallen:false,
  chainT:0,shakeT:0,lives:LIVES_START,paused:false,muted:mutedStored,combo:0,bestCombo:0,
  roundStartT:0,lastRoundMs:0,popups:[],particles:[],fallSpeed:0.004,delayStep:140
};
let dominoes=[],rng;
let roundTimeoutId=null;

function clearRoundTimeout(){if(roundTimeoutId!==null){clearTimeout(roundTimeoutId);roundTimeoutId=null;}}

function buildRound(r){
  clearRoundTimeout();
  rng=seeded(r*4201+31);
  const count=clamp(5+r,5,TOTAL+10);
  const shuffled=[...MYTHS].sort(()=>rng()-.5).slice(0,count);
  const totalW=count*(DW+GAP)-GAP;
  const startX=clamp((W-totalW)/2,40,W-40-totalW);
  // pacing: fall speed and delay tighten slightly with round, clamped
  game.fallSpeed=clamp(0.004+ (r-1)*0.0003,0.004,0.0075);
  game.delayStep=clamp(140-(r-1)*8,90,140);
  dominoes=shuffled.map((m,i)=>({x:startX+i*(DW+GAP),label:m,angle:0,falling:false,fallen:false,delay:i*game.delayStep}));
  game.falling=false;
  game.allFallen=false;
  game.chainT=0;
  game.roundStartT=game.time;
  game.state='playing';
}

function resetGame(){
  clearRoundTimeout();
  game.round=1;
  game.score=0;
  game.shakeT=0;
  game.lives=LIVES_START;
  game.combo=0;
  game.popups=[];
  game.particles=[];
  buildRound(1);
}

function addPopup(x,y,text,color){game.popups.push({x,y,text,color:color||'#e8c060',life:700,t:0});}
function addParticles(x,y,color){for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,sp=40+Math.random()*80;game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:500+Math.random()*300,t:0,color:color||'#e8c060'});}}

function startChain(){
  if(game.paused||game.falling||game.allFallen)return;
  game.falling=true;
  game.chainT=0;
  sndTap();
}

// hit-test: returns index of domino hit by canvas-space point, or -1
function hitTestDomino(px,py){
  for(let i=0;i<dominoes.length;i++){
    const d=dominoes[i];
    const pad=Math.max(0,(44-DW)/2); // enlarge tap target to >=44px
    if(px>=d.x-pad&&px<=d.x+DW+pad&&py>=CY-DH/2-pad&&py<=CY+DH/2+pad)return i;
  }
  return -1;
}

function handleTap(px,py){
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'||game.state==='won'||game.state==='gameover'){
    resetGame();
    return;
  }
  if(game.state!=='playing'||game.paused)return;
  if(game.falling||game.allFallen)return;
  const idx=hitTestDomino(px,py);
  if(idx===0){
    startChain();
  } else if(idx>=0){
    // wrong domino tapped
    missPenalty(px,py);
  } else {
    // missed entirely — small penalty-free miss, just ignore blank taps
  }
}

function missPenalty(px,py){
  game.lives=Math.max(0,game.lives-1);
  game.combo=0;
  addPopup(px,py-20,'MISS','#ff5a5a');
  sndMiss();
  game.shakeT=180;
  if(game.lives<=0){
    game.state='gameover';
    clearRoundTimeout();
  }
}

function update(dt){
  dt=clamp(dt,0,48);
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  for(let i=game.popups.length-1;i>=0;i--){const p=game.popups[i];p.t+=dt;if(p.t>=p.life)game.popups.splice(i,1);}
  for(let i=game.particles.length-1;i>=0;i--){const p=game.particles[i];p.t+=dt;if(p.t>=p.life){game.particles.splice(i,1);continue;}const s=dt/1000;p.x+=p.vx*s;p.y+=p.vy*s;p.vy+=200*s;}
  if(game.state!=='playing'||game.paused)return;
  if(game.falling){
    game.chainT+=dt;
    for(const d of dominoes){
      if(!d.falling&&game.chainT>=d.delay){d.falling=true;}
      if(d.falling&&!d.fallen){d.angle=Math.min(d.angle+dt*game.fallSpeed,Math.PI/2);}
      if(d.angle>=Math.PI/2&&!d.fallen){
        d.fallen=true;
        sndClick();
        addParticles(d.x+DW/2,CY,'#c89a4a');
      }
    }
    if(dominoes.every(d=>d.fallen)&&!game.allFallen){
      game.allFallen=true;
      game.score++;
      game.combo++;
      if(game.combo>game.bestCombo)game.bestCombo=game.combo;
      const elapsed=game.time-game.roundStartT;
      game.lastRoundMs=elapsed;
      let bonus=0;
      if(elapsed<2500)bonus=50;else if(elapsed<4000)bonus=25;
      if(bonus>0)addPopup(W/2,CY-DH/2-30,'+'+bonus+' SPEED BONUS','#7fe0a0');
      if(game.combo>=2)addPopup(W/2,CY-DH/2-55,'COMBO x'+game.combo,'#ffd070');
      if(game.score>game.best){game.best=game.score;lsSet('domino_knock_best',String(game.best));}
      sndWin();
      game.shakeT=260;
      clearRoundTimeout();
      roundTimeoutId=setTimeout(()=>{
        roundTimeoutId=null;
        if(game.round>=TOTAL){game.state='won';}
        else{game.round++;buildRound(game.round);}
      },900);
    }
  }
}

// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndTap=()=>tone(440,0.08,'sine',0.05);
const sndClick=()=>tone(300+Math.random()*80,0.05,'sine',0.04);
const sndMiss=()=>tone(140,0.18,'sawtooth',0.05);
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#060408'],[1,'#040306']]);ctx.fillRect(0,0,W,H);}

function drawDominoes(){
  ctx.strokeStyle='rgba(120,100,80,.25)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(40,CY+DH/2+2);ctx.lineTo(W-40,CY+DH/2+2);ctx.stroke();
  for(const d of dominoes){
    ctx.save();
    const px=d.x+DW/2,py=CY+DH/2;
    ctx.translate(px,py);ctx.rotate(d.angle);ctx.translate(-DW/2,-DH);
    const falpha=d.fallen?0.5:1;
    ctx.globalAlpha=falpha;
    ctx.shadowColor=d.fallen?'rgba(0,0,0,.2)':'rgba(180,140,60,.4)';
    ctx.shadowBlur=d.falling&&!d.fallen?12:4;
    ctx.fillStyle=d.fallen?'rgba(40,20,10,.6)':'rgba(180,140,60,.9)';
    rr(0,0,DW,DH,4);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=d.fallen?'rgba(100,80,40,.3)':'rgba(220,190,100,.6)';
    ctx.lineWidth=1.5;rr(0,0,DW,DH,4);ctx.stroke();
    // label (vertical text when upright)
    ctx.fillStyle=d.fallen?'rgba(160,130,80,.5)':'rgba(30,20,10,.9)';
    ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.save();ctx.translate(DW/2,DH/2);if(!d.fallen)ctx.rotate(-Math.PI/2);ctx.fillText(d.label,0,0);ctx.restore();
    // accessibility: shape backup for fallen state (checkmark), not just color
    if(d.fallen){
      ctx.strokeStyle='rgba(120,220,150,.85)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(DW*0.22,DH*0.85);ctx.lineTo(DW*0.42,DH*1.02);ctx.lineTo(DW*0.8,DH*0.62);ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }
  // click target hint on the real first domino, with real hit-testing backing it
  if(!game.falling&&!game.allFallen&&dominoes.length>0&&game.state==='playing'&&!game.paused){
    const first=dominoes[0];
    ctx.strokeStyle='rgba(255,200,80,.6)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.arc(first.x+DW/2,CY,26,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,200,80,.7)';ctx.font='10px Arial';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText('TAP',first.x+DW/2,CY-30);
  }
}

function drawFX(){
  for(const p of game.particles){
    const a=1-p.t/p.life;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  for(const p of game.popups){
    const a=1-p.t/p.life;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.color;
    ctx.font='bold 15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y-p.t*0.03);
  }
  ctx.globalAlpha=1;
}

function drawLives(){
  ctx.save();
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.font='13px Arial';
  let s='';for(let i=0;i<LIVES_START;i++)s+=i<game.lives?'♥ ':'♡ ';
  ctx.fillStyle=game.lives<=1?'rgba(255,90,90,.9)':'rgba(234,242,246,.7)';
  ctx.fillText(s,18,28===28?28:28,999);
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(3,2,4,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#e8c060';ctx.font='bold 13px Arial';
  ctx.fillText('Domino Knock  Round '+game.round+' / '+TOTAL,18,8);
  ctx.fillStyle=game.lives<=1?'rgba(255,120,120,.9)':'rgba(234,242,246,.55)';
  ctx.font='11px Arial';
  let hearts='';for(let i=0;i<LIVES_START;i++)hearts+=i<game.lives?'♥ ':'♡ ';
  ctx.fillText('Lives '+hearts+'   Combo x'+game.combo,18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Score '+game.score+'  Best '+game.best,W-18,8);
  ctx.restore();
}

function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}

function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(3,2,4,.78)';ctx.fillRect(0,0,W,H);
  const pw=520,ph=320,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(12,8,4,.97)'],[1,'rgba(8,5,3,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(200,160,80,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#e8c060';ctx.font='bold 32px Arial';ctx.fillText(title,W/2,py+58);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+94;for(const l of lines){ctx.fillText(l,W/2,ly);ly+=25;}
  ctx.restore();
}

function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    // screen shake wired to game.shakeT (round-completion / miss juice)
    if(game.shakeT>0){
      const mag=Math.min(6,game.shakeT/40);
      const sx=(Math.random()*2-1)*mag,sy=(Math.random()*2-1)*mag;
      ctx.translate(sx,sy);
    }
    drawBg();
    if(game.state!=='title')drawDominoes();
    drawFX();
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.paused&&game.state==='playing')panelDraw('Paused',['Tap the pause button or press P to resume.']);
    if(game.state==='title')panelDraw('Domino Knock',['Dominoes labelled with childfree myths stand upright.','Tap the highlighted first one to start the chain reaction.','Watch every myth fall in sequence.','Wrong taps cost a life — you have '+LIVES_START+'.','','Knock them all down — one chain at a time.','','Tap to begin.']);
    else if(game.state==='won')panelDraw('All Myths Fallen! ✓',['Score: '+game.score+' / '+TOTAL,'Best combo: '+game.bestCombo,'Best score: '+game.best,'','Every myth knocked down, every round.','','Tap to play again.']);
    else if(game.state==='gameover')panelDraw('Out of Chances',['Score: '+game.score+' / '+TOTAL,'Best score: '+game.best,'','Wrong taps knocked you out of the round.','','Tap to try again.']);
    ctx.restore();
  }catch(e){}
}

function canvasPointFromEvent(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width;
  const sy=canvas.height/rect.height;
  return {x:(clientX-rect.left)*sx,y:(clientY-rect.top)*sy};
}

canvas.addEventListener('mousedown',e=>{
  e.preventDefault();
  const p=canvasPointFromEvent(e.clientX,e.clientY);
  handleTap(p.x,p.y);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const p=canvasPointFromEvent(t.clientX,t.clientY);
  handleTap(p.x,p.y);
},{passive:false});

// on-screen controls
const btnMute=document.getElementById('btnMute');
const btnPause=document.getElementById('btnPause');
function refreshCtrlIcons(){
  btnMute.innerHTML=game.muted?'&#128263;':'&#128266;';
  btnPause.innerHTML=game.paused?'&#9654;':'&#10074;&#10074;';
}
function toggleMute(){game.muted=!game.muted;lsSet('domino_knock_muted',game.muted?'1':'0');refreshCtrlIcons();}
function togglePause(){if(game.state!=='playing')return;game.paused=!game.paused;refreshCtrlIcons();}
btnMute.addEventListener('click',e=>{e.stopPropagation();toggleMute();});
btnPause.addEventListener('click',e=>{e.stopPropagation();togglePause();});
btnMute.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();toggleMute();},{passive:false});
btnPause.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();togglePause();},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){togglePause();}
  if(e.key==='m'||e.key==='M'){toggleMute();}
});
refreshCtrlIcons();

let last=0;
function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},
  get dominoes(){return dominoes;},
  resetGame,buildRound,startChain,update,draw,
  handleTap,hitTestDomino,
  MYTHS,TOTAL,DW,DH
};
</script>
</body>
</html>
