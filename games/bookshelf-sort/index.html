<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Bookshelf Sort</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#04030a;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:8px;right:8px;display:flex;gap:8px;z-index:10;}
#ctrls button{width:38px;height:38px;border-radius:10px;border:1px solid rgba(180,130,60,.35);background:rgba(4,3,9,.85);color:#d0b080;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
#ctrls button:active{background:rgba(180,130,60,.25);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="btnMute" title="Mute (M)" aria-label="Mute">🔊</button>
  <button id="btnPause" title="Pause (P)" aria-label="Pause">⏸</button>
</div>
<div id="hint">Drag books to sort them by category into the correct shelf &middot; 5 rounds</div>
<script>
'use strict';
// Bookshelf Sort (#68)
// Drag colorful books (labelled with life choices / values) into the correct shelf.
// Each shelf has a color+icon label. Wrong shelf: book bounces back with a miss penalty.
// 5 rounds with increasing book counts, then an endless rush mode.
// Theme: sorting your own values — not someone else's.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}

// ---- persistence ----
const LS_KEY='bookshelfSort_best_v2';
function lsGet(k,d){try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

const SHELVES=[
  {label:'Freedom',col:'#60a0ff',icon:'✦',y:100,books:[],shakeT:0},
  {label:'Creativity',col:'#e060e0',icon:'✎',y:200,books:[],shakeT:0},
  {label:'Wellbeing',col:'#60d080',icon:'♥',y:300,books:[],shakeT:0},
  {label:'Connection',col:'#ffa040',icon:'◎',y:400,books:[],shakeT:0},
];
const BOOK_TITLES=[
  {t:'Travel',s:'Freedom'},{t:'Solitude',s:'Freedom'},{t:'Adventure',s:'Freedom'},{t:'Space',s:'Freedom'},
  {t:'Art',s:'Creativity'},{t:'Music',s:'Creativity'},{t:'Writing',s:'Creativity'},{t:'Making',s:'Creativity'},
  {t:'Rest',s:'Wellbeing'},{t:'Movement',s:'Wellbeing'},{t:'Nature',s:'Wellbeing'},{t:'Sleep',s:'Wellbeing'},
  {t:'Trust',s:'Connection'},{t:'Listening',s:'Connection'},{t:'Presence',s:'Connection'},{t:'Care',s:'Connection'},
];
const TOTAL=5;
const SHELF_W=400,SHELF_X=540,BOOK_W=100,BOOK_H=44;
const game={state:'title',time:0,round:0,score:0,best:lsGet(LS_KEY,0),shakeT:0,
  muted:lsGet('bookshelfSort_muted',false),paused:false,
  misses:0,roundMisses:0,streak:0,rush:false,rushTimer:0,rushSpawned:0,
  popups:[],particles:[],hintBook:null,hintMisses:0,lastMissBook:null};
let books=[],dragging=null,dragOffX=0,dragOffY=0,rng;
function colOf(shelf){return SHELVES.find(s=>s.label===shelf)?.col||'#888';}
function iconOf(shelf){return SHELVES.find(s=>s.label===shelf)?.icon||'?';}

function buildRound(r){
  rng=seeded(r*3001+17);
  const count=4+r*2; // shuffle book pool
  let pool;
  if(count<=BOOK_TITLES.length){pool=[...BOOK_TITLES].sort(()=>rng()-.5).slice(0,count);}
  else{ // repeat pool if we ever need more than 16 (safety clamp)
    pool=[];while(pool.length<count){pool=pool.concat([...BOOK_TITLES].sort(()=>rng()-.5));}
    pool=pool.slice(0,count);
  }
  books=pool.map((b,i)=>{
    const col=i%4,row=Math.floor(i/4);
    return{t:b.t,shelf:b.s,col:colOf(b.s),icon:iconOf(b.s),
      x:60+col*130+(rng()-.5)*16,y:420+row*(BOOK_H+16)+(rng()-.5)*6,
      w:BOOK_W,h:BOOK_H,placed:false,origX:0,origY:0,misses:0};
  });
  books.forEach(b=>{b.origX=b.x;b.origY=b.y;});
  game.state='playing';
  game.roundMisses=0;
  game.hintBook=null;game.hintMisses=0;
}
function resetGame(){
  game.round=0;game.score=0;game.shakeT=0;game.misses=0;game.streak=0;
  game.rush=false;game.rushTimer=0;game.rushSpawned=0;
  game.popups=[];game.particles=[];game.paused=false;
  buildRound(0);
}
function shelfAt(py){for(const s of SHELVES){if(Math.abs(py-s.y)<30)return s;}return null;}

function addPopup(x,y,text,color){
  game.popups.push({x,y,text,color:color||'#eaf2f6',t:0,life:700});
}
function addBurst(x,y,color){
  for(let i=0;i<10;i++){
    const ang=Math.random()*Math.PI*2,spd=40+Math.random()*70;
    game.particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,t:0,life:450,color:color||'#ffd27a'});
  }
}

function tryPlace(book,px,py){
  const s=shelfAt(py);
  if(!s){snapBack(book);return false;}
  if(s.label===book.shelf){
    book.placed=true;
    // clamp placed-book layout so it never overflows the 400px shelf width
    const maxPerRow=Math.max(1,Math.floor((SHELF_W-16)/44));
    const idx=s.books.length;
    const row=Math.floor(idx/maxPerRow);
    const col=idx%maxPerRow;
    book.x=SHELF_X+8+col*44;
    book.y=s.y-20-row*14;
    s.books.push(book);
    sndPlace();
    game.streak++;
    game.score+=1+(game.streak>=5?1:0);
    if(game.score>game.best){game.best=game.score;lsSet(LS_KEY,game.best);}
    addPopup(book.x+book.w/2,book.y-6,game.streak>=5?'+2 streak!':'+1','#7fe0a0');
    addBurst(book.x+book.w/2,book.y+book.h/2,s.col);
    game.hintBook=null;game.hintMisses=0;
    const placedCount=books.filter(b=>b.placed).length;
    if(placedCount>=books.length){
      if(game.roundMisses===0){game.score+=3;addPopup(W/2,H/2-40,'Perfect round +3','#ffd27a');}
      sndWin2();
      setTimeout(()=>{
        game.round++;
        SHELVES.forEach(s2=>{s2.books=[];s2.shakeT=0;});
        if(game.round>=TOTAL){
          if(game.score>game.best){game.best=game.score;lsSet(LS_KEY,game.best);}
          sndWin();
          game.state='won';
        }else{
          buildRound(game.round);
        }
      },700);
    }
    return true;
  }
  // wrong shelf: miss penalty + shake + red flash + popup
  s.shakeT=260;
  game.shakeT=Math.max(game.shakeT,140);
  game.misses++;
  game.roundMisses++;
  game.streak=0;
  book.misses=(book.misses||0)+1;
  game.score=Math.max(0,game.score-1);
  addPopup(px,py-10,'miss','#ff6b6b');
  game.lastMissBook=book;
  if(book.misses>=3){
    game.hintBook=book;
  }
  sndReject();
  snapBack(book);
  return false;
}
function snapBack(book){book.x=book.origX;book.y=book.origY;}

function update(dt){
  dt=clamp(dt,0,48);
  if(game.paused)return;
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  for(const s of SHELVES){if(s.shakeT>0)s.shakeT=Math.max(0,s.shakeT-dt);}
  for(let i=game.popups.length-1;i>=0;i--){const p=game.popups[i];p.t+=dt;p.y-=dt*0.03;if(p.t>=p.life)game.popups.splice(i,1);}
  for(let i=game.particles.length-1;i>=0;i--){const p=game.particles[i];p.t+=dt;const dts=dt/1000;p.x+=p.vx*dts;p.y+=p.vy*dts;p.vy+=200*dts;if(p.t>=p.life)game.particles.splice(i,1);}
  if(game.state==='rush'){
    game.rushTimer=Math.max(0,game.rushTimer-dt);
    if(game.rushTimer<=0){
      game.state='rushover';
      if(game.score>game.best){game.best=game.score;lsSet(LS_KEY,game.best);}
    }
  }
}

// ---- audio ----
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndPlace=()=>tone(440,0.08,'sine',0.05);
const sndReject=()=>tone(200,0.12,'sawtooth',0.05);
const sndWin2=()=>{[528,660,792].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.06),i*60));};
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawBg(){
  ctx.fillStyle=lgrad(0,0,0,H,[[0,'#04030a'],[1,'#030208']]);
  ctx.fillRect(0,0,W,H);
  for(const s of SHELVES){
    const sh=s.shakeT>0?Math.sin(s.shakeT*0.08)*(s.shakeT/260)*6:0;
    ctx.save();
    ctx.translate(sh,0);
    if(s.shakeT>0){
      ctx.fillStyle='rgba(255,60,60,'+(0.18*(s.shakeT/260))+')';
      ctx.fillRect(SHELF_X-4,s.y-24,SHELF_W+8,48);
    }
    ctx.fillStyle='rgba(80,50,30,.6)';ctx.fillRect(SHELF_X,s.y+6,SHELF_W,10);
    ctx.fillStyle='rgba(120,80,50,.3)';ctx.fillRect(SHELF_X,s.y+6,SHELF_W,3);
    ctx.restore();
  }
  for(const s of SHELVES){
    ctx.fillStyle=s.col+'aa';ctx.font='bold 11px Arial';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(s.icon+' '+s.label,514,s.y);
    if(game.hintBook&&game.hintBook.shelf===s.label){
      const pulse=0.5+0.5*Math.sin(game.time*0.008);
      ctx.strokeStyle='rgba(255,210,120,'+(0.4+0.4*pulse)+')';
      ctx.lineWidth=3;
      rr(SHELF_X-2,s.y-26,SHELF_W+4,52,10);ctx.stroke();
    }
  }
}
function drawBook(b){
  ctx.fillStyle=b.col+'cc';rr(b.x,b.y,b.w,b.h,4);ctx.fill();
  ctx.strokeStyle=b.col+'44';ctx.lineWidth=1.5;rr(b.x,b.y,b.w,b.h,4);ctx.stroke();
  ctx.fillStyle='rgba(234,242,246,.95)';ctx.font='bold 12px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(b.icon,b.x+6,b.y+b.h/2);
  ctx.font='bold 8px Arial';ctx.textAlign='center';
  ctx.fillText(b.t,b.x+b.w/2+6,b.y+b.h/2);
}
function drawBooks(){
  for(const b of books){if(b===dragging)continue;drawBook(b);}
  if(dragging){ctx.globalAlpha=0.85;drawBook(dragging);ctx.globalAlpha=1;}
}
function drawPopupsAndParticles(){
  for(const p of game.particles){
    const a=1-p.t/p.life;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  for(const p of game.popups){
    const a=1-p.t/p.life;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.color;ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.globalAlpha=1;
}
function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(2,1,5,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#d0b080';ctx.font='bold 13px Arial';
  const label=game.state==='rush'?'Rush Mode':'Bookshelf Sort — Round '+(game.round+1)+' / '+TOTAL;
  ctx.fillText(label,18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText(game.state==='rush'?'Sort as many as you can before time runs out':'Drag each book to its matching shelf (icon + colour)',18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Score '+game.score+'  Best '+game.best+'  Miss '+game.misses,W-18,8);
  if(game.state==='rush'){
    ctx.fillStyle='#ffd27a';ctx.font='bold 11px Arial';
    ctx.fillText('Time '+Math.ceil(game.rushTimer/1000)+'s',W-18,28);
  }
  ctx.restore();
  if(game.paused){
    ctx.save();
    ctx.fillStyle='rgba(2,1,5,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#d0b080';ctx.font='bold 28px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Paused',W/2,H/2);
    ctx.font='13px Arial';ctx.fillStyle='rgba(234,242,246,.7)';
    ctx.fillText('Tap pause button or press P to resume',W/2,H/2+30);
    ctx.restore();
  }
}
function vignette(){
  const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(2,1,5,.78)';ctx.fillRect(0,0,W,H);
  const pw=560,ph=320,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(6,4,12,.97)'],[1,'rgba(4,3,9,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(180,130,60,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#d0b080';ctx.font='bold 32px Arial';ctx.fillText(title,W/2,py+58);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='14px Arial';
  let ly=py+92;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=24;}
  ctx.restore();
}
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);ctx.save();
    const shk=game.shakeT>0?(Math.random()-0.5)*4*(game.shakeT/140):0;
    ctx.translate(shk,0);
    drawBg();
    if(game.state!=='title')drawBooks();
    drawPopupsAndParticles();
    vignette();
    if(game.state==='playing'||game.state==='rush')drawHUD();
    if(game.state==='title'){
      panelDraw('Bookshelf Sort',['Drag each book to its coloured, icon-labelled shelf.','Match the book to the shelf — colour AND symbol.','Wrong shelf costs a point and shakes the shelf.','3 misses on one book reveals a hint glow.','5 rounds, then an endless Rush round.','','Sort your own values — nobody else\'s.','','Click / tap to begin.']);
    }else if(game.state==='won'){
      panelDraw('All Sorted! ✓',['Score: '+game.score,'Best: '+game.best,'Misses: '+game.misses,'','Your values, your shelves, your order.','','Click / tap for Rush Mode, or press R to restart.']);
    }else if(game.state==='rushover'){
      panelDraw('Rush Complete',['Score: '+game.score,'Best: '+game.best,'','Click / tap to play again.']);
    }
    ctx.restore();
  }catch(e){}
}

function getP(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  if(e.touches)return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
  return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}
function bookAt(px,py){
  // iterate in reverse so the visually topmost (last-drawn) book wins on overlap
  for(let i=books.length-1;i>=0;i--){
    const b=books[i];
    if(!b.placed&&px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h)return b;
  }
  return null;
}

function startRush(){
  game.state='rush';
  game.rushTimer=45000;
  game.score=0;
  game.misses=0;
  game.streak=0;
  game.rushSpawned=0;
  SHELVES.forEach(s=>{s.books=[];s.shakeT=0;});
  rng=seeded(Date.now()>>>0);
  buildRushBatch();
}
function buildRushBatch(){
  const count=6;
  const pool=[];
  while(pool.length<count){pool.push(BOOK_TITLES[Math.floor(rng()*BOOK_TITLES.length)]);}
  books=pool.map((b,i)=>{
    const col=i%4,row=Math.floor(i/4);
    return{t:b.t,shelf:b.s,col:colOf(b.s),icon:iconOf(b.s),
      x:60+col*130+(rng()-.5)*16,y:420+row*(BOOK_H+16)+(rng()-.5)*6,
      w:BOOK_W,h:BOOK_H,placed:false,origX:0,origY:0,misses:0};
  });
  books.forEach(b=>{b.origX=b.x;b.origY=b.y;});
}

function onDown(e){
  e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.paused)return;
  if(game.state==='title'){resetGame();return;}
  if(game.state==='won'){startRush();return;}
  if(game.state==='rushover'){resetGame();return;}
  if(game.state!=='playing'&&game.state!=='rush')return;
  const p=getP(e);
  const b=bookAt(p.x,p.y);
  if(b){dragging=b;dragOffX=p.x-b.x;dragOffY=p.y-b.y;}
}
function onMove(e){
  e.preventDefault();
  if(!dragging||game.paused)return;
  const p=getP(e);
  dragging.x=p.x-dragOffX;dragging.y=p.y-dragOffY;
}
function onUp(e){
  e.preventDefault();
  if(!dragging)return;
  const p=getP(e);
  const placed=tryPlace(dragging,p.x,p.y);
  if(!placed){snapBack(dragging);}
  dragging=null;
  if(game.state==='rush'){
    const remaining=books.filter(b=>!b.placed).length;
    if(remaining===0)buildRushBatch();
  }
}
canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp,{passive:false});

// ---- mute / pause controls ----
const btnMute=document.getElementById('btnMute');
const btnPause=document.getElementById('btnPause');
function refreshMuteBtn(){if(btnMute)btnMute.textContent=game.muted?'🔇':'🔊';}
function refreshPauseBtn(){if(btnPause)btnPause.textContent=game.paused?'▶':'⏸';}
function toggleMute(){game.muted=!game.muted;lsSet('bookshelfSort_muted',game.muted);refreshMuteBtn();}
function togglePause(){
  if(game.state!=='playing'&&game.state!=='rush')return;
  game.paused=!game.paused;refreshPauseBtn();
}
if(btnMute)btnMute.addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();toggleMute();});
if(btnPause)btnPause.addEventListener('click',(e)=>{e.preventDefault();e.stopPropagation();togglePause();});
refreshMuteBtn();refreshPauseBtn();

window.addEventListener('keydown',(e)=>{
  if(e.key==='m'||e.key==='M')toggleMute();
  if(e.key==='p'||e.key==='P')togglePause();
  if(e.key==='r'||e.key==='R'){if(game.state==='won'||game.state==='rushover'||game.state==='title')resetGame();}
});

let last=0;
function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},
  get books(){return books;},
  get shelves(){return SHELVES;},
  resetGame,buildRound,tryPlace,bookAt,shelfAt,update,draw,
  startRush,togglePause,toggleMute,
  SHELVES,BOOK_TITLES,TOTAL
};
</script>
</body>
</html>
