const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const rects = (a,b)=>a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

const randHash = n => { let x = Math.sin(n * 999.1337) * 10000; return x - Math.floor(x); };
function seeded(stage){let s=stage*928371+17; return ()=>{s=(s*1664525+1013904223)>>>0; return s/4294967296;};}

  ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right', ArrowUp:'jump', KeyW:'jump', Space:'jump',
  ShiftLeft:'dash', ShiftRight:'dash', KeyE:'interact'
};
window.addEventListener('keydown', e=>{
  if(e.code==='KeyP'){input.pausePressed=true; return;}
  const a=keyMap[e.code]; if(!a) return; e.preventDefault();
  if(a==='jump'&&!input.jump) input.jumpPressed=true;
  if(a==='dash'&&!input.dash) input.dashPressed=true;
  if(a==='interact'&&!input.interact) input.interactPressed=true;
  input[a]=true;
});
window.addEventListener('keyup', e=>{const a=keyMap[e.code]; if(a){e.preventDefault(); input[a]=false;}});
document.querySelectorAll('.btn').forEach(btn=>{

  const up=e=>{e.preventDefault(); input[a]=false;};
  btn.addEventListener('touchstart',down,{passive:false}); btn.addEventListener('touchend',up,{passive:false}); btn.addEventListener('touchcancel',up,{passive:false});

});

class AudioSystem{
  constructor(){this.ctx=null;this.master=null;this.musicGain=null;this.sfxGain=null;this.musicOn=true;this.sfxOn=true;this.volume=.55;this.current='';this.timer=null;this.noteIndex=0;}
  init(){if(this.ctx) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; this.ctx=new AC(); this.master=this.ctx.createGain(); this.musicGain=this.ctx.createGain(); this.sfxGain=this.ctx.createGain(); this.master.gain.value=this.volume; this.musicGain.gain.value=.18; this.sfxGain.gain.value=.55; this.musicGain.connect(this.master); this.sfxGain.connect(this.master); this.master.connect(this.ctx.destination);}
  ensure(){this.init(); if(this.ctx && this.ctx.state==='suspended') this.ctx.resume();}
  setVolume(mode){this.volume = mode==='high'? .8 : mode==='low'? .32 : .55; if(this.master) this.master.gain.value=this.volume;}
  toggleMusic(){this.musicOn=!this.musicOn; if(this.musicGain) this.musicGain.gain.value=this.musicOn?.18:0;}
  toggleSfx(){this.sfxOn=!this.sfxOn; if(this.sfxGain) this.sfxGain.gain.value=this.sfxOn?.55:0;}
  startTheme(name){this.ensure(); if(!this.ctx || this.current===name) return; this.current=name; clearInterval(this.timer); this.noteIndex=0; this.timer=setInterval(()=>this.tickMusic(), 360);}
  stopMusic(){clearInterval(this.timer); this.timer=null; this.current='';}
  soften(on){if(this.musicGain) this.musicGain.gain.setTargetAtTime(on?.06:.18, this.ctx.currentTime, .25);}
  tickMusic(){if(!this.ctx||!this.musicOn) return; const palettes={city:[392,494,587,659,587,494],swamp:[196,220,247,220,185,165],debt:[110,146,174,146,130,98],forest:[262,330,392,330,294,220],mountain:[330,392,494,587,659,587],boss:[98,147,196,147,233,196]}; const p=palettes[this.current]||palettes.city; const f=p[this.noteIndex++%p.length]; this.tone(f,.18,'triangle',.07,this.musicGain); if(this.noteIndex%4===0) this.tone(f/2,.24,'sine',.05,this.musicGain);}
  tone(freq,dur,type='sine',gain=.16,out){if(!this.ctx||(!this.sfxOn && out!==this.musicGain)) return; const o=this.ctx.createOscillator(); const g=this.ctx.createGain(); o.type=type; o.frequency.value=freq; g.gain.value=0; o.connect(g); g.connect(out||this.sfxGain); const t=this.ctx.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+.018); g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur+.03);}
  sfx(name){this.ensure(); if(!this.ctx||!this.sfxOn) return; const map={jump:[440,.12,'square'],token:[880,.08,'sine'],life:[660,.22,'triangle'],cat:[720,.14,'triangle'],dog:[250,.18,'sawtooth'],damage:[95,.18,'sawtooth'],victory:[784,.4,'triangle'],buy:[620,.12,'sine'],dash:[180,.1,'square']}; const m=map[name]||map.token; this.tone(m[0],m[1],m[2],.18,this.sfxGain); if(name==='victory') setTimeout(()=>this.tone(988,.35,'triangle',.16,this.sfxGain),120);}
  alarm(){this.ensure(); if(!this.ctx||!this.sfxOn) return; this.tone(620,.13,'square',.22,this.sfxGain); setTimeout(()=>this.tone(420,.15,'square',.22,this.sfxGain),120);}
}

function makePlatform(x,y,w,h,type='ground'){return {x,y,w,h,type};}
function makeToken(x,y){return {x,y,w:16,h:16,taken:false};}
function makeEnemy(x,y,type='bot'){return {x,y,w:32,h:32,vx:type==='cloud'?-.7:.8,type,alive:true,phase:randHash(x+y)*6.28,damage: type==='spirit'?18:12};}
function makeCrow(x,y){return {x,y,w:38,h:26,baseY:y,vx:-1.2-randHash(x)*.9,phase:randHash(x)*6.28,taken:false};}
function makeAnimal(x,y,type){return {x,y,w:34,h:28,type,used:false};}
function makePower(x,y,type){return {x,y,w:22,h:22,type,taken:false,phase:0};}

function createStage(n){
  const r=seeded(n); const world=worlds[Math.floor((n-1)/10)]; const local=(n-1)%10+1;
  const len=2600 + local*120 + Math.floor(n/5)*40; const groundY=430;
  const pitCount=clamp(1+Math.floor(n/7),1,5); const pits=[];
  let base=560;
  for(let i=0;i<pitCount;i++){
    const w=140 + Math.floor(r()*70) + Math.floor(local*4);
    let x=base + i*((len-1150)/Math.max(1,pitCount-1)) + Math.floor((r()-.5)*160);
    x=clamp(x,520,len-650);
    const label=pitLabels[(n*3+i*5)%pitLabels.length];
    pits.push({x,w,y:groundY,h:86,bottomY:500,label,active:false});
  }
  pits.sort((a,b)=>a.x-b.x);
  const platforms=[]; let cur=0;
  for(const p of pits){ if(p.x-cur>80) platforms.push(makePlatform(cur,groundY,p.x-cur,80)); platforms.push(makePlatform(p.x,p.bottomY,p.w,48,'pitfloor')); cur=p.x+p.w; }
  if(len-cur>80) platforms.push(makePlatform(cur,groundY,len-cur,80));
  const floats=[];
  for(let i=0;i<6+Math.floor(n/6);i++){
    const x=360+i*360+Math.floor((r()-.5)*100); const y=310-Math.floor(r()*90); const w=100+Math.floor(r()*80);
    if(!overlapsPit(x,w,pits,30)){ const fp=makePlatform(clamp(x,250,len-450),y,w,18,(i%4===0?'moving':'float')); if(fp.type==='moving'){fp.baseX=fp.x; fp.range=45+Math.floor(r()*45); fp.speed=.8+r()*.8; fp.phase=r()*6.28;} floats.push(fp); }
  }
  platforms.push(...floats);
  const tokens=[]; for(let i=0;i<22+Math.floor(n/2);i++){ const sx=180+i*95+Math.floor(r()*70); const y=(i%5===0)?280:390; if(!overlapsPit(sx,30,pits,25)) tokens.push(makeToken(clamp(sx,120,len-180),y)); }
  const enemies=[]; for(let i=0;i<2+Math.floor(n/5);i++){ const x=520+i*430+Math.floor(r()*120); if(!overlapsPit(x,50,pits,80)) enemies.push(makeEnemy(clamp(x,300,len-400),398, ['bot','cloud','bug','spirit'][i%4])); }
  const animals=[]; if(n%2===0) animals.push(makeAnimal(findSafeX(platforms,pits,760+local*80),402,'cat')); if(n%3===0) animals.push(makeAnimal(findSafeX(platforms,pits,1180+local*90),402,'dog'));
  const crows=[]; if(n%2===1 || n%5===0) crows.push(makeCrow(850+local*120,250-r()*50)); if(n%8===0) crows.push(makeCrow(1600,230));
  const powerups=[]; if(n%4===0) powerups.push(makePower(findSafeX(platforms,pits,1100),360,'coffee')); if(n%6===0) powerups.push(makePower(findSafeX(platforms,pits,1500),330,'shield')); if(n%5===0) powerups.push(makePower(findSafeX(platforms,pits,1900),340,'agency'));
  const signs=[];
  signs.push({x:findSafeX(platforms,pits,380+local*55),y:groundY-108,w:210,h:70,type:'childfree',text:childfreeTexts[n%childfreeTexts.length]});
  signs.push({x:findSafeX(platforms,pits,1350+local*55),y:groundY-92,w:230,h:62,type:'anti',text:antiTexts[(n+3)%antiTexts.length]});
  const fiction = ['Peace Mart','Boundary Shop','Time Bank','Quiet Café','Consent Books','Free Path Market'];
  if(n%3===1) signs.push({x:findSafeX(platforms,pits,1900),y:groundY-128,w:185,h:78,type:'logo',text:fiction[n%fiction.length]});
  const buildings=[];
  const type=shopTypes[(n-1)%shopTypes.length];
  if(type!=='Bank') buildings.push({type,x:findSafeX(platforms,pits,Math.floor(len*.46),104),y:groundY-116,w:104,h:116,entered:false});
  buildings.push({type:'Bank',x:findSafeX(platforms,pits,len-310,108),y:groundY-118,w:108,h:118,entered:false,endBank:true});
  const boss = n===50 ? {x:len-720,y:groundY-120,w:120,h:120,hp:9,maxHp:9,vx:1.1,cd:0,stones:[],waves:[]} : null;
  const level={n,world,local,len,groundY,platforms,pits,tokens,enemies,animals,crows,powerups,signs,buildings,boss,endX:len-120,theme:world.music,validated:false};
  validateStage(level);
  return level;
}
function overlapsPit(x,w,pits,pad=0){return pits.some(p=>x+w>p.x-pad && x<p.x+p.w+pad);}
function findSafeX(platforms,pits,target,bw){
  bw = bw||110; const inset=18;
  // Prefer ground platforms wide enough to hold the whole footprint, nearest to target.
  const grounds = platforms.filter(p=>p.type==='ground' && p.w >= bw+inset*2)
    .sort((a,b)=>Math.abs((a.x+a.w/2)-target)-Math.abs((b.x+b.w/2)-target));
  for(const p of grounds){
    const lo=p.x+inset, hi=p.x+p.w-bw-inset; if(hi<lo) continue;
    const x=clamp(target,lo,hi);
    // A footprint kept fully inside one ground platform cannot overlap a pit.
    if(!overlapsPit(x,bw,pits,4)) return x;
  }
  // Last resort: the widest ground platform available.
  const widest = platforms.filter(p=>p.type==='ground').sort((a,b)=>b.w-a.w)[0];
  if(widest) return clamp(target, widest.x+inset, Math.max(widest.x+inset, widest.x+widest.w-bw-inset));
  return clamp(target,120,2200);
}
function validateStage(level){
  for(const b of level.buildings){
    const inside = level.platforms.some(p=>p.type==='ground' && b.x>=p.x+2 && b.x+b.w<=p.x+p.w-2);
    const bad = !inside || overlapsPit(b.x,b.w,level.pits,4);
    if(bad){ b.x = findSafeX(level.platforms, level.pits, b.endBank?level.len-330:Math.floor(level.len*.45), b.w); }
  }
  for(const e of level.enemies){ for(const b of level.buildings){ if(Math.abs(e.x-b.x)<140) e.x += 180; } }
  level.validated=true;
}

function resetGame(){
  game.stageNo=1; Object.assign(game.resources,{lives:3,health:100,maxHealth:100,energy:100,maxEnergy:100,tokens:0,agency:0,score:0,investment:0,pension:false,insurance:false,pitInsurance:false,investmentBonus:0,clarity:0,shield:0,crisisPlan:false,petCompanion:false,animalBoost:false,dashBoost:0,damageReduction:0});
  loadStage(1,true); game.state='playing';
}
function loadStage(n,hard=false){
  game.stageNo=n; game.level=createStage(n); game.camera.x=0; game.floaters.length=0; game.checkpoint={x:80,y:330};
  Object.assign(player,{x:80,y:330,vx:0,vy:0,onGround:false,jumps:0,dashCd:0,damageCd:0,triggerPit:null,triggerTime:0,escapedReward:false});
  if(hard) game.resources.health=game.resources.maxHealth;
  audio.startTheme(game.level.theme);
}
function respawn(){
  game.resources.health=game.resources.maxHealth; Object.assign(player,{x:game.checkpoint.x,y:game.checkpoint.y,vx:0,vy:0,triggerPit:null,triggerTime:0,escapedReward:false,damageCd:1.2});
}
function loseLife(){
  const r=game.resources; r.lives--; audio.sfx('damage'); game.shake=18;
  if(r.lives<0){game.state='gameover'; audio.stopMusic();} else respawn();
}

function update(dt){
  game.dt=dt; game.time+=dt; if(input.pausePressed){input.pausePressed=false; if(game.state==='playing') game.state='pause'; else if(game.state==='pause') game.state='playing';}
  if(game.state==='title'||game.state==='gameover'||game.state==='win'){
    audio.soften(false);
    if(input.jumpPressed||input.interactPressed){audio.ensure(); resetGame();}
    clearPressed(); return;
  }
  if(game.state==='pause'){ clearPressed(); return; }
  if(game.state==='shop'){ updateShop(); clearPressed(); return; }
  if(game.state==='bank'){ updateBank(); clearPressed(); return; }
  updatePlaying(dt); clearPressed();
}
function clearPressed(){input.jumpPressed=false; input.dashPressed=false; input.interactPressed=false;}

function updateMovingPlatforms(dt){
  for(const p of game.level.platforms){
    if(p.type==='moving'){
      const old=p.x; p.x=p.baseX+Math.sin(game.time*p.speed+p.phase)*p.range;
      if(player.onGround && Math.abs(player.y+player.h-p.y)<3 && player.x+player.w>old && player.x<old+p.w){ player.x += p.x-old; }
    }
  }
}

function updatePitTrigger(dt){

    player.triggerTime+=dt; game.shake=Math.max(game.shake,9); game.flash=Math.max(game.flash,.12);

/* ============================================================
   RENDERING LAYER — professional vector style.
   Pure visuals only; no game logic. game.time drives animation.

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rgrad(x,y,r,stops){const g=ctx.createRadialGradient(x,y,0,x,y,r);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rrPath(x,y,w,h,r){r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function roundRect(x,y,w,h,r,fill){rrPath(x,y,w,h,r);if(fill)ctx.fill();else ctx.stroke();}
function shadowBlob(x,y,rx,ry,a){ctx.save();ctx.fillStyle='rgba(8,6,12,'+(a==null?.22:a)+')';ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,7);ctx.fill();ctx.restore();}

function draw(){
  ctx.save(); ctx.clearRect(0,0,W,H);
  if(game.state==='title'){drawTitle(); ctx.restore(); return;}
  if(game.state==='gameover'){drawEnd(false); ctx.restore(); return;}
  if(game.state==='win'){drawEnd(true); ctx.restore(); return;}
  const sh=game.shake, sx=(Math.random()-.5)*sh, sy=(Math.random()-.5)*sh; ctx.translate(sx,sy);
  drawWorld();
  ctx.translate(-game.camera.x,0); drawLevelObjects(); drawPlayer(); ctx.translate(game.camera.x,0);
  drawWeather();
  // soft vignette for depth
  ctx.fillStyle=rgrad(W/2,H*.46,W*.78,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.30)']]); ctx.fillRect(0,0,W,H);
  drawHUD(); drawFloaters();
  if(player.triggerPit) drawTriggeredOverlay();
  if(game.state==='pause') drawModal('PAUSED','Press P to continue.');
  if(game.state==='shop') drawShop();

/* ---------- Parallax background ---------- */
function drawWorld(){
  const L=game.level, w=L.world, theme=w.music, cam=game.camera.x;
  // sky
  ctx.fillStyle=lgrad(0,0,0,H,[[0,w.sky[0]],[1,w.sky[1]]]); ctx.fillRect(0,0,W,H);
  // sun / moon
  const night = (theme==='debt'||theme==='swamp');
  const lx=W*.78, ly=120;
  ctx.fillStyle=rgrad(lx,ly,150,[[0, night?'rgba(180,200,255,.30)':'rgba(255,240,200,.55)'],[1,'rgba(255,240,200,0)']]); ctx.fillRect(0,0,W,H*.7);
  ctx.fillStyle= night?'#e8edff':'#fff4cf'; ctx.beginPath(); ctx.arc(lx,ly,night?26:30,0,7); ctx.fill();
  if(night){ctx.fillStyle=w.sky[0]; ctx.beginPath(); ctx.arc(lx+10,ly-6,night?24:28,0,7); ctx.fill();} // moon crescent
  // far parallax
  if(theme==='city'||theme==='debt'){
    skyline(.18, 150, 250, theme==='debt'?'#1a2138':'#9fb6d8', .55, theme==='debt');
    skyline(.34, 120, 300, theme==='debt'?'#222a47':'#7e98c4', .8, theme==='debt');
  } else if(theme==='forest'||theme==='swamp'){
    treeline(.18, 110, 250, theme==='swamp'?'#1f3024':'#2f5d3a', .5);
    treeline(.36, 90, 300, theme==='swamp'?'#27402c':'#3c7048', .8);
  } else { // mountain
    mountains(.16, '#bcd2ef', 250); mountains(.32, '#8fb0dd', 300);
  }
  // ground haze band behind platforms
  ctx.fillStyle=lgrad(0,430,0,H,[[0,'rgba(0,0,0,.05)'],[1,'rgba(0,0,0,.32)']]); ctx.fillRect(0,432,W,H-432);
}
function skyline(f,h,space,color,alpha,neon){
  const base=-((game.camera.x*f)%space); ctx.save(); ctx.globalAlpha=alpha;
  for(let x=base-space;x<W+space;x+=space){const i=Math.round((x-base)/space);
    const bw=space*.62, bh=h+((i*53)%70); const bx=x+space*.18, by=440-bh;
    ctx.fillStyle=color; roundRect(bx,by,bw,bh,4,true);
    if(neon){ctx.fillStyle='rgba(120,220,255,.5)';for(let r=0;r<4;r++)for(let c=0;c<3;c++){if(((i+r+c)%2))ctx.fillRect(bx+8+c*(bw-16)/3,by+12+r*16,6,8);}}
    else {ctx.fillStyle='rgba(255,255,255,.14)';for(let r=0;r<4;r++)for(let c=0;c<3;c++){if(((i+r*c)%3===0))ctx.fillRect(bx+8+c*(bw-16)/3,by+12+r*18,7,9);}}
  } ctx.restore();
}
function treeline(f,h,space,color,alpha){
  const base=-((game.camera.x*f)%space); ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=color;
  for(let x=base-space;x<W+space;x+=space){const i=Math.round((x-base)/space); const cx=x+space*.5, th=h+((i*37)%60), by=442;
    ctx.fillRect(cx-4,by-th*.45,8,th*.45); // trunk
    ctx.beginPath(); ctx.moveTo(cx,by-th); ctx.lineTo(cx-26,by-th*.4); ctx.lineTo(cx+26,by-th*.4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx,by-th*.78); ctx.lineTo(cx-30,by-th*.18); ctx.lineTo(cx+30,by-th*.18); ctx.closePath(); ctx.fill();
  } ctx.restore();
}
function mountains(f,color,h){
  const space=420, base=-((game.camera.x*f)%space); ctx.save(); ctx.fillStyle=color;
  for(let x=base-space;x<W+space;x+=space){const i=Math.round((x-base)/space); const peak=h+((i*61)%80);
    ctx.beginPath(); ctx.moveTo(x-40,442); ctx.lineTo(x+space*.5,442-peak); ctx.lineTo(x+space+40,442); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.beginPath(); ctx.moveTo(x+space*.5,442-peak); ctx.lineTo(x+space*.5-26,442-peak+44); ctx.lineTo(x+space*.5+26,442-peak+44); ctx.closePath(); ctx.fill(); ctx.fillStyle=color;

}

/* ---------- Weather ---------- */
function drawWeather(){

  else if(Wth==='wind'){ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=2;for(let i=0;i<16;i++){const x=(i*80+t*180)%W,y=70+(i*43)%260;ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(x+22,y-6,x+40,y);ctx.stroke();}}
  else {ctx.fillStyle='rgba(255,255,255,.22)';for(let i=0;i<6;i++){const x=(i*230-(game.camera.x*.25)%230);const y=70+Math.sin(i*1.7)*30,s=44+i%3*14;ctx.beginPath();ctx.arc(x,y,s*.4,0,7);ctx.arc(x+s*.3,y-s*.14,s*.32,0,7);ctx.arc(x+s*.62,y,s*.36,0,7);ctx.fill();}}
}

/* ---------- World objects ---------- */
function drawLevelObjects(){
  const L=game.level, cam=game.camera.x, view={x:cam-160,y:-160,w:W+320,h:H+320};
  for(const p of L.platforms){ if(rects(p,view)) drawPlatform(p,L); }
  for(const pit of L.pits){ if(pit.x+pit.w>=cam-60&&pit.x<=cam+W+60) drawPit(pit); }
  for(const s of L.signs){ if(s.x+s.w>=cam&&s.x<=cam+W) drawSign(s); }
  for(const b of L.buildings){ if(b.x+b.w>=cam-20&&b.x<=cam+W+20) drawBuilding(b); }
  for(const t of L.tokens){ if(!t.taken&&t.x>cam-30&&t.x<cam+W+30) drawToken(t); }
  for(const p of L.powerups){ if(!p.taken&&p.x>cam-40&&p.x<cam+W+40) drawPower(p); }
  for(const a of L.animals){ if(a.x+a.w>cam&&a.x<cam+W) drawAnimal(a); }
  for(const c of L.crows){ if(!c.taken&&c.x+c.w>cam&&c.x<cam+W) drawCrow(c); }
  for(const e of L.enemies){ if(e.alive&&e.x+e.w>cam&&e.x<cam+W) drawEnemy(e); }
  if(L.boss&&L.boss.hp>0) drawBoss(L.boss);
  drawGoal(L);
}
function drawPlatform(p,L){
  const w=L.world;
  if(p.type==='pitfloor'){
    ctx.fillStyle=lgrad(0,p.y,0,p.y+p.h,[[0,'#3a2330'],[1,'#1a1018']]); roundRect(p.x,p.y,p.w,p.h,4,true);
    ctx.fillStyle='#120a10'; for(let x=p.x+6;x<p.x+p.w-6;x+=16){ctx.beginPath();ctx.moveTo(x,p.y+2);ctx.lineTo(x+6,p.y+12);ctx.lineTo(x-6,p.y+12);ctx.closePath();ctx.fill();}
    return;
  }
  shadowBlob(p.x+p.w/2,p.y+p.h-2,p.w*.5,7,.18);
  // body
  ctx.fillStyle=lgrad(0,p.y,0,p.y+p.h,[[0,w.block],[1,'rgba(0,0,0,.55)']]); roundRect(p.x,p.y,p.w,p.h,7,true);
  // brick/stone seams
  ctx.strokeStyle='rgba(0,0,0,.16)';ctx.lineWidth=1;
  for(let yy=p.y+18;yy<p.y+p.h-4;yy+=18){ctx.beginPath();ctx.moveTo(p.x+3,yy);ctx.lineTo(p.x+p.w-3,yy);ctx.stroke();}
  // top cap (grass / stone)
  const cap=Math.min(12,p.h*.4);
  ctx.fillStyle=w.ground; rrPath(p.x,p.y,p.w,cap+4,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)'; ctx.fillRect(p.x+6,p.y+2,p.w-12,2);
  if(p.type!=='ground'){ // floating slabs get a metal rim
    ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1.5;roundRect(p.x+1.5,p.y+1.5,p.w-3,p.h-3,6,false);
  } else { // grass tufts for ground
    ctx.fillStyle=w.ground; for(let x=p.x+10;x<p.x+p.w-8;x+=22){ctx.beginPath();ctx.moveTo(x,p.y+2);ctx.lineTo(x+3,p.y-5);ctx.lineTo(x+6,p.y+2);ctx.closePath();ctx.fill();}

}
function drawPit(pit){

function drawGoal(L){

  ctx.fillStyle='#0c2a1d'; ctx.font='bold 11px Arial'; ctx.textAlign='center'; ctx.fillText('NEXT',x+30,top+27);

/* ---------- Tokens & power-ups ---------- */
function drawToken(t){
  const cx=t.x+8, cy=t.y+8+Math.sin(game.time*3+t.x*.05)*2.4;
  const sc=Math.abs(Math.cos(game.time*4+t.x*.07)); // spin

  shadowBlob(0,12,7*(.5+sc*.5),2.4,.18);

  ctx.strokeStyle='#b9831c'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(0,0,8.5,0,7); ctx.stroke();
  ctx.fillStyle='#a86f16'; ctx.font='bold 10px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('✶',0,0.5); ctx.textBaseline='alphabetic';
  ctx.restore();
  ctx.fillStyle='rgba(255,255,255,.8)'; ctx.beginPath(); ctx.arc(cx-2,cy-3,1.4*(.5+sc),0,7); ctx.fill();

    ctx.strokeStyle='#cfc4b4'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx+7,cy+1,4,-1.2,1.2); ctx.stroke();

    ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(cx-3,cy-8); ctx.quadraticCurveTo(cx-6,cy-12,cx-3,cy-16); ctx.moveTo(cx+1,cy-8); ctx.quadraticCurveTo(cx+4,cy-12,cx+1,cy-16); ctx.stroke();
  } else if(p.type==='shield'){
    ctx.fillStyle=lgrad(cx,cy-10,cx,cy+10,[[0,'#bff2ff'],[1,'#4fb9d8']]); ctx.beginPath(); ctx.moveTo(cx,cy-10); ctx.lineTo(cx+9,cy-5); ctx.lineTo(cx+9,cy+3); ctx.quadraticCurveTo(cx,cy+13,cx-9,cy+3); ctx.lineTo(cx-9,cy-5); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx-3.5,cy); ctx.lineTo(cx-1,cy+3.5); ctx.lineTo(cx+4,cy-3.5); ctx.stroke();
  } else {

    ctx.fillStyle=lgrad(0,-10,0,10,[[0,'#c9ffe9'],[1,'#52d8a8']]); ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.ellipse(0,0,11,5,0,0,7); ctx.stroke();

/* ---------- Buildings ---------- */
function drawBuilding(b){
  const d=placeData[b.type]||placeData.Bank, isBank=b.type==='Bank', t=game.time;
  shadowBlob(b.x+b.w/2,b.y+b.h,b.w*.55,8,.26);
  // facade
  ctx.fillStyle=lgrad(b.x,b.y,b.x,b.y+b.h,[[0,tint(d.color,1.12)],[1,tint(d.color,.7)]]); roundRect(b.x,b.y+10,b.w,b.h-10,7,true);
  ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=1.5; roundRect(b.x,b.y+10,b.w,b.h-10,7,false);
  // cornice / roof
  ctx.fillStyle=tint(d.color,.55); roundRect(b.x-4,b.y+4,b.w+8,16,5,true);
  if(isBank){ // classical pediment + columns
    ctx.fillStyle=tint(d.color,1.2); ctx.beginPath(); ctx.moveTo(b.x-6,b.y+8); ctx.lineTo(b.x+b.w/2,b.y-14); ctx.lineTo(b.x+b.w+6,b.y+8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)'; for(let i=0;i<4;i++){const cx=b.x+14+i*((b.w-28)/3); ctx.fillRect(cx-3,b.y+22,6,b.h-58);}
  } else { // striped awning

    for(let i=0;i<6;i++){ctx.fillStyle=i%2?a1:a2; ctx.beginPath(); ctx.moveTo(b.x+i*(b.w/6),b.y+22); ctx.lineTo(b.x+(i+1)*(b.w/6),b.y+22); ctx.lineTo(b.x+(i+1)*(b.w/6),b.y+34); ctx.lineTo(b.x+i*(b.w/6)+6,b.y+40); ctx.closePath(); ctx.fill();}
  }
  // signage band
  ctx.fillStyle='rgba(8,10,16,.55)'; roundRect(b.x+8,b.y+(isBank?24:46),b.w-16,18,5,true);
  ctx.fillStyle='#fff7cc'; ctx.font='bold 13px Arial'; ctx.textAlign='center'; ctx.fillText(d.short,b.x+b.w/2,b.y+(isBank?37:59));
  // windows (warm light)

  for(let i=0;i<2;i++){const wx=b.x+10+i*(winw+10);
    ctx.fillStyle=lgrad(wx,wy,wx,wy+22,[[0,'#ffe6a6'],[1,'#f0b24e']]); roundRect(wx,wy,winw,22,3,true);
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(wx+winw/2,wy); ctx.lineTo(wx+winw/2,wy+22); ctx.moveTo(wx,wy+11); ctx.lineTo(wx+winw,wy+11); ctx.stroke();
  }
  // door
  const dw=30, dx=b.x+b.w/2-dw/2, dy=b.y+b.h-40;
  ctx.fillStyle=lgrad(dx,dy,dx,dy+40,[[0,'#5a3f2a'],[1,'#3a2718']]); roundRect(dx,dy,dw,40,4,true);
  ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1; roundRect(dx+3,dy+3,dw-6,34,3,false);
  ctx.fillStyle='#f6d36b'; ctx.beginPath(); ctx.arc(dx+dw-7,dy+22,2.2,0,7); ctx.fill();
  // welcome mat
  ctx.fillStyle='rgba(255,216,107,.5)'; roundRect(dx-4,dy+40,dw+8,4,2,true);
  // enter prompt
  const near=Math.abs(centerX(player)-(b.x+b.w/2))<82 && Math.abs((player.y+player.h)-game.level.groundY)<70;
  if(near){const py=b.y-2+Math.sin(t*4)*2;
    ctx.fillStyle='rgba(12,14,22,.85)'; roundRect(b.x+b.w/2-66,py-26,132,24,8,true);
    ctx.fillStyle='#ffd86b'; ctx.font='bold 13px Arial'; ctx.textAlign='center'; ctx.fillText('Press E to enter',b.x+b.w/2,py-9);

}
function tint(hex,f){ // lighten(>1)/darken(<1) a #rrggbb
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r*f))|0; g=Math.max(0,Math.min(255,g*f))|0; b=Math.max(0,Math.min(255,b*f))|0;
  return 'rgb('+r+','+g+','+b+')';
}

/* ---------- Animals ---------- */
function drawAnimal(a){

  shadowBlob(cx,by,a.w*.5,4,.2);

  // head

  else {ctx.beginPath();ctx.ellipse(hx-10,hy-2,4,8,.4,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(hx+10,hy-2,4,8,-.4,0,7);ctx.fill();}
  // snout/eyes
  ctx.fillStyle='#241a14'; ctx.beginPath(); ctx.arc(hx-3,hy-1,1.6,0,7); ctx.arc(hx+5,hy-1,1.6,0,7); ctx.fill();

/* ---------- Crow ---------- */
function drawCrow(c){
  const t=game.time, flap=Math.sin(t*9+c.phase), cx=c.x+18, cy=c.y+13;
  ctx.fillStyle='#15161c';

  // head
  ctx.beginPath(); ctx.arc(cx+11,cy-4,6,0,7); ctx.fill();
  // beak
  ctx.fillStyle='#e0a020'; ctx.beginPath(); ctx.moveTo(cx+16,cy-5); ctx.lineTo(cx+24,cy-3); ctx.lineTo(cx+16,cy-1); ctx.closePath(); ctx.fill();
  // wings (flap)
  ctx.fillStyle='#101116';
  ctx.beginPath(); ctx.moveTo(cx-2,cy-2); ctx.quadraticCurveTo(cx-16,cy-6-flap*10,cx-22,cy+2-flap*6); ctx.quadraticCurveTo(cx-12,cy+2,cx-2,cy+4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+2,cy-2); ctx.quadraticCurveTo(cx+10,cy-8-flap*10,cx+8,cy+2-flap*6); ctx.quadraticCurveTo(cx+4,cy+1,cx+2,cy+4); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+12,cy-5,1.5,0,7); ctx.fill();
  ctx.fillStyle='#1a1a1f'; ctx.beginPath(); ctx.arc(cx+12.5,cy-5,.8,0,7); ctx.fill();
  ctx.fillStyle='rgba(120,160,255,.18)'; ctx.beginPath(); ctx.ellipse(cx-3,cy-2,6,3,0,0,7); ctx.fill();
}

/* ---------- Enemies ---------- */
function drawEnemy(e){
  const t=game.time, bob=Math.sin(t*3+e.phase)*3, cx=e.x+e.w/2, cy=e.y+e.h/2+bob;
  if(e.type==='cloud'){ // guilt cloud
    ctx.save(); ctx.globalAlpha=.92; ctx.fillStyle=lgrad(0,e.y,0,e.y+e.h,[[0,'#8893a8'],[1,'#5a6478']]);
    ctx.beginPath(); ctx.arc(cx-9,cy,11,0,7); ctx.arc(cx+9,cy,11,0,7); ctx.arc(cx,cy-7,12,0,7); ctx.arc(cx,cy+4,12,0,7); ctx.fill(); ctx.restore();
    ctx.fillStyle='#2a3142'; ctx.beginPath(); ctx.arc(cx-5,cy-2,2,0,7); ctx.arc(cx+5,cy-2,2,0,7); ctx.fill();
    ctx.strokeStyle='#2a3142'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(cx,cy+6,4,3.6,6.0); ctx.stroke();
    ctx.strokeStyle='rgba(150,180,220,.6)'; for(let i=-1;i<2;i++){ctx.beginPath();ctx.moveTo(cx+i*7,cy+12);ctx.lineTo(cx+i*7-2,cy+19);ctx.stroke();}
  } else if(e.type==='bug'){ // comparison bug

    ctx.strokeStyle='#3c5226'; ctx.lineWidth=2; for(let i=-1;i<2;i++){ctx.beginPath();ctx.moveTo(cx-8,cy+2);ctx.lineTo(cx-15,cy+8+i*3);ctx.moveTo(cx+8,cy+2);ctx.lineTo(cx+15,cy+8+i*3);ctx.stroke();}
    ctx.fillStyle=lgrad(0,e.y,0,e.y+e.h,[[0,'#9cc24f'],[1,'#5f8330']]); ctx.beginPath(); ctx.ellipse(cx,cy,e.w*.42,e.h*.45,0,0,7); ctx.fill();

    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='bold 12px Arial'; ctx.textAlign='center'; ctx.fillText('!',cx,cy+10);

/* ---------- Player (animated humanoid) ---------- */
function drawPlayer(){
  const R=game.resources, px=player.x, py=player.y, t=game.time;
  const moving=player.onGround&&Math.abs(player.vx)>30, air=!player.onGround;
  const cx=px+player.w/2;
  shadowBlob(cx,py+player.h+2,15,5,.25);
  ctx.save(); ctx.translate(cx,py); ctx.scale(player.face<0?-1:1,1);
  const sw=moving?Math.sin(t*11)*7:0, sw2=moving?Math.sin(t*11+Math.PI)*7:0;
  const bob=moving?Math.abs(Math.sin(t*11))*1.6:Math.sin(t*2.4)*1.0;
  ctx.lineCap='round';
  // legs
  ctx.strokeStyle='#26304a'; ctx.lineWidth=6;
  const hip=29, foot=42;
  function leg(dx){ctx.beginPath();ctx.moveTo(0,hip-2);ctx.lineTo(dx*.5,(hip+foot)/2);ctx.lineTo(dx,foot);ctx.stroke();ctx.fillStyle='#ffd86b';ctx.beginPath();ctx.ellipse(dx+1,foot,4.5,2.6,0,0,7);ctx.fill();}
  if(air){leg(-4);leg(6);} else {leg(sw*.7);leg(sw2*.7);}
  // back arm
  ctx.strokeStyle='#1f7d70'; ctx.lineWidth=5;
  (function(){const dx=-6+sw2*.5, sh=air?-5:0; ctx.beginPath();ctx.moveTo(-1,14-bob);ctx.lineTo(dx*.6,20-bob);ctx.lineTo(dx,26+sh-bob);ctx.stroke();ctx.fillStyle='#f0c69a';ctx.beginPath();ctx.arc(dx,26+sh-bob,2.6,0,7);ctx.fill();})();
  // torso
  ctx.save(); ctx.translate(0,-bob);
  const lean=moving?2:0;
  ctx.fillStyle=lgrad(-9,12,9,30,[[0,'#33b7a6'],[1,'#1f7d70']]); rrPath(-9+lean,12,18,18,6); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(lean,13); ctx.lineTo(lean,29); ctx.stroke();
  // front arm
  ctx.strokeStyle='#33b7a6'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(lean,14); ctx.lineTo(6+sw*.5,20); ctx.lineTo(9+sw*.6,air?20:26); ctx.stroke();
  ctx.fillStyle='#f0c69a'; ctx.beginPath(); ctx.arc(9+sw*.6,air?20:26,2.7,0,7); ctx.fill();
  // head
  ctx.fillStyle='#f0c69a'; ctx.beginPath(); ctx.arc(2,5,7,0,7); ctx.fill();
  ctx.fillStyle='#3a2e2a'; ctx.beginPath(); ctx.arc(2,3.5,7.4,Math.PI*1.02,Math.PI*2.06); ctx.fill(); ctx.fillRect(-5.4,2,3.5,3);
  ctx.fillStyle='#17171f'; ctx.beginPath(); ctx.arc(5,5,1.5,0,7); ctx.fill();
  ctx.strokeStyle='rgba(120,70,40,.5)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(4,8,2.2,.1,1.0); ctx.stroke();
  ctx.restore();
  if(R.shield>0){ctx.strokeStyle='rgba(150,255,240,'+(0.5+Math.sin(t*8)*0.22)+')'; ctx.lineWidth=2.4; ctx.beginPath(); ctx.arc(2,22,23,0,7); ctx.stroke(); ctx.fillStyle='rgba(150,255,240,.08)'; ctx.beginPath(); ctx.arc(2,22,23,0,7); ctx.fill();}
  ctx.restore();
  if(player.dashCd>0.12){ctx.fillStyle='rgba(150,255,240,.25)'; for(let i=1;i<=3;i++) roundRect(px-player.face*i*9, py+10+i*5, 11,4,2,true);}
}

canvas.addEventListener('pointerdown',e=>{
  audio.ensure();
  const p=canvasPoint(e);
  if(game.state==='title'||game.state==='gameover'||game.state==='win'){resetGame();return;}
  if(game.state==='shop'){
    const opts=shopOptions(game.activePlace.type);
    for(let i=0;i<opts.length;i++){
      const y=292+i*36;
      if(p.x>190&&p.x<730&&p.y>y-24&&p.y<y+10){const o=opts[i];applyShopEffect(o[2],safeCost(o[1]));return;}
    }
    if(p.y>405&&p.y<455){game.state='playing';audio.soften(false);}
    return;
  }
  if(game.state==='bank'){
    const ys=[282,316,350,384,418,452];
    for(let i=0;i<ys.length;i++) if(p.x>190&&p.x<740&&p.y>ys[i]-24&&p.y<ys[i]+10){bankBuy(i+1);return;}
    return;
  }
});


// ===== Test hook (harmless in production; used by jsdom harness) =====
window.__cfq = {
  get game(){return game;}, get player(){return player;}, get input(){return input;},
  createStage, validateStage, shopOptions, applyShopEffect, update, draw, loadStage, resetGame, loseLife, openShop, openBank,
  overlapsPit, worlds, placeData, pitLabels, audio
};

- 50 stages are generated from compact stage data across 5 worlds.
- Each stage includes vulnerability pits, signs, enemies, tokens, an optional place, and an end-stage bank.
- validateStage(stage) moves buildings away from pit edges and checks that entrances sit on safe ground platforms.
- Buildings can be entered with E or the mobile interact button; shops pause outside gameplay and return safely.
- Crows give +1 life, cats give tokens, dogs give agency.
- Pit labels use only vulnerability names; pit triggering causes screen shake, red overlay, and alarm sound.
- Music is generated by Web Audio API and changes by environment/world; boss music starts near the final boss.
- HUD is compact and kept at the top.
Known limitations:
- This is a canvas-drawn prototype, not a Phaser/Godot production build.
- Levels are generated rather than fully hand-authored, so some platform layouts may feel similar.
- Music is procedural and simple to keep the file mobile-safe.
- Store interiors are menu-based rather than separate explorable rooms.
