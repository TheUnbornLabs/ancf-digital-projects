<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Lantern Guide</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#02020a;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#hud-controls{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:10;}
#hud-controls button{width:44px;height:44px;border-radius:10px;border:1px solid rgba(220,180,60,.35);background:rgba(1,1,6,.78);color:#ffe080;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto;touch-action:manipulation;}
#hud-controls button:active{background:rgba(220,180,60,.25);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="hud-controls">
<button id="btnMute" title="Mute" aria-label="Mute">&#128266;</button>
<button id="btnPause" title="Pause" aria-label="Pause">&#10074;&#10074;</button>
</div>
<div id="hint">Move mouse / touch to guide the lantern through the dark &middot; collect light seeds &middot; avoid shadows &middot; P / Esc to pause</div>
<script>
'use strict';
// Lantern Guide (#83)
// Move a lantern (mouse/touch follow) through darkness collecting seeds of light.
// Shadow blobs labelled with obligations drift and chase loosely.
// Collect 20 seeds; 3 lives; 8 rounds.
// Theme: carrying your own light through social darkness.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const SEEDS_NEEDED=20;
const SHADOW_LABELS=['obey','conform','rush','breed','impress','oblige','sacrifice','shrink'];
const TOTAL=8;
const MIN_SPAWN_DIST=140;

// ---- localStorage helpers (private browsing can throw) ----
function lsGet(key,fallback){try{const v=localStorage.getItem(key);if(v===null)return fallback;const n=parseInt(v,10);return isNaN(n)?fallback:n;}catch(e){return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,String(val));}catch(e){}}

const game={state:'title',time:0,round:0,score:0,best:lsGet('lantern_guide_best',0),lives:3,collected:0,streak:0,bestStreak:lsGet('lantern_guide_best_streak',0),roundHitFree:true,shake:0,flash:0};
let lantern={x:W/2,y:H/2},seeds=[],shadows=[],particles=[],popups=[],rng,invulT=0,muted=false,prevState='playing';

function farEnoughFromCenter(x,y){return Math.hypot(x-W/2,y-H/2)>=MIN_SPAWN_DIST;}

function buildRound(r){
  r=Math.max(0,r|0);
  rng=seeded(r*6007+11);
  seeds=[];
  for(let i=0;i<SEEDS_NEEDED+5;i++){
    seeds.push({x:60+rng()*(W-120),y:60+rng()*(H-120),r:7,alpha:0,fadeIn:rng()*600,collected:false,golden:(i===SEEDS_NEEDED+4)&&r>0});
  }
  shadows=[];
  const numS=Math.min(2+r,9);
  for(let i=0;i<numS;i++){
    let x,y,tries=0;
    do{x=rng()*W;y=rng()*H;tries++;}while(!farEnoughFromCenter(x,y)&&tries<30);
    shadows.push({x,y,vx:(rng()-.5)*50,vy:(rng()-.5)*40,r:30,label:SHADOW_LABELS[i%SHADOW_LABELS.length],t:0,boss:false});
  }
  // boss-style pressure shadow on final round
  if(r===TOTAL-1){
    let x,y,tries=0;
    do{x=rng()*W;y=rng()*H;tries++;}while(!farEnoughFromCenter(x,y)&&tries<30);
    shadows.push({x,y,vx:(rng()-.5)*30,vy:(rng()-.5)*30,r:46,label:'expected',t:0,boss:true});
  }
  game.collected=0;
  game.roundHitFree=true;
  invulT=0;
  particles=[];
  popups=[];
  game.state='playing';
}
function resetGame(){game.round=0;game.score=0;game.lives=3;game.streak=0;buildRound(0);}

function spawnBurst(x,y,color){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2,sp=40+Math.random()*90;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:400+Math.random()*200,age:0,color:color||'200,240,120'});
  }
}
function spawnPopup(x,y,text,color){popups.push({x,y,text,age:0,life:700,color:color||'#ffe080'});}

function update(dt){
  dt=clamp(dt,0,48);
  const s=dt/1000;
  if(game.state==='playing')game.time+=dt;
  if(game.state!=='playing')return;
  if(invulT>0)invulT=Math.max(0,invulT-dt);
  if(game.shake>0)game.shake=Math.max(0,game.shake-dt);
  if(game.flash>0)game.flash=Math.max(0,game.flash-dt);
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.age+=dt;if(p.age>=p.life){particles.splice(i,1);continue;}p.x+=p.vx*s;p.y+=p.vy*s;p.vx*=0.94;p.vy*=0.94;}
  for(let i=popups.length-1;i>=0;i--){const p=popups[i];p.age+=dt;if(p.age>=p.life){popups.splice(i,1);continue;}p.y-=s*24;}
  // seeds fade in
  for(const sd of seeds){if(!sd.collected){sd.alpha=Math.min(1,(game.time-sd.fadeIn)/400);if(sd.alpha<0)sd.alpha=0;}}
  // collect seeds
  for(const sd of seeds){
    if(!sd.collected&&sd.alpha>0.3){
      const reach=22+(sd.golden?0:0);
      if(Math.hypot(lantern.x-sd.x,lantern.y-sd.y)<reach){
        sd.collected=true;
        game.collected++;
        game.streak++;
        if(game.streak>game.bestStreak){game.bestStreak=game.streak;lsSet('lantern_guide_best_streak',game.bestStreak);}
        const mult=1+Math.min(4,Math.floor(game.streak/5));
        const bonus=mult>1?' x'+mult:'';
        spawnBurst(sd.x,sd.y,sd.golden?'255,220,120':'200,240,120');
        spawnPopup(sd.x,sd.y,'+1'+bonus,sd.golden?'#ffe080':'#c8f078');
        sndCollect(mult);
        if(sd.golden){
          // temporary light-radius power-up
          game.lightBoostT=6000;
        }
        if(game.collected>=SEEDS_NEEDED){
          game.score++;
          if(game.roundHitFree){game.score++;spawnPopup(W/2,H/2-40,'NO-HIT CLEAR BONUS +1','#ffe080');}
          if(game.score>game.best){game.best=game.score;lsSet('lantern_guide_best',game.best);}
          sndWin2();
          const nextRound=game.round;
          setTimeout(()=>{game.round++;if(game.round>=TOTAL){sndWin();game.state='won';}else{buildRound(game.round);}},500);
        }
        break;
      }
    }
  }
  if(game.lightBoostT>0)game.lightBoostT=Math.max(0,game.lightBoostT-dt);
  // shadows chase
  for(const sh of shadows){
    sh.t+=dt;
    const dx=lantern.x-sh.x,dy=lantern.y-sh.y;
    const dist=Math.hypot(dx,dy)||1;
    const chase=(sh.boss?35:25)+Math.min(40,game.round*3);
    sh.vx+=dx/dist*chase*s*2;
    sh.vy+=dy/dist*chase*s*2;
    sh.vx*=0.96;sh.vy*=0.96;
    sh.x+=sh.vx*s;sh.y+=sh.vy*s;
    sh.x=clamp(sh.x,0,W);sh.y=clamp(sh.y,0,H);
    const hitReach=sh.r+14+(sh.boss?6:0);
    if(invulT<=0&&Math.hypot(lantern.x-sh.x,lantern.y-sh.y)<hitReach){
      game.lives--;
      invulT=1500;
      game.streak=0;
      game.roundHitFree=false;
      game.shake=350;
      game.flash=250;
      sndHit();
      if(game.lives<=0){
        game.lives=0;
        if(game.score>game.best){game.best=game.score;lsSet('lantern_guide_best',game.best);}
        sndLose();
        setTimeout(()=>game.state='gameover',400);
      }
    }
  }
}

function onMove(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  if(e.touches){lantern.x=(e.touches[0].clientX-rect.left)*sx;lantern.y=(e.touches[0].clientY-rect.top)*sy;}
  else{lantern.x=(e.clientX-rect.left)*sx;lantern.y=(e.clientY-rect.top)*sy;}
}
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});

// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(muted)return;
  const a=AC();if(!a)return;
  try{
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||0.15)+0.02);
  }catch(e){}
}
const sndCollect=(mult)=>tone(660+game.collected*10+(mult?mult*30:0),0.08,'sine',0.04);
const sndHit=()=>tone(200,0.2,'sawtooth',0.05);
const sndLose=()=>tone(150,0.4,'sawtooth',0.06);
const sndWin2=()=>{[528,660,792].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.06),i*60));};
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle='rgba(2,2,10,1)';ctx.fillRect(0,0,W,H);}
function drawLanternLight(){
  const boost=game.lightBoostT>0?40:0;
  const lr=120+20*Math.sin(game.time/600)+boost;
  const lg=ctx.createRadialGradient(lantern.x,lantern.y,0,lantern.x,lantern.y,lr);
  lg.addColorStop(0,'rgba(255,220,120,.18)');
  lg.addColorStop(0.5,'rgba(255,180,60,.07)');
  lg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lantern.x,lantern.y,lr,0,Math.PI*2);ctx.fill();
}
function drawSeeds(){
  for(const sd of seeds){
    if(sd.collected)continue;
    const a=sd.alpha;if(a<=0)continue;
    ctx.save();ctx.globalAlpha=a;
    ctx.shadowColor=sd.golden?'rgba(255,220,120,.7)':'rgba(200,240,120,.5)';
    ctx.shadowBlur=sd.golden?14:8;
    const sg=ctx.createRadialGradient(sd.x-2,sd.y-2,1,sd.x,sd.y,sd.r);
    if(sd.golden){sg.addColorStop(0,'rgba(255,240,180,.95)');sg.addColorStop(1,'rgba(230,180,40,.5)');}
    else{sg.addColorStop(0,'rgba(220,255,150,.9)');sg.addColorStop(1,'rgba(120,200,60,.4)');}
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sd.x,sd.y,sd.golden?sd.r*1.3:sd.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}
function drawShadows(){
  for(const sh of shadows){
    const pulse=0.3+0.2*Math.sin(sh.t/400);
    ctx.save();ctx.globalAlpha=pulse+0.2;
    const sg=ctx.createRadialGradient(sh.x,sh.y,0,sh.x,sh.y,sh.r*2);
    sg.addColorStop(0,sh.boss?'rgba(50,0,60,.9)':'rgba(20,0,40,.8)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sh.x,sh.y,sh.r*2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.6;
    ctx.fillStyle=sh.boss?'rgba(230,140,255,.7)':'rgba(180,120,220,.5)';
    ctx.font=(sh.boss?'bold 11px Arial':'bold 8px Arial');
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(sh.label,sh.x,sh.y);
    ctx.restore();
  }
}
function drawParticles(){
  for(const p of particles){
    const a=1-p.age/p.life;
    ctx.save();ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle='rgba('+p.color+','+a+')';
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
function drawPopups(){
  for(const p of popups){
    const a=1-p.age/p.life;
    ctx.save();ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.color;
    ctx.font='bold 13px Arial';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  }
}
function drawLantern(){
  const blink=invulT>0&&Math.floor(game.time/120)%2===0;
  // colorblind-friendly warning glyph during invulnerability window
  if(invulT>0){
    const pulse=0.5+0.5*Math.sin(game.time/90);
    ctx.save();ctx.globalAlpha=0.5+0.4*pulse;
    ctx.fillStyle='rgba(255,90,60,.9)';
    ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚠',lantern.x,lantern.y-26);
    ctx.restore();
  }
  if(blink)return;
  const bob=Math.sin(game.time/400)*3;
  ctx.shadowColor='rgba(255,200,80,.5)';ctx.shadowBlur=14;
  ctx.fillStyle='rgba(255,200,80,.8)';rr(lantern.x-10,lantern.y-14+bob,20,24,4);ctx.fill();
  ctx.fillStyle='rgba(255,240,180,.9)';ctx.beginPath();ctx.arc(lantern.x,lantern.y-2+bob,7,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}
function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(1,1,6,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#ffe080';ctx.font='bold 13px Arial';
  ctx.fillText('Lantern Guide — Round '+(game.round+1)+' / '+TOTAL,18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Seeds: '+game.collected+' / '+SEEDS_NEEDED+'  Lives: '+('♥').repeat(game.lives)+('♡').repeat(3-game.lives)+'  Streak: '+game.streak,18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Score '+game.score+'  Best '+game.best+'  Best streak '+game.bestStreak,W-18,8);
  ctx.restore();
}
function vignette(){
  const g=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,.85)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // low-life pulsing red vignette cue
  if(game.state==='playing'&&game.lives===1){
    const p=0.25+0.25*Math.sin(game.time/220);
    const rg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.9);
    rg.addColorStop(0,'rgba(180,0,0,0)');
    rg.addColorStop(1,'rgba(180,0,0,'+p+')');
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  }
  if(game.flash>0){
    const fa=game.flash/250*0.35;
    ctx.fillStyle='rgba(220,30,30,'+fa+')';
    ctx.fillRect(0,0,W,H);
  }
}
function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(1,1,6,.78)';ctx.fillRect(0,0,W,H);
  const pw=520,ph=340,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(5,4,14,.97)'],[1,'rgba(3,3,10,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(220,180,60,.22)';ctx.lineWidth=1.5;
  rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#ffe080';ctx.font='bold 34px Arial';
  ctx.fillText(title,W/2,py+62);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+100;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    let shx=0,shy=0;
    if(game.shake>0){const m=game.shake/350;shx=(Math.random()-.5)*10*m;shy=(Math.random()-.5)*10*m;ctx.translate(shx,shy);}
    drawBg();
    if(game.state!=='title'){
      drawLanternLight();
      drawSeeds();
      drawShadows();
      drawParticles();
      drawLantern();
      drawPopups();
    }
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.state==='paused'){
      drawHUD();
      ctx.save();
      ctx.fillStyle='rgba(1,1,6,.7)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#ffe080';ctx.font='bold 30px Arial';ctx.textAlign='center';
      ctx.fillText('Paused',W/2,H/2-10);
      ctx.fillStyle='rgba(234,242,246,.8)';ctx.font='14px Arial';
      ctx.fillText('Tap pause button or press P / Esc to resume',W/2,H/2+22);
      ctx.restore();
    }
    if(game.state==='title')panelDraw('Lantern Guide',['Move mouse or touch to guide your lantern.','Collect '+SEEDS_NEEDED+' seeds of light per round.','Shadow blobs will chase you — 3 lives.','8 rounds.','','Carry your own light through the dark.','','Click / tap to begin.']);
    else if(game.state==='won')panelDraw('Light Carried! ✓',['Score: '+game.score+' / '+(TOTAL*2),'Best: '+game.best,'Best streak: '+game.bestStreak,'','Every seed found. Every shadow survived.','','Click / tap to play again.']);
    else if(game.state==='gameover')panelDraw('Darkness Closed In',['Score: '+game.score+'  Best: '+game.best,'Best streak: '+game.bestStreak,'','Your lantern still flickers. Try again.','','Click / tap to retry.']);
    ctx.restore();
  }catch(e){}
}

function togglePause(){
  if(game.state==='playing'){prevState='playing';game.state='paused';}
  else if(game.state==='paused'){game.state=prevState||'playing';}
}
function toggleMute(){muted=!muted;btnMute.textContent=muted?'🔇':'🔊';}

function onDown(e){
  e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'||game.state==='won'||game.state==='gameover'){resetGame();}
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);onMove(e);},{passive:false});

// keyboard: bonus input, not the only input
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){
    if(game.state==='playing'||game.state==='paused')togglePause();
  }
  if(e.key==='m'||e.key==='M'){toggleMute();}
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// on-screen HUD controls (real HTML buttons, 44px+ tap targets)
const btnPause=document.getElementById('btnPause');
const btnMute=document.getElementById('btnMute');
btnPause.addEventListener('click',()=>{
  if(game.state==='playing'||game.state==='paused')togglePause();
  btnPause.textContent=game.state==='paused'?'▶':'❙❙';
});
btnMute.addEventListener('click',toggleMute);

let last=0;
function loop(ts){
  if(!last)last=ts;
  const dt=ts-last;
  last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
game.state='title';
draw();
requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},
  get lantern(){return lantern;},
  get seeds(){return seeds;},
  get shadows(){return shadows;},
  get particles(){return particles;},
  get keys(){return keys;},
  resetGame,buildRound,update,draw,togglePause,toggleMute,
  SEEDS_NEEDED,TOTAL,SHADOW_LABELS
};
</script>
</body>
</html>
