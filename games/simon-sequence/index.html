<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Value Sequence</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#060408;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#ctrls{position:fixed;top:10px;right:10px;z-index:10;display:flex;gap:8px;}
#ctrls button{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(160,120,255,.4);background:rgba(3,2,6,.78);color:#c0a0ff;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
#ctrls button:active{background:rgba(160,120,255,.25);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="muteBtn" title="Mute/unmute" aria-label="Mute">&#128266;</button>
  <button id="pauseBtn" title="Pause/resume" aria-label="Pause">&#10074;&#10074;</button>
</div>
<script>
'use strict';
// Value Sequence (#32) — Simon-style memory game
// Watch the sequence of values lighting up; repeat it back.
// Each round adds one more to the sequence.
// Theme: remembering what matters to you, one value at a time.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const VALUES=[
  {name:'Rest',    col:'#5be0b0', dark:'#1a5040'},
  {name:'Joy',     col:'#ffd560', dark:'#504010'},
  {name:'Agency',  col:'#6090ff', dark:'#102060'},
  {name:'Peace',   col:'#c070f0', dark:'#401060'},
  {name:'Focus',   col:'#f07070', dark:'#501020'},
  {name:'Growth',  col:'#80e870', dark:'#105010'},
];
const R=80,CX=W/2,CY=H/2;
// arrange 6 values in a hexagon
const POSITIONS=VALUES.map((_,i)=>{const a=(i/6)*Math.PI*2-Math.PI/2;return{x:CX+Math.cos(a)*200,y:CY+Math.sin(a)*190};});

// ---- persistence ----
const BEST_KEY='valueSequenceBest';
function loadBest(){try{const v=parseInt(localStorage.getItem(BEST_KEY),10);return Number.isFinite(v)&&v>0?v:0;}catch(e){return 0;}}
function saveBest(v){try{localStorage.setItem(BEST_KEY,String(v));}catch(e){}}

const game={state:'title',time:0,level:0,best:0,shakeT:0,muted:false,paused:false,resolving:false,popupT:0,popupText:'',peekUsed:false};
game.best=loadBest();
let sequence=[],playerSeq=[],showing=false,showIdx=0,showT=0,litIdx=-1,rng,waitingInput=false;
let wrongIdx=-1,wrongT=0; // localized wrong-tap flash
let particles=[];
const BASE_SHOW_DUR=600,BASE_PAUSE_DUR=300;
const MIN_SHOW_DUR=220,MIN_PAUSE_DUR=110; // clamped floor so late levels never go to 0/negative
let SHOW_DUR=BASE_SHOW_DUR,PAUSE_DUR=BASE_PAUSE_DUR;
function updateSpeedForLevel(){
  // clamped speed-up: shrink toward floor as level increases, never below floor, never negative
  const shrink=Math.min(1,Math.max(0,(game.level-1))*0.04);
  SHOW_DUR=Math.max(MIN_SHOW_DUR,Math.round(BASE_SHOW_DUR-(BASE_SHOW_DUR-MIN_SHOW_DUR)*shrink));
  PAUSE_DUR=Math.max(MIN_PAUSE_DUR,Math.round(BASE_PAUSE_DUR-(BASE_PAUSE_DUR-MIN_PAUSE_DUR)*shrink));
}
function seededRng(){rng=seeded(game.level*4481+7);}
function resetGame(){
  sequence=[];playerSeq=[];game.level=0;game.shakeT=0;game.resolving=false;game.paused=false;
  game.popupT=0;game.popupText='';game.peekUsed=false;
  litIdx=-1;prevLit=-1;wrongIdx=-1;wrongT=0;particles=[];waitingInput=false;showing=false;
  // Both callers (pointer and key) come straight from the title or gameover screen and
  // expect a live round; without this the gameover state persisted and the player was
  // stuck watching "Sequence Broken" forever.
  game.state='playing';
  seededRng();nextRound();
}
function nextRound(){game.level++;playerSeq=[];sequence.push(Math.floor(rng()*VALUES.length));updateSpeedForLevel();showSequence();}
function showSequence(){showing=true;waitingInput=false;showIdx=0;showT=0;litIdx=-1;}
function spawnBurst(idx){
  const p=POSITIONS[idx];const col=VALUES[idx].col;
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.2;
    particles.push({x:p.x,y:p.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:400+Math.random()*200,age:0,col});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];pt.age+=dt;pt.x+=pt.vx*(dt/16);pt.y+=pt.vy*(dt/16);pt.vx*=0.96;pt.vy*=0.96;
    if(pt.age>=pt.life)particles.splice(i,1);
  }
}
function update(dt){
  dt=clamp(dt,0,48);
  if(game.paused)return;
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(wrongT>0)wrongT=Math.max(0,wrongT-dt);
  if(game.popupT>0)game.popupT=Math.max(0,game.popupT-dt);
  updateParticles(dt);
  if(game.state!=='playing')return;
  if(showing){
    showT+=dt;
    const step=Math.max(1,SHOW_DUR+PAUSE_DUR);
    const slot=Math.floor(showT/step);
    const phase=showT%step;
    if(slot>=sequence.length){showing=false;litIdx=-1;waitingInput=true;return;}
    litIdx=phase<SHOW_DUR?sequence[slot]:-1;
  }else{
    litIdx=-1;
  }
}
function playerTap(idx){
  if(!waitingInput||game.state!=='playing'||game.paused||game.resolving)return; // re-entrancy guard
  litIdx=idx;
  setTimeout(()=>{if(litIdx===idx)litIdx=-1;},200);
  const correct=idx===sequence[playerSeq.length];
  tone(correct?500:300,0.15,'sine',0.06);
  if(correct){
    playerSeq.push(idx);
    spawnBurst(idx);
    if(playerSeq.length===sequence.length){
      game.resolving=true;
      if(game.level>game.best){game.best=game.level;saveBest(game.best);}
      game.popupText=game.level>=9?'Level '+game.level+'! Getting long — steady on.':'Level '+game.level+' complete!';
      game.popupT=1100;
      waitingInput=false;
      setTimeout(()=>{game.resolving=false;nextRound();},600);
    }else{
      sndGood();
    }
  }else{
    if(game.resolving)return; // already failing, ignore extra taps
    game.resolving=true;
    wrongIdx=idx;wrongT=500;
    game.shakeT=400;
    if(game.level>game.best){game.best=game.level;saveBest(game.best);}
    sndBad();
    waitingInput=false;
    setTimeout(()=>{game.state='gameover';game.resolving=false;},600);
  }
}
// peek hint: one replay of the current sequence per game
function peekSequence(){
  if(game.peekUsed||game.state!=='playing'||!waitingInput||game.paused)return;
  game.peekUsed=true;
  showSequence();
}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const VAL_FREQS=[330,392,440,494,554,622];
function showTone(i){tone(VAL_FREQS[i],0.35,'sine',0.07);}
let prevLit=-1;
const sndGood=()=>tone(660,0.1,'sine',0.06);
const sndBad=()=>tone(180,0.4,'sawtooth',0.06);
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#06040a'],[1,'#030206']]);ctx.fillRect(0,0,W,H);}
function drawValues(){
  const pulse=0.5+0.5*Math.sin(game.time*0.006);
  VALUES.forEach((v,i)=>{
    const p=POSITIONS[i];
    const lit=litIdx===i;
    const wrong=wrongIdx===i&&wrongT>0;
    if(lit&&prevLit!==i){showTone(i);prevLit=i;}
    ctx.shadowColor=wrong?'#ff3040':v.col;
    ctx.shadowBlur=lit?40:(wrong?30:6);
    ctx.fillStyle=wrong?'#ff3040':(lit?v.col:v.dark);
    ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=wrong?'rgba(255,255,255,.8)':(lit?'rgba(255,255,255,.5)':v.col+'66');
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);ctx.stroke();
    // non-color lit cue: pulsing ring for colorblind accessibility
    if(lit){
      ctx.strokeStyle='rgba(255,255,255,'+(0.25+0.35*pulse)+')';
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(p.x,p.y,R+6+pulse*4,0,Math.PI*2);ctx.stroke();
    }
    ctx.fillStyle=wrong?'#fff':(lit?'rgba(0,0,0,.7)':'rgba(200,220,255,.5)');
    const fz=v.name.length>5?12:14;
    ctx.font=`bold ${fz}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(v.name,p.x,p.y);
  });
}
function drawParticles(){
  for(const pt of particles){
    const a=Math.max(0,1-pt.age/pt.life);
    ctx.globalAlpha=a;
    ctx.fillStyle=pt.col;
    ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(3,2,6,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#c0a0ff';ctx.font='bold 13px Arial';ctx.fillText('Level '+game.level,18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText(showing?'Watch…':waitingInput?'Your turn! ('+playerSeq.length+' / '+sequence.length+')':'',18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('BEST  '+game.best,W-18,8);
  if(!game.peekUsed&&waitingInput){
    ctx.fillStyle='rgba(192,160,255,.7)';ctx.font='10px Arial';ctx.fillText('Tap P to peek (1 use)',W-18,28);
  }
  ctx.restore();
  if(game.popupT>0){
    ctx.save();
    const a=Math.min(1,game.popupT/300);
    ctx.globalAlpha=a;
    ctx.textAlign='center';ctx.fillStyle='#ffd560';ctx.font='bold 24px Arial';
    ctx.fillText(game.popupText,W/2,H-70);
    ctx.restore();
  }
}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){ctx.save();ctx.fillStyle='rgba(3,2,6,.78)';ctx.fillRect(0,0,W,H);const pw=520,ph=300,px=(W-pw)/2,py=(H-ph)/2;ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(12,8,24,.97)'],[1,'rgba(7,5,15,.97)']]);rr(px,py,pw,ph,22);ctx.fill();ctx.strokeStyle='rgba(160,120,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillStyle='#c0a0ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';let ly=py+98;for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}ctx.restore();}
function drawPauseOverlay(){
  ctx.save();
  ctx.fillStyle='rgba(3,2,6,.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#c0a0ff';ctx.font='bold 28px Arial';
  ctx.fillText('Paused',W/2,H/2);
  ctx.fillStyle='rgba(234,242,246,.7)';ctx.font='14px Arial';
  ctx.fillText('Tap the pause button to resume.',W/2,H/2+34);
  ctx.restore();
}
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    let dx=0,dy=0;
    if(game.shakeT>0){const m=game.shakeT/400*5;dx=Math.sin(game.time*.06)*m;dy=Math.cos(game.time*.08)*m;}
    ctx.save();ctx.translate(dx,dy);
    drawBg();
    if(game.state!=='title')drawValues();
    drawParticles();
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.state==='title')panelDraw('Value Sequence',['Watch the sequence of values light up.','Repeat it back in the same order.','Each round adds one more — and a little faster.','','Remember what matters — one at a time.','','Click / tap to begin.']);
    else if(game.state==='gameover')panelDraw('Sequence Broken',['You reached level '+game.level+'.  Best: '+game.best,'','Your values will always wait for you.','','Click / tap to try again.']);
    if(game.paused&&game.state==='playing')drawPauseOverlay();
    ctx.restore();
  }catch(e){}
}
function getPointerIdx(e){const rect=canvas.getBoundingClientRect();const sx=W/rect.width,sy=H/rect.height;let px,py;if(e.touches){px=(e.touches[0].clientX-rect.left)*sx;py=(e.touches[0].clientY-rect.top)*sy;}else{px=(e.clientX-rect.left)*sx;py=(e.clientY-rect.top)*sy;}for(let i=0;i<VALUES.length;i++){const p=POSITIONS[i];if(Math.hypot(px-p.x,py-p.y)<R+6)return i;}return-1;}
function pointerDown(e){
  e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'||game.state==='gameover'){resetGame();return;}
  if(game.state==='playing'&&game.paused)return; // ignore taps while paused
  const i=getPointerIdx(e);
  if(i>=0)playerTap(i); // click-outside-does-nothing guard: -1 is ignored
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();pointerDown(e);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e);},{passive:false});

// ---- on-screen mute / pause controls ----
const muteBtn=document.getElementById('muteBtn');
const pauseBtn=document.getElementById('pauseBtn');
function setMuted(m){game.muted=m;if(muteBtn)muteBtn.innerHTML=m?'&#128263;':'&#128266;';}
function togglePause(){
  if(game.state!=='playing')return;
  game.paused=!game.paused;
  if(pauseBtn)pauseBtn.innerHTML=game.paused?'&#9654;':'&#10074;&#10074;';
}
if(muteBtn)muteBtn.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();setMuted(!game.muted);});
if(pauseBtn)pauseBtn.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();togglePause();});
if(muteBtn)muteBtn.addEventListener('touchstart',ev=>{ev.preventDefault();ev.stopPropagation();setMuted(!game.muted);},{passive:false});
if(pauseBtn)pauseBtn.addEventListener('touchstart',ev=>{ev.preventDefault();ev.stopPropagation();togglePause();},{passive:false});

// keyboard as bonus input, not the only input
window.addEventListener('keydown',e=>{
  if(e.key==='m'||e.key==='M'){setMuted(!game.muted);}
  else if(e.key==='p'||e.key==='P'){
    if(game.state==='playing'&&waitingInput&&!game.paused)peekSequence();
    else togglePause();
  }
  else if(e.key===' '||e.key==='Enter'){
    if(game.state==='title'||game.state==='gameover')resetGame();
  }
});

let last=0;function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={get game(){return game;},get sequence(){return sequence;},get playerSeq(){return playerSeq;},get litIdx(){return litIdx;},resetGame,nextRound,playerTap,update,draw,VALUES,POSITIONS,R,peekSequence,setMuted,togglePause};
</script>
</body>
</html>
