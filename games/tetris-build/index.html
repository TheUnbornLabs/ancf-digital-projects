<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Life Builder</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#040608;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#frame{position:relative;aspect-ratio:960/540;width:100vw;height:100vh;max-width:100vw;max-height:100vh;}
canvas{width:100%;height:100%;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;right:10px;top:10px;display:flex;gap:6px;z-index:5;}
#ctrls button{pointer-events:auto;width:38px;height:34px;border-radius:8px;border:1px solid rgba(120,180,255,.35);background:rgba(6,10,18,.75);color:#cfe8ff;font-size:15px;font-family:inherit;line-height:1;}
#ctrls button:active{background:rgba(80,150,255,.35);}
#pad{position:fixed;left:0;right:0;bottom:36px;display:flex;justify-content:center;gap:8px;z-index:5;pointer-events:none;}
#pad button{pointer-events:auto;width:52px;height:44px;border-radius:10px;border:1px solid rgba(120,180,255,.3);background:rgba(6,10,18,.65);color:#cfe8ff;font-size:16px;font-family:inherit;}
#pad button:active{background:rgba(80,150,255,.35);}
</style>
</head>
<body>
<div id="wrap"><div id="frame"><canvas id="game" width="960" height="540"></canvas></div></div>
<div id="ctrls">
  <button id="btnMute" title="Mute">&#128266;</button>
  <button id="btnPause" title="Pause">&#10074;&#10074;</button>
</div>
<div id="pad">
  <button id="btnLeft">&#8592;</button>
  <button id="btnRotate">&#8635;</button>
  <button id="btnHold">Hold</button>
  <button id="btnSoft">&#8595;</button>
  <button id="btnDrop">&#8659;</button>
  <button id="btnRight">&#8594;</button>
</div>
<div id="hint">← → move &middot; Up rotate &middot; Down soft-drop &middot; Space hard-drop &middot; C hold &middot; P pause &middot; M mute</div>
<script>
'use strict';
// Life Builder (#34) — Classic Tetris with custom piece labels
// Build your ideal life layout. Clear lines score "freedom points".
// Theme: you assemble your own life, one piece at a time.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const COLS=10,ROWS=20,CELL=24;
const GX=(W-COLS*CELL)/2-40,GY=H-ROWS*CELL-20;
const PIECES=[
  {shape:[[1,1,1,1]],                           col:'#5be0b0',label:'Rest'},
  {shape:[[1,1],[1,1]],                          col:'#ffd560',label:'Joy'},
  {shape:[[1,1,1],[0,1,0]],                      col:'#6090ff',label:'Agency'},
  {shape:[[1,1,1],[1,0,0]],                      col:'#c070f0',label:'Peace'},
  {shape:[[1,1,1],[0,0,1]],                      col:'#f07070',label:'Focus'},
  {shape:[[0,1,1],[1,1,0]],                      col:'#80e870',label:'Growth'},
  {shape:[[1,1,0],[0,1,1]],                      col:'#ffa060',label:'Play'},
];
// wall-kick offset attempts (simple SRS-like): try these dx/dy in order after a raw rotation fails
const KICKS=[[0,0],[1,0],[-1,0],[2,0],[-2,0],[0,-1],[1,-1],[-1,-1]];

let LS_OK=true;
function lsGet(k,d){try{const v=localStorage.getItem(k);return v===null?d:v;}catch(e){LS_OK=false;return d;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){LS_OK=false;}}

const game={state:'title',time:0,score:0,best:0,level:1,lines:0,shakeT:0,
  muted:lsGet('lb_muted','0')==='1',
  combo:0,b2b:false,popups:[],flashRows:[],flashT:0,levelFlashT:0,warnT:0};
game.best=parseInt(lsGet('lb_best','0'),10)||0;

let grid,current,next,nextQueue,held,canHold,fallT=0,FALL_MS=500;
function makeGrid(){return Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function randPiece(){const p=PIECES[Math.floor(Math.random()*PIECES.length)];return{shape:p.shape.map(r=>[...r]),col:p.col,label:p.label,x:Math.floor((COLS-p.shape[0].length)/2),y:0};}
function refillQueue(){while(nextQueue.length<3)nextQueue.push(randPiece());}
function resetGame(){
  grid=makeGrid();
  nextQueue=[];refillQueue();
  current=nextQueue.shift();refillQueue();
  held=null;canHold=true;
  game.score=0;game.level=1;game.lines=0;game.shakeT=0;
  game.combo=0;game.b2b=false;game.popups=[];game.flashRows=[];game.flashT=0;game.levelFlashT=0;game.warnT=0;
  FALL_MS=500;fallT=0;game.state='playing';
}
function cells(piece,dx,dy){const res=[];piece.shape.forEach((row,r)=>row.forEach((v,c)=>{if(v)res.push({r:piece.y+r+(dy||0),c:piece.x+c+(dx||0)});}));return res;}
function valid(piece,dx,dy){return cells(piece,dx,dy).every(({r,c})=>r>=0&&r<ROWS&&c>=0&&c<COLS&&(r<0||!grid[r][c]));}
function addPopup(text,col){game.popups.push({text,col:col||'#ffd580',x:GX+COLS*CELL/2,y:GY+ROWS*CELL/2,t:0});}
function saveBest(){if(game.score>game.best){game.best=game.score;lsSet('lb_best',String(game.best));}}
function lock(){
  cells(current,0,0).forEach(({r,c})=>{if(r>=0&&r<ROWS)grid[r][c]={col:current.col,label:current.label};});
  clearLines();
  spawnNext();
}
function spawnNext(){
  current=nextQueue.shift();refillQueue();canHold=true;
  if(!valid(current,0,0)){
    saveBest();
    sndGameOver();
    game.state='gameover';
  }
}
function holdPiece(){
  if(!canHold||game.state!=='playing')return;
  canHold=false;
  const startX=Math.floor((COLS-PIECES[0].shape[0].length)/2);
  if(held===null){
    held={shape:current.shape.map(r=>[...r]),col:current.col,label:current.label};
    current=nextQueue.shift();refillQueue();
  }else{
    const tmp={shape:held.shape.map(r=>[...r]),col:held.col,label:held.label};
    held={shape:current.shape.map(r=>[...r]),col:current.col,label:current.label};
    current=tmp;
  }
  current.x=Math.floor((COLS-current.shape[0].length)/2);current.y=0;
  sndMove();
}
function clearLines(){
  let cleared=0;const rowsToFlash=[];
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c!==null)){rowsToFlash.push(r);cleared++;}
  }
  if(cleared){
    game.flashRows=rowsToFlash;game.flashT=140;
    // remove flashed rows now (visual flash handled via a short freeze-then-clear look using flashT window on next draw pass is complex;
    // keep gameplay responsive: clear immediately but keep flash state for a brief overlay pulse)
    for(const r of rowsToFlash){grid.splice(r,1);grid.unshift(Array(COLS).fill(null));}
    game.lines+=cleared;
    const base=[0,100,300,500,800][cleared]*game.level;
    let bonus=0;
    game.combo++;
    if(game.combo>1)bonus+=50*(game.combo-1)*game.level;
    let b2bText='';
    if(cleared===4){
      if(game.b2b){bonus+=400*game.level;b2bText=' Back-to-back Tetris!';}
      game.b2b=true;
    }else{
      game.b2b=false;
    }
    // all-clear bonus
    const isAllClear=grid.every(row=>row.every(c=>c===null));
    if(isAllClear)bonus+=1000*game.level;
    const gained=base+bonus;
    game.score+=gained;
    game.level=1+Math.floor(game.lines/10);
    const newFall=Math.max(80,500-game.level*40);
    if(newFall<FALL_MS)game.levelFlashT=600;
    FALL_MS=newFall;
    game.shakeT=Math.min(220,80+cleared*30);
    addPopup((cleared===4?'TETRIS!':'+'+gained)+(cleared===4?' +'+gained:'')+b2bText,cleared===4?'#ffd560':'#8fe0ff');
    if(isAllClear)addPopup('ALL CLEAR!','#ffffff');
    sndClear(cleared);
  }else{
    game.combo=0;
  }
}
function rotate(piece){const s=piece.shape;const rows=s.length,cols=s[0].length;const rot=Array.from({length:cols},(_,c)=>Array.from({length:rows},(_,r)=>s[rows-1-r][c]));return rot;}
function moveLeft(){if(valid(current,-1,0))current.x--;}
function moveRight(){if(valid(current,1,0))current.x++;}
function rotateP(){
  const old=current.shape;
  current.shape=rotate(current);
  for(const [dx,dy] of KICKS){
    if(valid(current,dx,dy)){current.x+=dx;current.y+=dy;sndMove();return;}
  }
  current.shape=old;
}
function softDrop(){if(valid(current,0,1)){current.y++;game.score+=1;}else{sndLock();lock();}}
function fastDrop(){softDrop();}
function hardDrop(){let dist=0;while(valid(current,0,1)){current.y++;dist++;}game.score+=dist*2;sndLock();lock();}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndMove=()=>tone(300,0.05,'sine',0.04);
const sndLock=()=>tone(240,0.1,'sine',0.05);
const sndClear=(n)=>{const freqs=n>=4?[440,550,660,880]:[440,550,660];freqs.forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.06),i*50));};
const sndGameOver=()=>{[300,240,180,120].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sawtooth',0.05),i*120));};
const sndWarn=()=>tone(180,0.12,'square',0.04);
const sndLevel=()=>{[520,660,780].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.05),i*40));};
function update(dt){
  dt=clamp(dt,0,48);
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.flashT>0)game.flashT=Math.max(0,game.flashT-dt);
  if(game.levelFlashT>0){if(game.levelFlashT===600)sndLevel();game.levelFlashT=Math.max(0,game.levelFlashT-dt);}
  for(let i=game.popups.length-1;i>=0;i--){const p=game.popups[i];p.t+=dt;if(p.t>900)game.popups.splice(i,1);}
  if(game.state!=='playing')return;
  // near-topout warning: stack occupies top 4 rows
  const nearTop=grid&&grid.slice(0,4).some(row=>row.some(c=>c!==null));
  if(nearTop){
    game.warnT+=dt;
    if(game.warnT>=900){game.warnT=0;sndWarn();}
  }else{
    game.warnT=0;
  }
  fallT+=dt;
  if(fallT>=FALL_MS){fallT=0;if(valid(current,0,1))current.y++;else{sndLock();lock();}}
}
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawCell(x,y,col,label){
  ctx.fillStyle=col+'cc';rr(x+2,y+2,CELL-4,CELL-4,4);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;rr(x+2,y+2,CELL-4,CELL-4,4);ctx.stroke();
  if(label){
    ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label[0],x+CELL/2,y+CELL/2+1);
  }
}
function drawGhost(){const ghost={...current,shape:current.shape.map(r=>[...r])};while(valid(ghost,0,1))ghost.y++;cells(ghost,0,0).forEach(({r,c})=>{if(r>=0){const x=GX+c*CELL,y=GY+r*CELL;ctx.fillStyle='rgba(255,255,255,.07)';rr(x+2,y+2,CELL-4,CELL-4,4);ctx.fill();}});}
function drawGrid2(){
  const nearTop=grid&&grid.slice(0,4).some(row=>row.some(c=>c!==null));
  ctx.fillStyle='rgba(8,12,18,.9)';rr(GX-4,GY-4,COLS*CELL+8,ROWS*CELL+8,6);ctx.fill();
  if(nearTop&&game.state==='playing'){
    const pulse=0.15+0.15*Math.abs(Math.sin(game.time/200));
    ctx.fillStyle='rgba(255,60,60,'+pulse.toFixed(3)+')';
    rr(GX-4,GY-4,COLS*CELL+8,4*CELL+8,6);ctx.fill();
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=GX+c*CELL,y=GY+r*CELL;
    ctx.strokeStyle='rgba(20,30,50,.5)';ctx.lineWidth=0.5;ctx.strokeRect(x,y,CELL,CELL);
    if(grid[r][c])drawCell(x,y,grid[r][c].col,grid[r][c].label);
  }
  if(game.flashT>0&&game.flashRows.length){
    const a=game.flashT/140;
    for(const r of game.flashRows){
      if(r<0||r>=ROWS)continue;
      ctx.fillStyle='rgba(255,255,255,'+(a*0.6).toFixed(3)+')';
      ctx.fillRect(GX,GY+r*CELL,COLS*CELL,CELL);
    }
  }
  if(game.state==='playing')drawGhost();
  if(game.state==='playing'){cells(current,0,0).forEach(({r,c})=>{if(r>=0)drawCell(GX+c*CELL,GY+r*CELL,current.col,current.label);});}
}
function drawMiniPiece(shape,col,label,x,y,w,h,cell){
  const pr=shape.length,pc=shape[0].length;
  const ox=x+(w-pc*cell)/2,oy=y+(h-pr*cell)/2;
  for(let r=0;r<pr;r++)for(let c=0;c<pc;c++){
    if(shape[r][c]){
      ctx.fillStyle=col+'cc';rr(ox+c*cell+2,oy+r*cell+2,cell-4,cell-4,3);ctx.fill();
      if(label){ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='bold 7px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label[0],ox+c*cell+cell/2,oy+r*cell+cell/2+1);}
    }
  }
}
function drawNext(){
  const nx=GX+COLS*CELL+24,ny=GY+40;
  ctx.fillStyle='rgba(8,12,18,.7)';rr(nx,ny,100,150,8);ctx.fill();
  ctx.fillStyle='rgba(200,220,255,.4)';ctx.font='10px Arial';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('NEXT',nx+50,ny+6);
  for(let i=0;i<3;i++){
    const p=nextQueue[i];if(!p)continue;
    drawMiniPiece(p.shape,p.col,p.label,nx,ny+20+i*44,100,40,14);
  }
  // hold
  const hy=ny+160;
  ctx.fillStyle='rgba(8,12,18,.7)';rr(nx,hy,100,70,8);ctx.fill();
  ctx.fillStyle='rgba(200,220,255,.4)';ctx.font='10px Arial';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('HOLD',nx+50,hy+6);
  if(held)drawMiniPiece(held.shape,held.col,held.label,nx,hy+18,100,46,14);
}
function drawPopups(){
  for(const p of game.popups){
    const a=1-p.t/900;
    ctx.save();
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.col;
    ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y-p.t*0.08);
    ctx.restore();
  }
}
function drawHUD(){
  ctx.save();ctx.fillStyle='rgba(2,3,6,.88)';rr(0,0,W,46,0);ctx.fill();ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#80d0ff';ctx.font='bold 13px Arial';ctx.fillText('Level '+game.level,18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Lines: '+game.lines,18,28);
  ctx.textAlign='center';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('SCORE',W/2,8);
  ctx.fillStyle='#ffd580';ctx.font='bold 22px Arial';ctx.fillText(game.score,W/2,22);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('BEST  '+game.best,W-18,8);
  if(game.combo>1){ctx.textAlign='right';ctx.fillStyle='#8fe0ff';ctx.font='bold 11px Arial';ctx.fillText('Combo x'+game.combo,W-18,28);}
  ctx.restore();
  if(game.levelFlashT>0){
    const a=game.levelFlashT/600;
    ctx.save();ctx.globalAlpha=a*0.5;ctx.fillStyle='#80d0ff';ctx.fillRect(0,0,W,H);ctx.restore();
  }
}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){ctx.save();ctx.fillStyle='rgba(2,3,6,.78)';ctx.fillRect(0,0,W,H);const pw=520,ph=300,px=(W-pw)/2,py=(H-ph)/2;ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(8,12,22,.97)'],[1,'rgba(4,7,14,.97)']]);rr(px,py,pw,ph,22);ctx.fill();ctx.strokeStyle='rgba(80,180,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillStyle='#80d0ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';let ly=py+98;for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}ctx.restore();}
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    if(game.shakeT>0){
      const mag=Math.min(6,game.shakeT/20);
      const sx=(Math.random()*2-1)*mag,sy=(Math.random()*2-1)*mag;
      ctx.translate(sx,sy);
    }
    ctx.fillStyle=lgrad(0,0,0,H,[[0,'#040608'],[1,'#020406']]);ctx.fillRect(0,0,W,H);
    if(game.state!=='title'){drawGrid2();drawNext();drawPopups();}
    vignette();
    if(game.state==='playing'||game.state==='paused')drawHUD();
    if(game.state==='title')panelDraw('Life Builder',['Stack value pieces to clear full lines.','← → move  |  Up rotate  |  Space hard-drop  |  C hold','','You assemble your own life, one piece at a time.','','Click / tap to begin.']);
    else if(game.state==='paused')panelDraw('Paused',['Breathe.','','Press P or tap Resume to continue.']);
    else if(game.state==='gameover')panelDraw('Life Overflowed',['Score: '+game.score+'  Best: '+game.best,'Level: '+game.level+'  Lines: '+game.lines,'','Every build is a chance to learn your ideal layout.','','Click / tap to try again.']);
    ctx.restore();
  }catch(e){}
}
function togglePause(){
  if(game.state==='playing')game.state='paused';
  else if(game.state==='paused')game.state='playing';
}
function toggleMute(){
  game.muted=!game.muted;
  lsSet('lb_muted',game.muted?'1':'0');
  btnMute.textContent=game.muted?'\u{1F507}':'\u{1F50A}';
}
window.addEventListener('keydown',e=>{
  if(e.code==='KeyM'){e.preventDefault();toggleMute();return;}
  if(e.code==='KeyP'){e.preventDefault();togglePause();return;}
  if(game.state==='title'||game.state==='gameover'){resetGame();return;}
  if(game.state!=='playing')return;
  if(e.code==='ArrowLeft'){e.preventDefault();moveLeft();sndMove();}
  if(e.code==='ArrowRight'){e.preventDefault();moveRight();sndMove();}
  if(e.code==='ArrowUp'||e.code==='KeyZ'){e.preventDefault();rotateP();}
  if(e.code==='ArrowDown'){e.preventDefault();softDrop();}
  if(e.code==='Space'){e.preventDefault();hardDrop();}
  if(e.code==='KeyC'){e.preventDefault();holdPiece();}
});
let touchStart2=null,touchMoved=false,lastDragX=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  touchStart2={x:e.touches[0].clientX,y:e.touches[0].clientY,t:performance.now()};
  lastDragX=touchStart2.x;touchMoved=false;
  if(game.state==='title'||game.state==='gameover'){resetGame();}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!touchStart2||game.state!=='playing')return;
  const x=e.touches[0].clientX;
  const dx=x-lastDragX;
  const cellPx=(canvas.getBoundingClientRect().width)/COLS;
  if(Math.abs(dx)>=cellPx){
    if(dx>0){moveRight();sndMove();}else{moveLeft();sndMove();}
    lastDragX=x;touchMoved=true;
  }
  const dy=e.touches[0].clientY-touchStart2.y;
  if(dy>18){softDrop();touchStart2.y=e.touches[0].clientY;touchMoved=true;}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!touchStart2||game.state!=='playing'){touchStart2=null;return;}

    if(Math.abs(dx)<12&&Math.abs(dy)<12){

    }else if(dy>40&&dt<400){

    }
  }
