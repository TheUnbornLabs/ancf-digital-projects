<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Mirror Nav</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#040308;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{display:block;touch-action:none;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;max-width:92vw;}
#hud-ctl{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:5;}
#hud-ctl button{width:38px;height:38px;border-radius:10px;border:1.5px solid rgba(176,128,255,.45);background:rgba(6,3,14,.82);color:#eaf2f6;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
#hud-ctl button:active{background:rgba(176,128,255,.35);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="hud-ctl">
<button id="btnMute" aria-label="Mute" title="Mute">&#128266;</button>
<button id="btnPause" aria-label="Pause" title="Pause">&#10074;&#10074;</button>
</div>
<div id="hint">Arrow keys / WASD or swipe to move &middot; controls are mirrored — learn to navigate backwards</div>
<script>
'use strict';
// Mirror Nav (#64)
// A grid maze but controls are mirrored. LEFT moves right, UP moves down, etc.
// You have to mentally un-flip to navigate correctly to the exit.
// 8 levels. Theme: unlearning internalized "should" directions.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}

// ---- difficulty curve: grid grows / cell shrinks gradually across levels, clamped ----
const TOTAL=8;
function dims(lv){
  const cols=Math.min(22,11+lv*2);   // 11 -> 25 clamped to 22
  const rows=Math.min(13,7+Math.floor(lv*1.2)); // 7 -> ~15 clamped to 13
  const cell=Math.max(26,44-lv*2);   // 44 -> shrinks, clamped floor 26
  return{cols,rows,cell};
}
let COLS=15,ROWS=9,CELL=44,GX=0,GY=0;
function layoutFor(lv){const d=dims(lv);COLS=d.cols;ROWS=d.rows;CELL=d.cell;GX=(W-COLS*CELL)/2;GY=(H-ROWS*CELL)/2;}
layoutFor(0);

// ---- persistence ----
const LS_KEY='mirrorNav_best_v1';
function loadBest(){try{const v=localStorage.getItem(LS_KEY);const n=v?parseInt(v,10):0;return Number.isFinite(n)?n:0;}catch(e){return 0;}}
function saveBest(v){try{localStorage.setItem(LS_KEY,String(v));}catch(e){}}
const LS_MOVES='mirrorNav_bestMoves_v1';
function loadBestMoves(){try{const v=localStorage.getItem(LS_MOVES);return v?JSON.parse(v):{};}catch(e){return{};}}
function saveBestMoves(o){try{localStorage.setItem(LS_MOVES,JSON.stringify(o));}catch(e){}}
let bestMovesTable=loadBestMoves();

const game={state:'title',prevState:'title',time:0,level:0,score:0,best:loadBest(),shakeT:0,moves:0,muted:false,backtracked:false,levelStartT:0,popup:null,warnPulse:0};
let player,exit2,walls,rng;
let trail=[]; // recent path cells for trail rendering
let particles=[];
let flipAxis=null; // null = normal mirror both axes; 'x' or 'y' = only that axis mirrors (special levels)

// ---- explicit stack-based DFS maze carve (no recursion, no stack-overflow risk) ----
function buildMaze(lv){
  layoutFor(lv);
  rng=seeded(lv*6007+13);
  const h=Array.from({length:ROWS},()=>new Array(COLS).fill(true));// [r][c] = has right wall
  const v=Array.from({length:ROWS},()=>new Array(COLS).fill(true));// has bottom wall
  const visited=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  const stack=[[0,0]];
  visited[0][0]=true;
  while(stack.length){
    const[r,c]=stack[stack.length-1];
    const dirs=[[0,1],[1,0],[0,-1],[-1,0]].sort(()=>rng()-.5);
    let advanced=false;
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!visited[nr][nc]){
        if(dc===1)h[r][c]=false;
        if(dc===-1)h[nr][nc]=false;
        if(dr===1)v[r][c]=false;
        if(dr===-1)v[nr][nc]=false;
        visited[nr][nc]=true;
        stack.push([nr,nc]);
        advanced=true;
        break;
      }
    }
    if(!advanced)stack.pop();
  }
  walls={h,v};
  player={r:0,c:0};
  exit2={r:ROWS-1,c:COLS-1};
  game.moves=0;
  game.backtracked=false;
  game.levelStartT=game.time;
  game.state='playing';
  trail=[{r:0,c:0}];
  particles=[];
  // every 3rd level (index 2,5) becomes a single-axis mirror level for variety
  flipAxis=(lv>0&&lv%3===2)?(((lv/3)|0)%2===0?'x':'y'):null;
}
function resetGame(){transitioning=false;game.level=0;game.score=0;game.shakeT=0;buildMaze(0);}

function pushTrail(r,c){
  trail.push({r,c});
  if(trail.length>10)trail.shift();
}

function spawnParticles(px,py,color){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});
  }
}

// true from touching the exit until the level-advance timeout fires; state stays 'playing'
// across that window, so this is the only thing stopping a re-entry from scoring twice.
let transitioning=false;
function tryMove(dr,dc){
  if(game.state!=='playing'||transitioning)return;
  // mirror the controls (respecting single-axis flip levels)
  let mr,mc;
  if(flipAxis==='x'){mr=dr;mc=-dc;}
  else if(flipAxis==='y'){mr=-dr;mc=dc;}
  else{mr=-dr;mc=-dc;}
  const nr=player.r+mr,nc=player.c+mc;
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS){ bump(); return; }
  // wall check
  let blocked=false;
  if(mc===1&&walls.h[player.r][player.c])blocked=true;
  if(mc===-1&&walls.h[player.r][nc])blocked=true;
  if(mr===1&&walls.v[player.r][player.c])blocked=true;
  if(mr===-1&&walls.v[nr][player.c])blocked=true;
  if(blocked){ bump(); return; }
  // backtrack detection: moving into the cell we were at 2 moves ago
  if(trail.length>=2){
    const prev2=trail[trail.length-2];
    if(prev2&&prev2.r===nr&&prev2.c===nc)game.backtracked=true;
  }
  player.r=nr;player.c=nc;game.moves++;
  pushTrail(nr,nc);
  sndStep();
  if(player.r===exit2.r&&player.c===exit2.c){
    const base=Math.max(0,200-game.moves);
    const cleanBonus=game.backtracked?0:60;
    const elapsed=(game.time-game.levelStartT)/1000;
    const speedBonus=Math.max(0,Math.round(40-elapsed*2));
    const pts=base+cleanBonus+speedBonus;
    game.score+=pts;
    if(game.score>game.best){game.best=game.score;saveBest(game.best);}
    const key='lv'+game.level;
    if(!bestMovesTable[key]||game.moves<bestMovesTable[key]){bestMovesTable[key]=game.moves;saveBestMoves(bestMovesTable);}
    game.popup={text:'+'+pts+(cleanBonus?' (clean run!)':'')+(speedBonus?' (+'+speedBonus+' speed)':''),t:1400,x:GX+exit2.c*CELL+CELL/2,y:GY+exit2.r*CELL};
    spawnParticles(GX+exit2.c*CELL+CELL/2,GY+exit2.r*CELL+CELL/2,'rgba(120,240,160,');
    sndWin2();
    transitioning=true;
    setTimeout(()=>{
      // clear first: this callback has two exits ('won' skips buildMaze), both must unlatch
      transitioning=false;
      game.level++;
      if(game.level>=TOTAL){sndWin();game.state='won';}
      else{buildMaze(game.level);}
    },500);
  }
}
function bump(){
  game.shakeT=Math.max(game.shakeT,220);
  sndBump();
}

function update(dt){
  dt=clamp(dt,0,48);
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.popup){game.popup.t-=dt;if(game.popup.t<=0)game.popup=null;}
  game.warnPulse=(game.warnPulse+dt*0.006)%(Math.PI*2);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=dt*0.0022;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ---- pause / mute ----
function togglePause(){
  if(game.state==='playing'){game.prevState='playing';game.state='paused';}
  else if(game.state==='paused'){game.state=game.prevState||'playing';}
}
function toggleMute(){
  game.muted=!game.muted;
  btnMute.textContent=game.muted?'🔇':'🔊';
  btnMute.setAttribute('aria-label',game.muted?'Unmute':'Mute');
}

// keyboard
const keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.key])return;
  keys[e.key]=true;
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){togglePause();return;}
  if(e.key==='m'||e.key==='M'){toggleMute();return;}
  if(game.state!=='playing')return;
  if(e.key==='ArrowUp'||e.key==='w')tryMove(-1,0);
  if(e.key==='ArrowDown'||e.key==='s')tryMove(1,0);
  if(e.key==='ArrowLeft'||e.key==='a')tryMove(0,-1);
  if(e.key==='ArrowRight'||e.key==='d')tryMove(0,1);
});
document.addEventListener('keyup',e=>delete keys[e.key]);

// touch swipe
let ts2=null;
canvas.addEventListener('touchstart',e=>{ts2={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!ts2)return;
  const dx=e.changedTouches[0].clientX-ts2.x,dy=e.changedTouches[0].clientY-ts2.y;
  ts2=null;
  if(Math.abs(dx)<10&&Math.abs(dy)<10){
    const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
    if(game.state==='paused'){togglePause();return;}
    if(game.state!=='playing'){resetGame();return;}
    return;
  }
  if(game.state==='playing'){
    if(Math.abs(dx)>Math.abs(dy)){tryMove(0,dx>0?1:-1);}
    else{tryMove(dy>0?1:-1,0);}
  }
},{passive:true});

// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(game.muted)return;
  const a=AC();if(!a)return;
  try{
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||0.15)+0.02);
  }catch(e){}
}
const sndStep=()=>tone(300+game.moves*2,0.04,'sine',0.03);
const sndBump=()=>tone(110,0.09,'square',0.05);
const sndWin2=()=>{[528,660,792].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.06),i*60));};
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#040308'],[1,'#030206']]);ctx.fillRect(0,0,W,H);}

function drawTrail(){
  if(trail.length<2)return;
  ctx.save();
  for(let i=0;i<trail.length-1;i++){
    const t=trail[i];
    const a=(i+1)/trail.length*0.35;
    const x=GX+t.c*CELL+CELL/2,y=GY+t.r*CELL+CELL/2;
    ctx.fillStyle='rgba(180,120,255,'+a.toFixed(3)+')';
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawMaze(){
  if(!walls)return;
  ctx.strokeStyle='rgba(140,100,220,.5)';ctx.lineWidth=1.5;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=GX+c*CELL,y=GY+r*CELL;
      if(r===0){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CELL,y);ctx.stroke();}
      if(c===0){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+CELL);ctx.stroke();}
      if(walls.h[r][c]){ctx.beginPath();ctx.moveTo(x+CELL,y);ctx.lineTo(x+CELL,y+CELL);ctx.stroke();}
      if(walls.v[r][c]){ctx.beginPath();ctx.moveTo(x,y+CELL);ctx.lineTo(x+CELL,y+CELL);ctx.stroke();}
    }
  }
  // exit marker
  const ex=GX+exit2.c*CELL,ey=GY+exit2.r*CELL;
  ctx.fillStyle='rgba(80,220,120,.4)';rr(ex+4,ey+4,CELL-8,CELL-8,6);ctx.fill();
  ctx.fillStyle='rgba(80,220,120,.7)';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('EXIT',ex+CELL/2,ey+CELL/2);
}

function drawPlayer(){
  const px=GX+player.c*CELL+CELL/2,py=GY+player.r*CELL+CELL/2;
  const gp=ctx.createRadialGradient(px-3,py-3,2,px,py,14);
  gp.addColorStop(0,'rgba(220,160,255,.95)');
  gp.addColorStop(1,'rgba(100,60,180,.4)');
  ctx.shadowColor='rgba(200,120,255,.4)';ctx.shadowBlur=10;
  ctx.fillStyle=gp;ctx.beginPath();ctx.arc(px,py,Math.min(14,CELL*0.32),0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawParticles(){
  ctx.save();
  for(const p of particles){
    ctx.fillStyle=p.color+Math.max(0,p.life).toFixed(3)+')';
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawPopup(){
  if(!game.popup)return;
  const p=game.popup;
  const a=clamp(p.t/1400,0,1);
  ctx.save();
  ctx.globalAlpha=a;
  ctx.fillStyle='#8ef0a8';
  ctx.font='bold 14px Arial';
  ctx.textAlign='center';
  ctx.fillText(p.text,p.x,p.y-14-(1-a)*20);
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(2,1,5,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#b080ff';ctx.font='bold 13px Arial';
  ctx.fillText('Mirror Nav — Level '+(game.level+1)+' / '+TOTAL+(flipAxis?'  (single-axis flip)':''),18,8);
  // move-count urgency color shift past efficient threshold
  const threshold=Math.round((ROWS*COLS)*0.55);
  let moveColor='rgba(234,242,246,.5)';
  if(game.moves>threshold*1.3)moveColor='rgba(255,120,120,'+(0.6+0.3*Math.sin(game.warnPulse)).toFixed(3)+')';
  else if(game.moves>threshold)moveColor='rgba(255,200,120,.75)';
  ctx.fillStyle=moveColor;ctx.font='11px Arial';
  ctx.fillText('Controls are mirrored! Think in reverse. Moves: '+game.moves,18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  const key='lv'+game.level;
  const bm=bestMovesTable[key];
  ctx.fillText('Score: '+game.score+'  Best: '+game.best+(bm?'  Best moves: '+bm:''),W-18,8);
  ctx.restore();
}

function vignette(){
  const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(2,1,5,.78)';ctx.fillRect(0,0,W,H);
  const pw=560,ph=320,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(6,3,14,.97)'],[1,'rgba(4,2,10,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(140,80,255,.22)';ctx.lineWidth=1.5;
  rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#b080ff';ctx.font='bold 34px Arial';
  ctx.fillText(title,W/2,py+62);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+98;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}

function draw(){
  try{
    const dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    // screen shake
    if(game.shakeT>0){
      const mag=(game.shakeT/220)*6;
      const sx=(Math.random()*2-1)*mag,sy=(Math.random()*2-1)*mag;
      ctx.translate(sx,sy);
    }
    drawBg();
    if(game.state!=='title'){
      drawMaze();
      drawTrail();
      drawPlayer();
      drawParticles();
      drawPopup();
    }
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.state==='paused'){
      drawHUD();
      panelDraw('Paused',['Tap / click or press P to resume.','','M toggles mute.']);
    }
    if(game.state==='title'){
      panelDraw('Mirror Nav',['Arrow keys / WASD or swipe to move.','Controls are reversed — left is right, up is down.','8 mazes — fewer moves, more points.','Some levels only mirror one axis — watch for it.','','Unlearning old directions is its own skill.','','Click / tap or press any key to begin.']);
    }else if(game.state==='won'){
      panelDraw('Unlearned! ✓',['Score: '+game.score+'  Best: '+game.best,'','You navigated backwards through all 8 levels.','','Click / tap to play again.']);
    }
    ctx.restore();
  }catch(e){}
}

canvas.addEventListener('mousedown',e=>{
  e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='paused'){togglePause();return;}
  if(game.state!=='playing')resetGame();
},{passive:false});

// on-screen HUD buttons
const btnPause=document.getElementById('btnPause');
const btnMute=document.getElementById('btnMute');
btnPause.addEventListener('click',e=>{e.stopPropagation();togglePause();btnPause.textContent=game.state==='paused'?'▶':'❙❙';});
btnMute.addEventListener('click',e=>{e.stopPropagation();toggleMute();});
['mousedown','touchstart'].forEach(evt=>{
  btnPause.addEventListener(evt,e=>e.stopPropagation());
  btnMute.addEventListener(evt,e=>e.stopPropagation());
});

// ---- responsive canvas sizing: preserve 16:9 aspect ratio + devicePixelRatio ----
function resizeCanvas(){
  const dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
  const vw=window.innerWidth,vh=window.innerHeight;
  const targetAspect=W/H;
  let cssW,cssH;
  if(vw/vh>targetAspect){cssH=vh;cssW=vh*targetAspect;}
  else{cssW=vw;cssH=vw/targetAspect;}
  canvas.style.width=Math.round(cssW)+'px';
  canvas.style.height=Math.round(cssH)+'px';
  canvas.width=Math.round(W*dpr);
  canvas.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',resizeCanvas);
resizeCanvas();

let last=0;
function loop(ts){
  if(!last)last=ts;
  const dt=ts-last;last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
game.state='title';draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},
  get player(){return player;},
  get exit2(){return exit2;},
  get walls(){return walls;},
  resetGame,buildMaze,tryMove,update,draw,togglePause,toggleMute,
  TOTAL,get COLS(){return COLS;},get ROWS(){return ROWS;},get CELL(){return CELL;},
  keys
};
</script>
</body>
</html>
