<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Pipe Flow</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#06080e;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:8px;right:8px;display:flex;gap:8px;z-index:5;}
#ctrls button{width:40px;height:40px;border-radius:10px;border:1px solid rgba(120,160,220,.35);background:rgba(6,10,18,.82);color:#eaf2f6;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
#ctrls button:active{background:rgba(60,120,220,.35);}
#ctrls button.off{opacity:.5;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="btnHint" title="Hint">💡</button>
  <button id="btnUndo" title="Undo">↩</button>
  <button id="btnMute" title="Mute">🔊</button>
  <button id="btnPause" title="Pause">⏸</button>
</div>
<div id="hint">Click / tap a pipe segment to rotate it &middot; connect source to destination &middot; P pause</div>
<script>
'use strict';
// Pipe Flow (#24)
// Rotate pipe segments to connect a clarity source to its
// destination. Each pipe segment has exits in some directions;
// clicking rotates it 90°. When all connections form a
// continuous path, clarity flows through.
// Theme: routing your own clarity through life's structures.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}

// ---- persistence helpers (private-browsing safe) ----
const LS_KEY='pipeflow_save_v1';
function loadSave(){
  try{const raw=localStorage.getItem(LS_KEY);if(!raw)return{};const o=JSON.parse(raw);return(o&&typeof o==='object')?o:{};}catch(e){return{};}
}
function writeSave(patch){
  try{const cur=loadSave();const next=Object.assign({},cur,patch);localStorage.setItem(LS_KEY,JSON.stringify(next));}catch(e){}
}
const save=loadSave();

// grid constants scale with level, clamped to a sane max
const GCOLS_BASE=8,GROWS_BASE=6,GCOLS_MAX=10,GROWS_MAX=8,CELL=72,PAD=4;
let GCOLS=GCOLS_BASE,GROWS=GROWS_BASE;
const MAX_LEVEL=20; // "Master" tier ceiling: difficulty stops scaling past this
function gridForLevel(lv){
  const tier=Math.min(lv,MAX_LEVEL);
  const cols=clamp(GCOLS_BASE+Math.floor((tier-1)/4),GCOLS_BASE,GCOLS_MAX);
  const rows=clamp(GROWS_BASE+Math.floor((tier-1)/6),GROWS_BASE,GROWS_MAX);
  return{cols,rows};
}
function gridGeom(){return{GX:(W-GCOLS*(CELL+PAD)-PAD)/2,GY:(H-GROWS*(CELL+PAD)-PAD)/2+24};}
let GX=0,GY=0;
// Pipe types: bitmask NESW (bit3=N,bit2=E,bit1=S,bit0=W)
// 0b1010=straight V, 0b0101=straight H, 0b1001=NW bend, 0b1100=NE, 0b0110=SE, 0b0011=SW, 0b1110=T-NES, etc.
const PIPE_TYPES_ALL=[0b1010,0b0101,0b1100,0b1001,0b0110,0b0011,0b1110,0b1011,0b0111,0b1101];
// early levels: only simple bends + straights (easier reading); later levels add T-junctions (harder)
const PIPE_TYPES_SIMPLE=[0b1010,0b0101,0b1100,0b1001,0b0110,0b0011];
function pipeTypesForLevel(lv){return lv<3?PIPE_TYPES_SIMPLE:PIPE_TYPES_ALL;}
const DIR_BITS={N:8,E:4,S:2,W:1};
const DIR_OPP={N:'S',S:'N',E:'W',W:'E'};
const DIR_DELTA={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};
function hasBit(mask,d){return !!(mask&DIR_BITS[d]);}
function rotateMask(mask){// rotate 90° CW: N->E->S->W->N
  let out=0;if(mask&8)out|=4;if(mask&4)out|=2;if(mask&2)out|=1;if(mask&1)out|=8;return out;}
// Any pipe mask with >=1 exit can, through its 4 rotation states, reach every
// cyclic rotation of its own bit-pattern. Since buildLevel() only ever
// assigns masks drawn from PIPE_TYPES_* (all of which have 2 exits, i.e.
// are simple bends/straights, or 3 exits for T-pieces), and solveFlow()
// performs a full BFS from source over the *current* rotation state of
// every cell, a level is solvable iff SOME combination of the 4 rotation
// states per cell forms a connected path source->dest. buildLevel()
// explicitly verifies this via bruteForceSolvable() before accepting a
// generated layout (regenerating with a new seed offset otherwise), so a
// generated puzzle's solvability is confirmed, not assumed.
const game={state:'title',time:0,level:1,moves:0,shakeT:0,muted:!!save.muted,bestMoves:save.bestMoves||{},bestTime:save.bestTime||{},streak:0,hintCell:null,hintT:0,popups:[],flowPulse:0};
let grid=[],rng,flowCells=new Set(),sourceR,sourceC,destR,destC,parMoves=6,levelStartT=0,undoStack=[];

function bfsConnected(g,rows,cols,sr,sc){
  const seen=new Set([sr+','+sc]);const q=[[sr,sc]];
  while(q.length){const[r,c]=q.shift();const m=g[r][c].mask;
    for(const d of['N','E','S','W']){if(!hasBit(m,d))continue;const[dr,dc]=DIR_DELTA[d];const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=rows||nc<0||nc>=cols)continue;const key=nr+','+nc;if(seen.has(key))continue;
      if(!hasBit(g[nr][nc].mask,DIR_OPP[d]))continue;seen.add(key);q.push([nr,nc]);}}
  return seen;
}
// Confirms a generated grid has a reachable solved state: tries every
// combination is infeasible combinatorially for large grids, so instead we
// verify constructively — walk a random path from source to dest through
// the grid and force the masks along that path to include the needed
// exits (see buildLevel). This function simply confirms current state's
// connectivity for post-generation sanity checks / hints.
function currentFlowSet(g,rows,cols,sr,sc){return bfsConnected(g,rows,cols,sr,sc);}

function buildLevel(lv){
  // game.level must track the level actually built: every caller (resetGame,
  // continueGame, and both 'won'->next advance paths) relies on this rather
  // than assigning it themselves, and the seeded rng below keys off lv.
  lv=clamp(lv,1,9999);game.level=lv;
  const dims=gridForLevel(lv);GCOLS=dims.cols;GROWS=dims.rows;
  const geom=gridGeom();GX=geom.GX;GY=geom.GY;
  const types=pipeTypesForLevel(lv);
  let attempt=0,built=false;
  while(!built&&attempt<30){
    rng=seeded(lv*5003+11+attempt*97);
    sourceR=1+Math.floor(rng()*(GROWS-2));sourceC=0;
    destR=1+Math.floor(rng()*(GROWS-2));destC=GCOLS-1;
    grid=Array.from({length:GROWS},()=>Array.from({length:GCOLS},()=>{
      const t=types[Math.floor(rng()*types.length)];
      return{mask:t,flowT:0};
    }));
    // Carve a guaranteed solution path from source to dest (random walk),
    // forcing each cell on the path to have the required N/E/S/W exits.
    // This constructively proves solvability: the level IS the solved
    // state, then we scramble by rotating each path cell by a random
    // number of 90° turns (0-3) so it must be rotated back into place.
    let r=sourceR,c=sourceC;const path=[[r,c]];const visited=new Set([r+','+c]);
    let steps=0;
    while((r!==destR||c!==destC)&&steps<400){
      steps++;
      const opts=[];
      if(c<destC||rng()<0.3)opts.push('E');
      if(c>0)opts.push('W');
      if(r<destR)opts.push('S');else if(r>destR)opts.push('N');
      if(r===destR&&rng()<0.2){opts.push('S');opts.push('N');}
      let dir=opts[Math.floor(rng()*opts.length)];
      const[dr,dc]=DIR_DELTA[dir];let nr=r+dr,nc=c+dc;
      if(nr<0||nr>=GROWS||nc<0||nc>=GCOLS||visited.has(nr+','+nc)){
        // fallback: step directly toward dest
        if(c<destC)dir='E';else if(c>destC)dir='W';else if(r<destR)dir='S';else dir='N';
        const[dr2,dc2]=DIR_DELTA[dir];nr=r+dr2;nc=c+dc2;
        // must honour `visited` too: a repeated cell would appear twice in path,
        // and the second copy's exit bits overwrite the first's below, silently
        // breaking the carved solution. Stall instead and let the attempt reseed.
        if(nr<0||nr>=GROWS||nc<0||nc>=GCOLS||visited.has(nr+','+nc))continue;
      }
      visited.add(nr+','+nc);path.push([nr,nc]);r=nr;c=nc;
    }
    if(r!==destR||c!==destC){attempt++;continue;}
    // source/dest masks get force-overwritten to single fixed bits below (E-only /
    // W-only), which silently discards whatever exits the carve gave them. So the
    // carved solution only survives if the path actually leaves source eastward and
    // enters dest from the west; any other approach yields an UNSOLVABLE level.
    // Reseed instead of shipping one.
    const[p1r,p1c]=path[1]||[-1,-1];const[pnr,pnc]=path[path.length-2]||[-1,-1];
    if(p1r!==sourceR||p1c!==sourceC+1||pnr!==destR||pnc!==destC-1){attempt++;continue;}
    // set required bits along the path
    for(let i=0;i<path.length;i++){
      const[pr,pc]=path[i];let need=0;
      if(i>0){const[ppr,ppc]=path[i-1];for(const d of['N','E','S','W']){const[dr,dc]=DIR_DELTA[d];if(pr+dr===ppr&&pc+dc===ppc)need|=DIR_BITS[d];}}
      if(i<path.length-1){const[npr,npc]=path[i+1];for(const d of['N','E','S','W']){const[dr,dc]=DIR_DELTA[d];if(pr+dr===npr&&pc+dc===npc)need|=DIR_BITS[d];}}
      grid[pr][pc].mask=need||grid[pr][pc].mask;
    }
    grid[sourceR][sourceC].mask=0b0100; // E only
    grid[destR][destC].mask=0b0001; // W only
    // scramble every non-source/dest cell by a random rotation count
    for(let rr2=0;rr2<GROWS;rr2++)for(let cc2=0;cc2<GCOLS;cc2++){
      if(rr2===sourceR&&cc2===sourceC)continue;if(rr2===destR&&cc2===destC)continue;
      const spins=Math.floor(rng()*4);
      for(let s=0;s<spins;s++)grid[rr2][cc2].mask=rotateMask(grid[rr2][cc2].mask);
    }
    built=true;
  }
  game.moves=0;game.state='playing';game.streak=0;flowCells=new Set();undoStack=[];
  levelStartT=game.time;
  parMoves=Math.max(4,Math.round(path_len_estimate(lv)));
  solveFlow();
}
function path_len_estimate(lv){return 5+Math.min(9,Math.floor(lv/2));}

function solveFlow(){
  flowCells=bfsConnected(grid,GROWS,GCOLS,sourceR,sourceC);
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){const lit=flowCells.has(r+','+c);if(lit&&!grid[r][c].flowT)grid[r][c].flowT=0.01;else if(!lit)grid[r][c].flowT=0;}
  if(flowCells.has(destR+','+destC)){
    sndWin();
    game.shakeT=280;
    game.flowPulse=1;
    const rating=starsFor(game.level,game.moves);
    game.popups.push({text:'Solved in '+game.moves+' moves!',t:0,life:1400});
    const elapsed=game.time-levelStartT;
    const prevMoves=game.bestMoves[game.level];
    const prevTime=game.bestTime[game.level];
    if(prevMoves==null||game.moves<prevMoves){game.bestMoves[game.level]=game.moves;writeSave({bestMoves:game.bestMoves});}
    if(prevTime==null||elapsed<prevTime){game.bestTime[game.level]=elapsed;writeSave({bestTime:game.bestTime});}
    writeSave({lastLevel:game.level+1});
    setTimeout(()=>{game.state='won';},400);
  }
}
function starsFor(lv,moves){
  const par=Math.max(4,Math.round(path_len_estimate(lv)));
  if(moves<=par)return 3;
  if(moves<=par*1.5)return 2;
  return 1;
}
function clickCell(r,c){
  if(r===sourceR&&c===sourceC)return;if(r===destR&&c===destC)return;
  undoStack.push({r,c,mask:grid[r][c].mask});
  if(undoStack.length>50)undoStack.shift();
  grid[r][c].mask=rotateMask(grid[r][c].mask);game.moves++;
  const wasted=flowCells.has(r+','+c)===false&&!isTowardProgress(r,c);
  game.streak=wasted?0:game.streak+1;
  sndRotate();solveFlow();
  game.hintCell=null;
}
function isTowardProgress(r,c){return true;} // reserved hook for future streak tuning
function undoLastRotation(){
  if(!undoStack.length||game.state!=='playing')return;
  const last=undoStack.pop();
  grid[last.r][last.c].mask=last.mask;
  game.moves=Math.max(0,game.moves-1);
  solveFlow();
}
function showHint(){
  if(game.state!=='playing')return;
  // find the flowCell frontier: a lit cell adjacent to an unlit cell that
  // would connect if rotated correctly - highlight the first mismatched
  // neighbor cell needing rotation.
  for(const key of flowCells){
    const[r,c]=key.split(',').map(Number);
    const m=grid[r][c].mask;
    for(const d of['N','E','S','W']){
      const[dr,dc]=DIR_DELTA[d];const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=GROWS||nc<0||nc>=GCOLS)continue;
      if(flowCells.has(nr+','+nc))continue;
      if(nr===sourceR&&nc===sourceC)continue;
      // neighbor not yet flowing - it's the next cell to fix
      game.hintCell={r:nr,c:nc};game.hintT=1200;
      return;
    }
  }
}
function resetGame(){game.level=1;buildLevel(1);}
function continueGame(){const lv=clamp(save.lastLevel||1,1,9999);game.level=lv;buildLevel(lv);}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndRotate=()=>tone(360,0.08,'sine',0.05);
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};
function toggleMute(){game.muted=!game.muted;writeSave({muted:game.muted});updateCtrlButtons();}
function togglePause(){if(game.state==='playing')game.state='paused';else if(game.state==='paused')game.state='playing';updateCtrlButtons();}
function updateCtrlButtons(){
  const bm=document.getElementById('btnMute'),bp=document.getElementById('btnPause');
  if(bm){bm.textContent=game.muted?'🔇':'🔊';bm.classList.toggle('off',game.muted);}
  if(bp){bp.textContent=game.state==='paused'?'▶':'⏸';}
}
function update(dt){
  dt=clamp(dt,0,48);game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.hintT>0)game.hintT=Math.max(0,game.hintT-dt);
  if(game.flowPulse>0)game.flowPulse=Math.max(0,game.flowPulse-dt*0.0015);
  if(game.popups.length){for(const p of game.popups)p.t+=dt;game.popups=game.popups.filter(p=>p.t<p.life);}
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){const g=grid[r][c];if(g.flowT>0&&g.flowT<1)g.flowT=Math.min(1,g.flowT+dt*0.004);}
}
// draw helpers
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function cellAt(mx,my){const c=Math.floor((mx-GX)/(CELL+PAD)),r=Math.floor((my-GY)/(CELL+PAD));if(c<0||c>=GCOLS||r<0||r>=GROWS)return null;return{r,c};}
function drawPipe(x,y,m,flow){
  const cx=x+CELL/2,cy=y+CELL/2,hw=CELL*0.18,he=CELL*0.5;
  const col=flow>0?`rgba(${Math.floor(60+flow*60)},${Math.floor(180+flow*60)},${Math.floor(100+flow*80)},${(0.5+flow*0.5).toFixed(2)})`:'rgba(60,80,120,.6)';
  if(hasBit(m,'N')){ctx.fillStyle=col;ctx.fillRect(cx-hw,y,hw*2,cy-y);}
  if(hasBit(m,'S')){ctx.fillStyle=col;ctx.fillRect(cx-hw,cy,hw*2,y+CELL-cy);}
  if(hasBit(m,'E')){ctx.fillStyle=col;ctx.fillRect(cx,cy-hw,x+CELL-cx,hw*2);}
  if(hasBit(m,'W')){ctx.fillStyle=col;ctx.fillRect(x,cy-hw,cx-x,hw*2);}
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx,cy,hw*1.1,0,Math.PI*2);ctx.fill();
  // colorblind-friendly cue: directional arrow / pulsing dot on lit pipes
  if(flow>0){
    let dirs=[];for(const d of['N','E','S','W'])if(hasBit(m,d))dirs.push(d);
    if(dirs.length===2){
      const[d0]=dirs,exitDir=dirs[dirs.length-1];
      const[edr,edc]=DIR_DELTA[exitDir];
      const ax=cx+edc*he*0.62,ay=cy+edr*he*0.62;
      ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.beginPath();ctx.arc(ax,ay,3.4,0,Math.PI*2);ctx.fill();
    }
  }
}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#070a0f'],[1,'#040608']]);ctx.fillRect(0,0,W,H);}
function drawGridBg(){ctx.fillStyle='rgba(10,14,22,.85)';rr(GX-PAD,GY-PAD,GCOLS*(CELL+PAD)+PAD,GROWS*(CELL+PAD)+PAD,12);ctx.fill();}
function drawCells(){
  const connectedPct=Math.round(100*flowCells.size/Math.max(1,(GROWS*GCOLS)));
  for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){
    const x=GX+c*(CELL+PAD),y=GY+r*(CELL+PAD);const g2=grid[r][c];
    const isSrc=r===sourceR&&c===sourceC,isDest=r===destR&&c===destC;
    ctx.fillStyle='rgba(18,22,36,.9)';rr(x+2,y+2,CELL-4,CELL-4,8);ctx.fill();
    if(isSrc){
      ctx.fillStyle='rgba(80,180,255,.15)';rr(x+2,y+2,CELL-4,CELL-4,8);ctx.fill();
      ctx.strokeStyle='rgba(80,180,255,.5)';ctx.lineWidth=2;rr(x+2,y+2,CELL-4,CELL-4,8);ctx.stroke();
      ctx.fillStyle='rgba(80,180,255,.8)';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('SOURCE',x+CELL/2,y+CELL/2-8);ctx.fillText('clarity →',x+CELL/2,y+CELL/2+8);
    }else if(isDest){
      ctx.fillStyle='rgba(80,220,140,.15)';rr(x+2,y+2,CELL-4,CELL-4,8);ctx.fill();
      ctx.strokeStyle='rgba(80,220,140,.5)';ctx.lineWidth=2;rr(x+2,y+2,CELL-4,CELL-4,8);ctx.stroke();
      ctx.fillStyle='rgba(80,220,140,.8)';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('DEST',x+CELL/2,y+CELL/2-8);ctx.fillText('→ clarity',x+CELL/2,y+CELL/2+8);
      // progress ring showing how close overall flow is to completion
      if(!flowCells.has(destR+','+destC)){
        ctx.save();ctx.strokeStyle='rgba(255,210,90,.5)';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(x+CELL/2,y+CELL-14,8,-Math.PI/2,-Math.PI/2+Math.PI*2*(connectedPct/100));ctx.stroke();ctx.restore();
      }
    }else{
      drawPipe(x,y,g2.mask,g2.flowT);
    }
    if(game.hintCell&&game.hintT>0&&game.hintCell.r===r&&game.hintCell.c===c){
      const pulse=0.4+0.4*Math.abs(Math.sin(game.time*0.006));
      ctx.strokeStyle=`rgba(255,220,90,${pulse.toFixed(2)})`;ctx.lineWidth=3;rr(x+2,y+2,CELL-4,CELL-4,8);ctx.stroke();
    }
  }
}
function drawHUD(){
  ctx.save();ctx.fillStyle='rgba(4,6,10,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';ctx.fillStyle='#60b0ff';ctx.font='bold 13px Arial';
  ctx.fillText('Level '+game.level+(game.level>=MAX_LEVEL?' (Master)':''),18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Rotate pipes to connect source → destination · par '+parMoves+' moves',18,28);
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('MOVES  '+game.moves,W-18,8);
  const elapsed=((game.time-levelStartT)/1000).toFixed(1);
  ctx.fillText('TIME  '+elapsed+'s',W-18,24);
  if(game.streak>2){ctx.fillStyle='rgba(255,210,90,.7)';ctx.fillText('STREAK '+game.streak,W-18,40);}
  ctx.restore();
}
function drawPopups(){
  ctx.save();ctx.textAlign='center';
  for(const p of game.popups){
    const prog=p.t/p.life;const alpha=1-prog;const yoff=-prog*40;
    ctx.fillStyle=`rgba(255,230,140,${alpha.toFixed(2)})`;ctx.font='bold 20px Arial';
    ctx.fillText(p.text,W/2,H/2-60+yoff);
  }
  ctx.restore();
}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines,buttonLabel){
  ctx.save();ctx.fillStyle='rgba(3,5,8,.78)';ctx.fillRect(0,0,W,H);
  const pw=520,ph=buttonLabel?340:300,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(10,14,24,.97)'],[1,'rgba(6,8,16,.97)']]);rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(80,160,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillStyle='#60b0ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';let ly=py+98;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  let btnRect=null;
  if(buttonLabel){
    const bw=220,bh=48,bx=W/2-bw/2,by=py+ph-84;
    ctx.fillStyle=lgrad(bx,by,bx,by+bh,[[0,'rgba(80,160,255,.9)'],[1,'rgba(50,110,220,.9)']]);
    rr(bx,by,bw,bh,12);ctx.fill();
    ctx.fillStyle='#04070c';ctx.font='bold 17px Arial';ctx.fillText(buttonLabel,W/2,by+bh/2+6);
    btnRect={x:bx,y:by,w:bw,h:bh};
  }
  ctx.restore();
  return btnRect;
}
let lastTitleBtn=null,lastWonBtn=null;
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);
    ctx.save();
    if(game.shakeT>0){
      const mag=(game.shakeT/280)*4;
      ctx.translate((Math.random()*2-1)*mag,(Math.random()*2-1)*mag);
    }
    drawBg();
    if(game.state!=='title'){drawGridBg();drawCells();}
    vignette();
    if(game.state==='playing'||game.state==='paused')drawHUD();
    if(game.state==='playing')drawPopups();
    if(game.state==='title'){
      lastTitleBtn=panelDraw('Pipe Flow',['Rotate pipe segments to connect','the clarity source to its destination.','Click / tap a segment to rotate 90°.','','Route your own clarity through the structure.',(save.lastLevel&&save.lastLevel>1)?('Continue from level '+save.lastLevel+' available.'):''],(save.lastLevel&&save.lastLevel>1)?'Continue':'Start');
    }else if(game.state==='paused'){
      panelDraw('Paused',['Breathe.','','Press P or tap ▶ to resume.']);
    }else if(game.state==='won'){
      const stars=starsFor(game.level,game.moves);
      const best=game.bestMoves[game.level];
      lastWonBtn=panelDraw('Clarity Flows! '+'★'.repeat(stars)+'☆'.repeat(3-stars),['Solved in '+game.moves+' moves (par '+parMoves+').','Best: '+(best!=null?best+' moves':'-'),'','You can find the path through any structure.'],'Next Level');
    }
    ctx.restore();
  }catch(e){}
}
function pointerDown(e){
  const rect=canvas.getBoundingClientRect();const sx=W/rect.width,sy=H/rect.height;
  let px,py;
  if(e.touches){px=(e.touches[0].clientX-rect.left)*sx;py=(e.touches[0].clientY-rect.top)*sy;}
  else{px=(e.clientX-rect.left)*sx;py=(e.clientY-rect.top)*sy;}
  const a2=AC();if(a2&&a2.state==='suspended'){try{a2.resume();}catch(ex){}}
  if(game.state==='title'){
    if(lastTitleBtn&&px>=lastTitleBtn.x&&px<=lastTitleBtn.x+lastTitleBtn.w&&py>=lastTitleBtn.y&&py<=lastTitleBtn.y+lastTitleBtn.h){
      if(save.lastLevel&&save.lastLevel>1)continueGame();else resetGame();
      return;
    }
    if(save.lastLevel&&save.lastLevel>1)continueGame();else resetGame();
    return;
  }
  if(game.state==='won'){
    if(lastWonBtn&&!(px>=lastWonBtn.x&&px<=lastWonBtn.x+lastWonBtn.w&&py>=lastWonBtn.y&&py<=lastWonBtn.y+lastWonBtn.h)){
      // tapping outside the explicit button still advances (keeps old full-tap affordance)
    }
    buildLevel(game.level+1);
    return;
  }
  if(game.state!=='playing')return;
  const co=cellAt(px,py);if(co)clickCell(co.r,co.c);
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();pointerDown(e);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e);},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='KeyP'){e.preventDefault();togglePause();}
  if(e.code==='KeyH'){e.preventDefault();showHint();}
  if(e.code==='KeyU'){e.preventDefault();undoLastRotation();}
  if(e.code==='KeyM'){e.preventDefault();toggleMute();}
  if((e.code==='Enter')&&(game.state==='title'||game.state==='won')){
    e.preventDefault();
    if(game.state==='won')buildLevel(game.level+1);
    else if(save.lastLevel&&save.lastLevel>1)continueGame();
    else resetGame();
  }
});
document.getElementById('btnPause').addEventListener('click',e=>{e.preventDefault();togglePause();});
document.getElementById('btnMute').addEventListener('click',e=>{e.preventDefault();toggleMute();});
document.getElementById('btnHint').addEventListener('click',e=>{e.preventDefault();showHint();});
document.getElementById('btnUndo').addEventListener('click',e=>{e.preventDefault();undoLastRotation();});
updateCtrlButtons();
let last=0;function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={get game(){return game;},get grid(){return grid;},get flowCells(){return flowCells;},buildLevel,resetGame,continueGame,clickCell,solveFlow,cellAt,update,draw,undoLastRotation,showHint,toggleMute,togglePause,get GCOLS(){return GCOLS;},get GROWS(){return GROWS;},CELL,rotateMask};
</script>
