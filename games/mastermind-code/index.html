<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Value Code</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#0a080f;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:8px;right:8px;display:flex;gap:8px;z-index:10;}
#ctrls button{width:36px;height:36px;border-radius:8px;border:1.5px solid rgba(200,160,255,.4);background:rgba(16,12,28,.85);color:#eaf2f6;font-size:16px;line-height:1;cursor:pointer;pointer-events:auto;touch-action:manipulation;}
#ctrls button:active{background:rgba(60,40,90,.9);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
  <button id="btnMute" title="Mute">🔊</button>
  <button id="btnPause" title="Pause">⏸</button>
</div>
<div id="hint">Click a colour to add to your guess &middot; Submit when 4 are chosen &middot; P pause &middot; values can repeat</div>
<script>
'use strict';
// Value Code (#26) — Mastermind variant
// Guess a secret 4-colour "value code" in ≤8 tries.
// Each try gives black pegs (right colour+pos) and
// white pegs (right colour, wrong pos).
// Theme: discovering your own value code through reflection.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const VALUES=[
  {name:'Rest',    color:'#5be0b0'},
  {name:'Joy',     color:'#ffd560'},
  {name:'Agency',  color:'#6090ff'},
  {name:'Peace',   color:'#c070f0'},
  {name:'Focus',   color:'#f07070'},
  {name:'Growth',  color:'#80e870'},
];
const BASE_CODE_LEN=4,BASE_MAX_TRIES=8,BASE_COLORS=6;
let CODE_LEN=BASE_CODE_LEN,MAX_TRIES=BASE_MAX_TRIES;
const game={state:'title',time:0,wins:0,streak:0,shakeT:0,winT:0,muted:false,seedCounter:0,forcedSecret:null,hintUsed:false};
let secret=[],tries=[],current=[],rng;
// localStorage best-score persistence
const LS_KEY='valuecode_best_v1';
function loadBest(){try{const raw=localStorage.getItem(LS_KEY);if(!raw)return{bestStreak:0,fewestTries:0};const o=JSON.parse(raw);return{bestStreak:o.bestStreak|0,fewestTries:o.fewestTries|0};}catch(e){return{bestStreak:0,fewestTries:0};}}
function saveBest(b){try{localStorage.setItem(LS_KEY,JSON.stringify(b));}catch(e){}}
let best=loadBest();
function difficultyForStreak(streak){const s=clamp(streak,0,20);const colorCount=clamp(BASE_COLORS+Math.floor(s/3),BASE_COLORS,VALUES.length);const maxTries=clamp(BASE_MAX_TRIES-Math.floor(s/4),5,BASE_MAX_TRIES);return{colorCount,maxTries};}
function makeSecret(){game.seedCounter++;const seedBase=game.forcedSecret?1:(game.seedCounter*9973);rng=seeded(seedBase);const diff=difficultyForStreak(game.streak);MAX_TRIES=diff.maxTries;CODE_LEN=BASE_CODE_LEN;const pool=diff.colorCount;if(game.forcedSecret&&game.forcedSecret.length===CODE_LEN){secret=game.forcedSecret.slice();}else{secret=Array.from({length:CODE_LEN},()=>Math.floor(rng()*pool));}tries=[];current=[];game.hintUsed=false;}
function evaluate(guess){let black=0,white=0;const sc=[...secret],gc=[...guess];for(let i=0;i<CODE_LEN;i++)if(sc[i]===gc[i]){black++;sc[i]=gc[i]=-1;}for(let i=0;i<CODE_LEN;i++){if(gc[i]===-1)continue;const j=sc.indexOf(gc[i]);if(j>=0){white++;sc[j]=-1;}}return{black,white};}
function submit(){if(current.length<CODE_LEN)return;const res=evaluate(current);tries.push({guess:[...current],black:res.black,white:res.white});current=[];sndSubmit();if(res.black===CODE_LEN){game.wins++;game.streak++;sndWin();game.state='winning';game.winT=0;if(game.streak>best.bestStreak){best.bestStreak=game.streak;saveBest(best);}const usedTries=tries.length;if(best.fewestTries===0||usedTries<best.fewestTries){best.fewestTries=usedTries;saveBest(best);}}else if(tries.length>=MAX_TRIES){game.streak=0;game.state='gameover';game.shakeT=220;}else{game.shakeT=140;}}
function useHint(){if(game.hintUsed||game.state!=='playing')return;game.hintUsed=true;const unknownIdx=[];for(let i=0;i<CODE_LEN;i++)unknownIdx.push(i);const pick=unknownIdx[Math.floor(rng()*unknownIdx.length)];while(current.length<CODE_LEN)current.push(0);current[pick]=secret[pick];sndPick();}
function undoPeg(i){if(game.state!=='playing')return;if(i>=0&&i<current.length){current.splice(i,1);}}
function resetGame(){makeSecret();game.state='playing';}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){if(game.muted)return;const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}}
const sndPick=()=>tone(400,0.08,'sine',0.05);
const sndSubmit=()=>tone(300,0.12,'sine',0.06);
const sndWin=()=>{if(game.muted)return;[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};
const WIN_TRANSITION_MS=420;
function update(dt){dt=clamp(dt,0,48);game.time+=dt;if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);if(game.state==='winning'){game.winT=Math.min(WIN_TRANSITION_MS,game.winT+dt);if(game.winT>=WIN_TRANSITION_MS)game.state='won';}}
const R=22,PAD=10;
const BOARD_X=200,BOARD_Y=60,ROW_H=50;
const PALETTE_Y=H-96;
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#0c0a14'],[1,'#070510']]);ctx.fillRect(0,0,W,H);}
function drawBoard(){// tries history
  ctx.fillStyle='rgba(16,12,28,.85)';rr(BOARD_X-10,BOARD_Y-10,CODE_LEN*(R*2+PAD)+80,MAX_TRIES*ROW_H+20,12);ctx.fill();
  for(let t=0;t<tries.length;t++){const tr=tries[t];const y=BOARD_Y+t*ROW_H+ROW_H/2;for(let i=0;i<CODE_LEN;i++){const x=BOARD_X+i*(R*2+PAD)+R;ctx.fillStyle=VALUES[tr.guess[i]].color;ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fill();}// pegs
    const px=BOARD_X+CODE_LEN*(R*2+PAD)+14;for(let b=0;b<tr.black;b++){ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(px+b*14,y-7,5,0,Math.PI*2);ctx.fill();}for(let w=0;w<tr.white;w++){ctx.fillStyle='rgba(200,200,200,.4)';ctx.beginPath();ctx.arc(px+w*14,y+7,5,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(234,242,246,.6)';ctx.font='13px Arial';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(`${tr.black}● ${tr.white}○`,px,y);}
  // current row
  if(game.state==='playing'){const t2=tries.length;const y=BOARD_Y+t2*ROW_H+ROW_H/2;ctx.strokeStyle='rgba(200,180,255,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.rect(BOARD_X-4,BOARD_Y+t2*ROW_H+4,CODE_LEN*(R*2+PAD)+PAD,ROW_H-8);ctx.stroke();for(let i=0;i<CODE_LEN;i++){const x=BOARD_X+i*(R*2+PAD)+R;if(i<current.length){ctx.fillStyle=VALUES[current[i]].color;ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fill();}else{ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.stroke();}}}}
const activePoolCount=()=>clamp(difficultyForStreak(game.streak).colorCount,BASE_COLORS,VALUES.length);
function drawPalette(){ctx.fillStyle='rgba(16,12,28,.8)';rr(80,PALETTE_Y-10,W-160,86,12);ctx.fill();const total=activePoolCount(),tw=(W-160)/total;for(let i=0;i<total;i++){const x=80+i*tw+tw/2,y=PALETTE_Y+26;ctx.shadowColor=VALUES[i].color;ctx.shadowBlur=8;ctx.fillStyle=VALUES[i].color;ctx.beginPath();ctx.arc(x,y,R+6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(0,0,0,.75)';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(VALUES[i].name,x,y);}
// submit
if(current.length===CODE_LEN){const sw=100,sh=40,sx=W/2-sw-8,sy=PALETTE_Y-58;ctx.fillStyle='rgba(80,220,140,.22)';rr(sx,sy,sw,sh,10);ctx.fill();ctx.strokeStyle='rgba(80,220,140,.7)';ctx.lineWidth=2;rr(sx,sy,sw,sh,10);ctx.stroke();ctx.fillStyle='#8affd2';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SUBMIT',sx+sw/2,sy+sh/2);}
// remove last
if(current.length>0){const sw=90,sh=40,sx=W/2+8,sy=PALETTE_Y-58;ctx.fillStyle='rgba(220,80,80,.18)';rr(sx,sy,sw,sh,10);ctx.fill();ctx.strokeStyle='rgba(220,80,80,.5)';ctx.lineWidth=1.5;rr(sx,sy,sw,sh,10);ctx.stroke();ctx.fillStyle='rgba(255,160,160,.9)';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('← Back',sx+sw/2,sy+sh/2);}
// hint
if(!game.hintUsed){const sw=90,sh=40,sx=W/2+106,sy=PALETTE_Y-58;ctx.fillStyle='rgba(200,160,255,.15)';rr(sx,sy,sw,sh,10);ctx.fill();ctx.strokeStyle='rgba(200,160,255,.5)';ctx.lineWidth=1.5;rr(sx,sy,sw,sh,10);ctx.stroke();ctx.fillStyle='rgba(220,190,255,.9)';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Hint',sx+sw/2,sy+sh/2);}}
function drawHUD(){ctx.save();ctx.fillStyle='rgba(5,4,10,.88)';rr(0,0,W,46,0);ctx.fill();ctx.textBaseline='top';ctx.textAlign='left';ctx.fillStyle='#c8a0ff';ctx.font='bold 13px Arial';ctx.fillText('Value Code',18,8);ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Guess the '+CODE_LEN+'-value secret code',18,28);ctx.textAlign='center';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Tries',W/2,8);const triesLeft=MAX_TRIES-tries.length;ctx.fillStyle=triesLeft<=2?'#ff8a70':'#ffd580';ctx.font='bold 22px Arial';ctx.fillText(tries.length+' / '+MAX_TRIES,W/2,22);ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Streak '+game.streak+'  ·  Best '+best.bestStreak,W-90,8);ctx.restore();}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){ctx.save();ctx.fillStyle='rgba(4,3,10,.78)';ctx.fillRect(0,0,W,H);const pw=540,ph=310,px=(W-pw)/2,py=(H-ph)/2;ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(18,12,38,.97)'],[1,'rgba(10,7,22,.97)']]);rr(px,py,pw,ph,22);ctx.fill();ctx.strokeStyle='rgba(180,140,255,.25)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillStyle='#c8a0ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';let ly=py+100;for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}ctx.restore();}
function draw(){try{ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);ctx.save();
  if(game.shakeT>0){const mag=Math.min(6,game.shakeT/24);const sx=(Math.random()*2-1)*mag,sy=(Math.random()*2-1)*mag;ctx.translate(sx,sy);}
  drawBg();if(game.state!=='title'){drawBoard();drawPalette();}vignette();if(game.state==='playing'||game.state==='paused'||game.state==='winning')drawHUD();
  if(game.state==='title')panelDraw('Value Code',['Guess the secret value sequence in limited tries.','Filled circle = right value in right position.','Open circle = right value, wrong position.','Values can repeat in the secret code.','','Discovering your values through reflection.','Best streak: '+best.bestStreak+'   Fewest tries: '+(best.fewestTries||'—'),'','Click / tap to begin.']);
  else if(game.state==='paused')panelDraw('Paused',['Breathe.','','Press P or tap ▶ to resume.']);
  else if(game.state==='winning'){const reveal=secret.map(i=>VALUES[i].name).join(' · ');const p=game.winT/WIN_TRANSITION_MS;ctx.save();ctx.globalAlpha=p;panelDraw('Code Cracked! ✓',['The code was: '+reveal,'Solved in '+tries.length+' / '+MAX_TRIES+' tries  ·  Streak: '+game.streak]);ctx.restore();}
  else if(game.state==='won'){const reveal=secret.map(i=>VALUES[i].name).join(' · ');panelDraw('Code Cracked! ✓',['The code was: '+reveal,'Solved in '+tries.length+' / '+MAX_TRIES+' tries  ·  Streak: '+game.streak,'Best streak: '+best.bestStreak+'   Fewest tries: '+(best.fewestTries||'—'),'','Your value code is unique to you.','','Click / tap to play again.']);}
  else if(game.state==='gameover'){const reveal=secret.map(i=>VALUES[i].name).join(' · ');panelDraw('Code Hidden',['The code was: '+reveal,'Best streak: '+best.bestStreak+'   Fewest tries: '+(best.fewestTries||'—'),'','Reflection takes time — try again.','','Click / tap to play again.']);}
ctx.restore();}catch(e){}}
function paletteIdx(mx,my){if(my<PALETTE_Y-10||my>PALETTE_Y+76)return-1;const total=activePoolCount(),tw=(W-160)/total;const i=Math.floor((mx-80)/tw);if(i<0||i>=total)return-1;return i;}
function togglePause(){if(game.state==='playing')game.state='paused';else if(game.state==='paused')game.state='playing';}
function toggleMute(){game.muted=!game.muted;const b=document.getElementById('btnMute');if(b)b.textContent=game.muted?'🔇':'🔊';}
function pointerDown(e){const rect=canvas.getBoundingClientRect();const sx=W/rect.width,sy2=H/rect.height;let px,py;if(e.touches){px=(e.touches[0].clientX-rect.left)*sx;py=(e.touches[0].clientY-rect.top)*sy2;}else{px=(e.clientX-rect.left)*sx;py=(e.clientY-rect.top)*sy2;}const a2=AC();if(a2&&a2.state==='suspended'){try{a2.resume();}catch(ex){}}if(game.state==='title'||game.state==='won'||game.state==='gameover'){resetGame();return;}if(game.state!=='playing')return;
// submit button
const btnY0=PALETTE_Y-58,btnY1=PALETTE_Y-18;
if(current.length===CODE_LEN&&py>=btnY0&&py<=btnY1&&px>=W/2-108&&px<=W/2-8){submit();return;}
// back button
if(current.length>0&&py>=btnY0&&py<=btnY1&&px>=W/2+8&&px<=W/2+98){current.pop();return;}
// hint button
if(!game.hintUsed&&py>=btnY0&&py<=btnY1&&px>=W/2+106&&px<=W/2+196){useHint();return;}
// palette
const pi=paletteIdx(px,py);if(pi>=0&&current.length<CODE_LEN){current.push(pi);sndPick();}}
canvas.addEventListener('mousedown',e=>{e.preventDefault();pointerDown(e);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e);},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='KeyP'){e.preventDefault();togglePause();}if(e.code==='KeyM'){e.preventDefault();toggleMute();}if(e.code==='Enter'&&current.length===CODE_LEN&&game.state==='playing')submit();if(e.code==='Backspace'&&current.length>0&&game.state==='playing')current.pop();});
const btnPauseEl=document.getElementById('btnPause'),btnMuteEl=document.getElementById('btnMute');
if(btnPauseEl)btnPauseEl.addEventListener('click',e=>{e.preventDefault();togglePause();btnPauseEl.textContent=game.state==='paused'?'▶':'⏸';});
if(btnMuteEl)btnMuteEl.addEventListener('click',e=>{e.preventDefault();toggleMute();});
let last=0;function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={get game(){return game;},get secret(){return secret;},get tries(){return tries;},get current(){return current;},get best(){return best;},resetGame,makeSecret,submit,evaluate,update,draw,useHint,undoPeg,togglePause,toggleMute,setForcedSecret(arr){game.forcedSecret=arr?arr.slice():null;},VALUES,get CODE_LEN(){return CODE_LEN;},get MAX_TRIES(){return MAX_TRIES;}};
</script>
</body>
</html>
