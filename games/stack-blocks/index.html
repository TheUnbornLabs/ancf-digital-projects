<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Stack Blocks</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#04030a;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
canvas{display:block;background:#04030a;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:5;}
#ctrls button{width:42px;height:42px;border-radius:10px;border:1px solid rgba(160,100,255,.35);background:rgba(6,4,14,.85);color:#eaf2f6;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;}
#ctrls button:active{background:rgba(160,100,255,.3);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrls">
<button id="btnMute" aria-label="Mute">🔊</button>
<button id="btnPause" aria-label="Pause">⏸</button>
</div>
<div id="hint">Click / tap to drop the swinging block &middot; stack 15 blocks to win &middot; P pause &middot; M mute</div>
<script>
'use strict';
// Stack Blocks (#76)
// Classic block-stacker. A swinging block pans left/right.
// Click to drop it onto the growing tower.
// Overhanging part is cut off. Stack 15 blocks to win, then endless mode continues.
// Theme: building deliberately, one intentional choice at a time.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const BLOCK_H=28,START_W=200,SPEED_BASE=120,SPEED_MAX=340;
const MIN_OVERLAP_FLOOR=34; // rubber-band: never let usable width fall below this
const COLORS=['#6080ff','#e060e0','#60d080','#ffa040','#60d0c0','#ff8060','#ffe060','#c0a0ff','#80e0a0','#ff9090'];
const LABELS=['Clarity','Purpose','Calm','Joy','Freedom','Courage','Rest','Focus','Trust','Growth','Create','Flow','Peace','Value','Rise'];
const TARGET=15;

// ---- persistence ----
function loadBest(){try{const v=parseInt(localStorage.getItem('stackblocks_best'),10);return isFinite(v)&&v>0?v:0;}catch(e){return 0;}}
function saveBest(v){try{localStorage.setItem('stackblocks_best',String(v));}catch(e){}}
function loadMute(){try{return localStorage.getItem('stackblocks_muted')==='1';}catch(e){return false;}}
function saveMute(v){try{localStorage.setItem('stackblocks_muted',v?'1':'0');}catch(e){}}

const game={state:'title',time:0,score:0,best:loadBest(),shakeT:0,shakeMag:0,streak:0,bestStreak:0,perfects:0,drops:0,muted:loadMute(),endless:false,prevState:'title'};
let tower=[],swinger,fallers=[],particles=[],popups=[];

function resetGame(){
  tower=[];
  tower.push({x:(W-START_W)/2,y:H-60,w:START_W,h:BLOCK_H,col:'#888',label:'Foundation'});
  game.score=0;game.shakeT=0;game.shakeMag=0;game.streak=0;game.perfects=0;game.drops=0;game.endless=false;
  fallers=[];particles=[];popups=[];
  nextSwinger();
  game.state='playing';
}
function nextSwinger(){
  const top=tower[tower.length-1];
  const raw=SPEED_BASE+tower.length*6;
  const spd=Math.min(raw,SPEED_MAX);
  const dir=tower.length%2===0?1:-1;
  swinger={x:dir>0?-START_W:W,y:top.y-BLOCK_H,w:top.w,vx:spd*dir,col:COLORS[tower.length%COLORS.length],label:LABELS[tower.length%LABELS.length]};
}
function spawnParticles(x,y,col,n,spread){
  n=n||10;spread=spread||1;
  for(let i=0;i<n;i++){
    particles.push({
      x:x,y:y,
      vx:(Math.random()*2-1)*140*spread,
      vy:-Math.random()*160*spread-20,
      life:0,maxLife:0.5+Math.random()*0.4,
      col:col,size:2+Math.random()*3
    });
  }
}
function spawnPopup(x,y,text,col){popups.push({x,y,text,col,life:0,maxLife:0.9});}

function drop(){
  if(!swinger)return;
  const top=tower[tower.length-1];
  const ol=Math.max(swinger.x,top.x);
  const or2=Math.min(swinger.x+swinger.w,top.x+top.w);
  const overlap=or2-ol;
  game.drops++;
  if(overlap<=0){
    sndMiss();
    game.shakeT=300;game.shakeMag=10;
    fallers.push({x:swinger.x,y:swinger.y,w:swinger.w,h:BLOCK_H,col:swinger.col,vy:0,vx:swinger.vx*0.3,rot:0,vrot:(Math.random()*2-1)*4});
    game.streak=0;
    swinger=null;
    setTimeout(()=>{
      if(game.score>game.best){game.best=game.score;saveBest(game.best);}
      sndFail();
      game.state='gameover';
    },700);
    return;
  }
  // rubber-band floor: if overlap has shrunk very small, restore some width so it's not unwinnable
  let usedW=overlap;
  let usedX=ol;
  const pct=overlap/top.w;
  const isPerfect=pct>=0.95;
  if(usedW<MIN_OVERLAP_FLOOR){
    const grow=MIN_OVERLAP_FLOOR-usedW;
    usedX=Math.max(0,usedX-grow/2);
    usedW=MIN_OVERLAP_FLOOR;
  }
  // cut-off overhang debris
  if(swinger.x<ol){
    fallers.push({x:swinger.x,y:swinger.y,w:ol-swinger.x,h:BLOCK_H,col:swinger.col,vy:20,vx:-60,rot:0,vrot:-3});
  }
  if(swinger.x+swinger.w>or2){
    fallers.push({x:or2,y:swinger.y,w:(swinger.x+swinger.w)-or2,h:BLOCK_H,col:swinger.col,vy:20,vx:60,rot:0,vrot:3});
  }
  const newBlock={x:usedX,y:swinger.y,w:usedW,h:BLOCK_H,col:swinger.col,label:swinger.label,perfect:isPerfect};
  tower.push(newBlock);
  const cx=usedX+usedW/2,cy=swinger.y;
  if(isPerfect){
    game.streak++;
    if(game.streak>game.bestStreak)game.bestStreak=game.streak;
    game.perfects++;
    game.score+=2;
    spawnParticles(cx,cy,'#ffe060',18,1.4);
    spawnPopup(cx,cy-10,'PERFECT'+(game.streak>1?' x'+game.streak:''),'#ffe060');
    game.shakeT=Math.max(game.shakeT,90);game.shakeMag=Math.max(game.shakeMag,3);
    sndPerfect();
  }else{
    game.streak=0;
    game.score+=1;
    spawnParticles(cx,cy,swinger.col,8,0.8);
    spawnPopup(cx,cy-10,'+1','rgba(234,242,246,.85)');
    sndDrop();
  }
  if(game.score>game.best){game.best=game.score;saveBest(game.best);}
  if(tower.length-1>=TARGET&&!game.endless){
    game.endless=true;
    spawnPopup(W/2,H*0.3,'ENDLESS MODE','#c0a0ff');
  }
  nextSwinger();
}

function update(dt){
  dt=clamp(dt,0,48);
  const s=dt/1000;
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  // particles & popups & fallers animate regardless of state except title
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life+=s;
    if(p.life>=p.maxLife){particles.splice(i,1);continue;}
    p.vy+=500*s;
    p.x+=p.vx*s;p.y+=p.vy*s;
  }
  for(let i=popups.length-1;i>=0;i--){
    const u=popups[i];
    u.life+=s;
    if(u.life>=u.maxLife){popups.splice(i,1);continue;}
    u.y-=40*s;
  }
  for(let i=fallers.length-1;i>=0;i--){
    const f=fallers[i];
    f.vy=Math.max(-2000,Math.min(2000,f.vy+900*s));
    f.x+=f.vx*s;f.y+=f.vy*s;f.rot+=f.vrot*s;
    if(f.y>H+120)fallers.splice(i,1);
  }
  if(game.state!=='playing')return;
  if(swinger){
    swinger.x+=swinger.vx*s;
    if(swinger.x>W){swinger.vx=-Math.abs(swinger.vx);}
    if(swinger.x+swinger.w<0){swinger.vx=Math.abs(swinger.vx);}
  }
}
// camera offset: scroll up as tower grows
function camY(){const top=tower[tower.length-1];const desired=H/2-top.y;return clamp(desired,0,H);}
function currentMinWidth(){
  // narrowest reasonable width remaining before rubber-band floor kicks in fully
  const top=tower[tower.length-1];
  return top?top.w:START_W;
}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(game.muted)return;
  const a=AC();if(!a)return;
  try{
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||0.15)+0.02);
  }catch(e){}
}
const sndDrop=()=>tone(300+tower.length*15,0.1,'sine',0.05);
const sndPerfect=()=>{[720,960].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.06),i*40));};
const sndMiss=()=>tone(180,0.3,'sawtooth',0.06);
const sndFail=()=>{[220,160,110].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sawtooth',0.06),i*90));};
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBg(cy){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#04030a'],[1,'#020208']]);ctx.fillRect(0,0,W,H);}
function drawBlock(b,cy){
  const sy=b.y+cy;
  if(sy<-40||sy>H+40)return;
  const narrow=b.w<MIN_OVERLAP_FLOOR*1.6;
  ctx.shadowColor=(b.perfect?'#ffe060':b.col)+'60';
  ctx.shadowBlur=b.perfect?8:4;
  ctx.fillStyle=b.col+'cc';
  rr(b.x,sy,b.w,BLOCK_H,4);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle=(b.perfect?'#ffe060':b.col)+'66';
  ctx.lineWidth=b.perfect?2:1;
  rr(b.x,sy,b.w,BLOCK_H,4);ctx.stroke();
  // label: scale font down / truncate as block narrows
  let fs=9;
  if(b.w<70)fs=7;
  if(b.w<45)fs=6;
  ctx.fillStyle='rgba(234,242,246,.85)';
  ctx.font='bold '+fs+'px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  let label=b.label;
  const maxChars=Math.max(2,Math.floor(b.w/(fs*0.62)));
  if(label.length>maxChars)label=label.slice(0,Math.max(1,maxChars-1))+'…';
  if(b.w>=18)ctx.fillText(label,b.x+b.w/2,sy+BLOCK_H/2);
}
function drawFaller(f,cy){
  const sy=f.y+cy;
  if(sy<-60||sy>H+80)return;
  ctx.save();
  ctx.translate(f.x+f.w/2,sy+f.h/2);
  ctx.rotate(f.rot);
  ctx.globalAlpha=0.9;
  ctx.fillStyle=f.col+'aa';
  rr(-f.w/2,-f.h/2,f.w,f.h,3);ctx.fill();
  ctx.restore();
}
function drawParticles(cy){
  for(const p of particles){
    const a=1-p.life/p.maxLife;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.size/2,p.y+cy-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}
function drawPopups(cy){
  for(const u of popups){
    const a=1-u.life/u.maxLife;
    ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=u.col;
    ctx.font='bold 14px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(u.text,u.x,u.y+cy);
  }
  ctx.globalAlpha=1;
}
function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(2,1,5,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#c0a0ff';ctx.font='bold 13px Arial';
  ctx.fillText('Stack Blocks'+(game.endless?' · Endless':''),18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText(game.endless?'Keep going — how high can you build?':('Click / tap to drop  Target: '+TARGET+' blocks'),18,28);
  ctx.textAlign='center';ctx.fillStyle='#ffd580';ctx.font='bold 22px Arial';
  ctx.fillText(game.score,W/2,16);
  if(game.streak>1){
    ctx.fillStyle='#ffe060';ctx.font='bold 11px Arial';
    ctx.fillText('streak x'+game.streak,W/2,38);
  }
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('Best: '+game.best,W-18,8);
  ctx.restore();
  // low-margin warning
  const w=currentMinWidth();
  if(w<MIN_OVERLAP_FLOOR*1.5){
    const pulse=0.35+0.25*Math.sin(game.time/120);
    ctx.save();
    ctx.strokeStyle='rgba(255,80,80,'+pulse.toFixed(2)+')';
    ctx.lineWidth=6;
    ctx.strokeRect(3,3,W-6,H-6);
    ctx.restore();
  }
}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(2,1,5,.78)';ctx.fillRect(0,0,W,H);
  const pw=520,ph=320,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(6,4,14,.97)'],[1,'rgba(4,3,10,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(160,100,255,.22)';ctx.lineWidth=1.5;
  rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#c0a0ff';ctx.font='bold 34px Arial';
  ctx.fillText(title,W/2,py+62);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+98;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    // screen shake
    let sx=0,sy=0;
    if(game.shakeT>0&&game.shakeMag>0){
      const f=game.shakeT/300;
      sx=(Math.random()*2-1)*game.shakeMag*f;
      sy=(Math.random()*2-1)*game.shakeMag*f;
    }
    ctx.translate(sx,sy);
    const cy=camY();
    drawBg(cy);
    if(game.state!=='title'){
      for(const b of tower)drawBlock(b,cy);
      for(const f of fallers)drawFaller(f,cy);
      if(swinger)drawBlock(swinger,cy);
      drawParticles(cy);
      drawPopups(cy);
    }
    vignette();
    if(game.state==='playing')drawHUD();
    if(game.state==='paused'){
      drawHUD();
      panelDraw('Paused',['Score: '+game.score,'','Click / tap resume, or press P.']);
    }
    if(game.state==='title')panelDraw('Stack Blocks',['A block swings left and right.','Click / tap to drop it onto the tower.','The overhanging part is cut off.','Stack '+TARGET+' blocks, then keep going in endless mode.','','Build deliberately — one choice at a time.','','Click / tap to begin.']);
    else if(game.state==='won'){
      const pct=game.drops>0?Math.round(100*game.perfects/game.drops):0;
      panelDraw('Tower Built! ✓',['Score: '+game.score+' / '+TARGET,'Best: '+game.best,'Steady hand: '+pct+'% perfect drops','',''+TARGET+' intentional choices stacked perfectly.','','Click / tap to keep building (endless).']);
    }
    else if(game.state==='gameover'){
      const pct=game.drops>0?Math.round(100*game.perfects/game.drops):0;
      panelDraw('Tower Fell',['Score: '+game.score+'  Best: '+game.best,'Steady hand: '+pct+'% perfect drops','','One miss, but the foundation remains.','','Click / tap to try again.']);
    }
    ctx.restore();
  }catch(e){}
}
function togglePause(){
  if(game.state==='playing'){game.prevState='playing';game.state='paused';}
  else if(game.state==='paused'){game.state='playing';}
}
function toggleMute(){
  game.muted=!game.muted;
  saveMute(game.muted);
  const btn=document.getElementById('btnMute');
  if(btn)btn.textContent=game.muted?'🔇':'🔊';
}
function onDown(e){
  if(e&&e.preventDefault)e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'||game.state==='won'||game.state==='gameover'){resetGame();return;}
  if(game.state==='paused'){game.state='playing';return;}
  if(game.state==='playing'&&swinger)drop();
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'){togglePause();}
  if(e.key==='m'||e.key==='M'){toggleMute();}
});
const btnPause=document.getElementById('btnPause');
const btnMute=document.getElementById('btnMute');
if(btnPause)btnPause.addEventListener('click',e=>{e.stopPropagation();togglePause();});
if(btnMute)btnMute.addEventListener('click',e=>{e.stopPropagation();toggleMute();});
if(btnMute)btnMute.textContent=game.muted?'🔇':'🔊';

// ---- responsive letterboxed canvas (fixes coordinate-scaling bug) ----
function resize(){
  const vw=window.innerWidth||W,vh=window.innerHeight||H;
  const scale=Math.min(vw/W,vh/H);
  const cw=Math.round(W*scale),ch=Math.round(H*scale);
  canvas.style.width=cw+'px';
  canvas.style.height=ch+'px';
}
window.addEventListener('resize',resize);
resize();

let last=0;
function loop(ts){
  if(!last)last=ts;
  const dt=ts-last;
  last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={
  get game(){return game;},
  get tower(){return tower;},
  get swinger(){return swinger;},
  get fallers(){return fallers;},
  get particles(){return particles;},
  resetGame,nextSwinger,drop,update,draw,camY,togglePause,toggleMute,resize,
  TARGET,BLOCK_H,START_W,MIN_OVERLAP_FLOOR
};
</script>
</body>
</html>
