<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Border Cross</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#02030a;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
canvas{width:100vw;height:100vh;display:block;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;z-index:5;}
#controls{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:20;}
#controls button{width:44px;height:44px;border-radius:10px;border:1px solid rgba(120,170,255,.35);background:rgba(4,8,20,.7);color:#bcd6ff;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;pointer-events:auto;touch-action:manipulation;}
#controls button:active{background:rgba(80,140,255,.35);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="controls">
  <button id="btnMute" aria-label="Mute" title="Mute">🔊</button>
  <button id="btnPause" aria-label="Pause" title="Pause">⏸</button>
</div>
<div id="hint">Cross the lane to reach the other side &middot; dodge social-pressure traffic &middot; 10 levels &middot; P/Esc pause</div>
<script>
'use strict';
// Border Cross (#86)
// Frogger-style. Guide the player across lanes of moving pressure traffic.
// 5 lanes, each filled with obligation-labelled vehicles moving at varying speeds.
// Reach the far side to score. 10 levels; traffic gets faster.
// Theme: crossing social expectations to reach your own side.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const LANES=5;
const LANE_H=60;
const PLAYER_W=34,PLAYER_H=34;
const SAFE_Y=H-60;// start zone
const GOAL_Y=30;// finish zone
const TRAFFIC_LABELS=['Pressure','Expectation','Obligation','Urgency','Conform','Routine','Deadline'];
const TOTAL=10;
const MAX_SPEED_BASE=260;// clamp target for item 5

// ---- localStorage helpers (item 6, 15) : always guarded ----
const LS_BEST='bordercross_best';
const LS_FASTEST='bordercross_fastest_ms';
const LS_MUTE='bordercross_mute';
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

const game={
  state:'title',time:0,round:0,score:0,best:0,lives:3,shakeT:0,
  streak:0,levelStartTime:0,fastestMs:0,hitless:true,hitFlashT:0,
  laneFlashT:0,laneFlashY:0,muted:false,paused:false,invulnT:0,
  particles:[]
};
try{const b=parseInt(lsGet(LS_BEST)||'0',10);if(!isNaN(b))game.best=Math.max(0,b);}catch(e){}
try{const f=parseInt(lsGet(LS_FASTEST)||'0',10);if(!isNaN(f))game.fastestMs=Math.max(0,f);}catch(e){}
try{game.muted=lsGet(LS_MUTE)==='1';}catch(e){}

let player,traffic=[],rng;
const LANE_CENTERS=Array.from({length:LANES},(_,i)=>H-120-i*(LANE_H+8));

function buildLevel(r){
  rng=seeded(r*6007+17);
  traffic=[];
  for(let i=0;i<LANES;i++){
    const count=2+Math.floor(rng()*2);
    const dir=i%2===0?1:-1;
    // item 5: clamp traffic speed so it can never grow unbounded
    const baseSpeed=Math.min(80+r*12,MAX_SPEED_BASE);
    const speed=(baseSpeed+rng()*40)*dir;
    const laneY=LANE_CENTERS[i];
    for(let j=0;j<count;j++){
      const x=rng()*W;
      // item 10: color derives from direction (warm=right, cool=left) plus a small random variance,
      // so direction is reinforced by both arrow AND color, not pure randomness.
      const hue=dir>0?(20+rng()*40):(200+rng()*50);
      traffic.push({x,y:laneY,vx:speed,w:90+Math.floor(rng()*50),h:36,label:TRAFFIC_LABELS[Math.floor(rng()*TRAFFIC_LABELS.length)],col:`hsl(${Math.floor(hue)},55%,38%)`});
    }
  }
  player={x:W/2,y:SAFE_Y,w:PLAYER_W,h:PLAYER_H,moving:false,lastLaneIdx:laneIndexForY(SAFE_Y)};
  game.state='playing';
  game.levelStartTime=game.time;
  game.invulnT=0;
}

function resetGame(){
  game.round=0;game.score=0;game.lives=3;game.shakeT=0;game.streak=0;
  game.hitless=true;game.hitFlashT=0;game.laneFlashT=0;game.paused=false;
  game.particles=[];
  buildLevel(0);
}

// item 9 helper: which lane band a y sits in, used to detect lane-boundary crossings
function laneIndexForY(y){
  return Math.round((SAFE_Y-y)/STEP);
}

const STEP=LANE_H+8;

// item 14: guard tryMove during transition/locked state so rapid input mid-levelchange can't mutate state
function tryMove(dx,dy){
  if(game.state!=='playing')return;
  const nx=clamp(player.x+dx,PLAYER_W/2,W-PLAYER_W/2);
  const ny=clamp(player.y+dy,GOAL_Y,SAFE_Y);
  const prevLane=laneIndexForY(player.y);
  player.x=nx;player.y=ny;
  sndStep();
  const newLane=laneIndexForY(player.y);
  if(newLane!==prevLane){
    // item 9: lane-cleared flash/feedback for incremental progress
    game.laneFlashT=260;
    game.laneFlashY=player.y;
    if(newLane>prevLane){
      game.score+=1; // small reaction/streak bonus per lane advanced (item 6)
      if(game.score>game.best){game.best=game.score;lsSet(LS_BEST,String(game.best));}
    }
  }
  // win check
  if(player.y<=GOAL_Y+10){
    game.state='transition'; // item 14: lock input during the 400ms delay
    const clearMs=game.time-game.levelStartTime;
    let bonus=10;
    if(game.streak>0)bonus+=game.streak*2; // hitless streak bonus (item 6)
    game.score+=bonus;
    game.streak++;
    if(game.score>game.best){game.best=game.score;lsSet(LS_BEST,String(game.best));}
    sndWin2();
    setTimeout(()=>{
      game.round++;
      if(game.round>=TOTAL){
        const totalMs=game.time-levelSeriesStart;
        if(game.hitless&&(game.fastestMs===0||totalMs<game.fastestMs)){
          game.fastestMs=totalMs;
          lsSet(LS_FASTEST,String(Math.round(game.fastestMs)));
        }
        sndWin();
        game.state='won';
      }else{
        buildLevel(game.round);
      }
    },400);
  }
}

let levelSeriesStart=0;

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'||e.key==='p'||e.key==='P'){
    togglePause();
    return;
  }
  if(e.key==='m'||e.key==='M'){toggleMute();return;}
  if(game.state!=='playing')return;
  if(e.key==='ArrowUp'||e.key==='w')tryMove(0,-STEP);
  else if(e.key==='ArrowDown'||e.key==='s')tryMove(0,STEP);
  else if(e.key==='ArrowLeft'||e.key==='a')tryMove(-40,0);
  else if(e.key==='ArrowRight'||e.key==='d')tryMove(40,0);
});

// item 12: dash mechanic — double-tap a direction key within 260ms crosses two lanes/steps at once, with cooldown
let lastKey='',lastKeyT=0;
let dashCooldownUntil=0;
document.addEventListener('keydown',e=>{
  if(game.state!=='playing')return;
  const now=performance.now();
  const dirKeys={ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'};
  const k=dirKeys[e.key];
  if(!k)return;
  if(k===lastKey&&(now-lastKeyT)<260&&now>dashCooldownUntil){
    dashCooldownUntil=now+900;
    if(k==='up')tryMove(0,-STEP);
    else if(k==='down')tryMove(0,STEP);
    else if(k==='left')tryMove(-80,0);
    else if(k==='right')tryMove(80,0);
    lastKey='';lastKeyT=0;
  }else{
    lastKey=k;lastKeyT=now;
  }
});

// item 1: touch coordinates are used purely for directional sign (dx/dy relative delta), not absolute
// canvas-space position, so CSS scaling (960x540 canvas stretched to 100vw/100vh) does not
// introduce a mismatch — only the sign of dx/dy determines direction, magnitude is just a threshold
// compared against itself in screen pixels, which is scale-invariant for this swipe-direction purpose.
let tx0=0,ty0=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(game.state!=='playing')return;
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return; // ignore tap-jitter
  if(Math.abs(dx)>Math.abs(dy)){tryMove(dx>0?40:-40,0);}
  else{tryMove(0,dy>0?STEP:-STEP);}
},{passive:false});

function spawnParticles(x,y){
  for(let i=0;i<14;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=60+Math.random()*160;
    game.particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:400+Math.random()*200,maxLife:600,r:2+Math.random()*3});
  }
}

function update(dt){
  dt=clamp(dt,0,48);
  const s=dt/1000;
  game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.hitFlashT>0)game.hitFlashT=Math.max(0,game.hitFlashT-dt);
  if(game.laneFlashT>0)game.laneFlashT=Math.max(0,game.laneFlashT-dt);
  if(game.invulnT>0)game.invulnT=Math.max(0,game.invulnT-dt);
  // particles update regardless of pause-lite behaviors but not during hard pause
  if(game.state==='paused')return;
  for(let i=game.particles.length-1;i>=0;i--){
    const p=game.particles[i];
    p.life-=dt;
    if(p.life<=0){game.particles.splice(i,1);continue;}
    p.x+=p.vx*s;p.y+=p.vy*s;p.vy+=300*s;
  }
  if(game.state!=='playing')return;
  for(const t of traffic){
    t.x+=t.vx*s;
    if(t.x>W+t.w/2)t.x=-t.w/2;
    if(t.x<-t.w/2)t.x=W+t.w/2;
  }
  // collision
  if(game.invulnT<=0){
    for(const t of traffic){
      if(Math.abs(player.x-t.x)<(PLAYER_W+t.w)/2-6&&Math.abs(player.y-t.y)<(PLAYER_H+t.h)/2-6){
        game.lives--;
        game.shakeT=300;
        game.hitFlashT=380;
        game.hitless=false;
        // item 2: hit breaks streak / costs score, not just a life
        game.streak=0;
        game.score=Math.max(0,game.score-5);
        spawnParticles(player.x,player.y);
        sndHit();
        player.x=W/2;player.y=SAFE_Y;
        // item 11: coyote-time-equivalent grace/invulnerability window after respawn
        game.invulnT=550;
        if(game.lives<=0){
          game.lives=0;
          if(game.score>game.best){game.best=game.score;lsSet(LS_BEST,String(game.best));}
          sndLose();
          setTimeout(()=>{game.state='gameover';},400);
        }
        break;
      }
    }
  }
}

function togglePause(){
  if(game.state==='playing'){game.state='paused';btnPause.textContent='▶';}
  else if(game.state==='paused'){game.state='playing';btnPause.textContent='⏸';}
}
function toggleMute(){
  game.muted=!game.muted;
  lsSet(LS_MUTE,game.muted?'1':'0');
  btnMute.textContent=game.muted?'🔇':'🔊';
}

// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(game.muted)return; // item 15: mute gates all tone() calls
  const a=AC();if(!a)return;
  try{
    if(a.state==='suspended')a.resume();
    const o=a.createOscillator(),g=a.createGain();
    o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,a.currentTime);
    g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));
    o.connect(g);g.connect(a.destination);
    o.start();o.stop(a.currentTime+(d||0.15)+0.02);
  }catch(e){}
}
const sndStep=()=>tone(400,0.05,'sine',0.03);
const sndHit=()=>tone(200,0.2,'sawtooth',0.05);
const sndLose=()=>tone(150,0.4,'sawtooth',0.06);
const sndWin2=()=>{[528,660,792].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.06),i*60));};
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};

function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawBg(){
  ctx.fillStyle=lgrad(0,0,0,H,[[0,'#02030a'],[1,'#010208']]);ctx.fillRect(0,0,W,H);
  // start zone
  ctx.fillStyle='rgba(40,80,40,.3)';ctx.fillRect(0,SAFE_Y-20,W,60);
  // goal zone
  ctx.fillStyle='rgba(60,180,100,.2)';ctx.fillRect(0,0,W,GOAL_Y+20);
  ctx.fillStyle='rgba(80,220,140,.5)';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('YOUR SIDE — REACH HERE',W/2,GOAL_Y/2+4);
  // lane lines
  for(let i=0;i<LANES+1;i++){
    const ly=H-120-i*(LANE_H+8)+LANE_H/2;
    ctx.strokeStyle='rgba(60,80,120,.15)';ctx.lineWidth=1;ctx.setLineDash([20,12]);
    ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawTraffic(){
  for(const t of traffic){
    ctx.fillStyle=t.col+'cc';
    rr(t.x-t.w/2,t.y-t.h/2,t.w,t.h,6);ctx.fill();
    ctx.strokeStyle='rgba(200,200,220,.2)';ctx.lineWidth=1;
    rr(t.x-t.w/2,t.y-t.h/2,t.w,t.h,6);ctx.stroke();
    ctx.fillStyle='rgba(234,242,246,.7)';ctx.font='bold 8px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.label,t.x,t.y);
    // direction arrow
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='10px Arial';
    ctx.fillText(t.vx>0?'▶':'◀',t.x+(t.vx>0?t.w/2-8:-t.w/2+8),t.y);
  }
}

function drawParticles(){
  for(const p of game.particles){
    const a=clamp(p.life/p.maxLife,0,1);
    ctx.fillStyle=`rgba(255,120,90,${a})`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
}

function drawPlayer(){
  if(!player)return;
  const sx=game.shakeT>0?(Math.random()-.5)*6:0;
  const bob=Math.sin(game.time/300)*2;
  const blink=game.invulnT>0&&Math.floor(game.time/80)%2===0;
  if(blink)ctx.globalAlpha=0.35;
  ctx.shadowColor='rgba(100,180,255,.4)';ctx.shadowBlur=10;
  ctx.fillStyle='rgba(100,180,255,.85)';
  rr(player.x-PLAYER_W/2+sx,player.y-PLAYER_H/2+bob,PLAYER_W,PLAYER_H,6);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(200,230,255,.9)';ctx.font='bold 18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🧭',player.x+sx,player.y+bob);
  ctx.globalAlpha=1;
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(1,2,5,.88)';rr(0,0,W,46,0);ctx.fill();
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillStyle='#80c0ff';ctx.font='bold 13px Arial';
  ctx.fillText('Border Cross — Level '+(game.round+1)+' / '+TOTAL,18,8);
  ctx.font='11px Arial';
  // item 8: low-life warning — pulsing red hearts when lives===1
  const pulse=game.lives===1?(0.5+0.5*Math.sin(game.time/140)):1;
  ctx.fillStyle=game.lives===1?`rgba(255,${Math.floor(80+80*pulse)},${Math.floor(80+80*pulse)},.9)`:'rgba(234,242,246,.5)';
  ctx.fillText('Arrow keys / WASD / swipe · double-tap dash  Lives: '+('♥').repeat(game.lives)+('♡').repeat(3-game.lives),18,28);
  ctx.textAlign='right';
  ctx.fillStyle='rgba(234,242,246,.5)';
  ctx.fillText('Score '+game.score+'  Best '+game.best+(game.streak>1?'  Streak x'+game.streak:''),W-18,8);
  ctx.restore();
}

function drawLaneFlash(){
  if(game.laneFlashT<=0)return;
  const a=clamp(game.laneFlashT/260,0,1);
  ctx.save();
  ctx.globalAlpha=a*0.6;
  ctx.fillStyle='rgba(100,220,255,.5)';
  ctx.fillRect(0,game.laneFlashY-2,W,4);
  ctx.globalAlpha=a;
  ctx.fillStyle='rgba(160,230,255,.95)';
  ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('+1',player?player.x:W/2,game.laneFlashY-16);
  ctx.restore();
}

function drawHitFlash(){
  if(game.hitFlashT<=0)return;
  const a=clamp(game.hitFlashT/380,0,1)*0.45;
  ctx.save();
  ctx.fillStyle=`rgba(255,40,40,${a})`;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function vignette(){
  const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function panelDraw(title,lines){
  ctx.save();
  ctx.fillStyle='rgba(1,2,5,.78)';ctx.fillRect(0,0,W,H);
  const pw=520,ph=340,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(4,6,14,.97)'],[1,'rgba(3,4,10,.97)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(80,160,255,.22)';ctx.lineWidth=1.5;
  rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#80c0ff';ctx.font='bold 34px Arial';
  ctx.fillText(title,W/2,py+62);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+100;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}

function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,W,H);
    ctx.save();
    drawBg();
    if(game.state!=='title'){
      drawTraffic();
      drawParticles();
      drawPlayer();
      drawLaneFlash();
    }
    drawHitFlash();
    vignette();
    if(game.state==='playing'||game.state==='paused')drawHUD();
    if(game.state==='title')panelDraw('Border Cross',['Dodge the social-pressure traffic.','Reach YOUR SIDE at the top.','Arrow keys / WASD or swipe to move.','Double-tap a direction to dash two steps.','3 lives — 10 levels.','','Cross over to the life you actually want.','','Click / tap or press any key to begin.']);
    else if(game.state==='paused')panelDraw('Paused',['Score: '+game.score+'  Best: '+game.best,'','Press P or Esc to resume.','Tap the ▶ button to resume.']);
    else if(game.state==='won'){
      const perfect=game.lives===3&&game.hitless;
      const lines=['Score: '+game.score+' / '+(TOTAL*10+ (TOTAL*2)),'Best: '+game.best];
      if(game.fastestMs>0)lines.push('Fastest hitless run: '+(game.fastestMs/1000).toFixed(1)+'s');
      lines.push('');
      if(perfect)lines.push('★ PERFECT CROSSING — no hits taken! ★');
      else lines.push('All ten crossings made.');
      lines.push('');
      lines.push('Click / tap to play again.');
      panelDraw('Other Side Reached! ✓',lines);
    }
    else if(game.state==='gameover')panelDraw('Turned Back',['Score: '+game.score+'  Best: '+game.best,'','The traffic won this time. Try again.','','Click / tap to retry.']);
    ctx.restore();
  }catch(e){}
}

function onDown(e){
  e.preventDefault();
  const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'||game.state==='won'||game.state==='gameover'){
    levelSeriesStart=game.time;
    resetGame();
  }
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(game.state==='title'||game.state==='won'||game.state==='gameover'){
    levelSeriesStart=game.time;
    resetGame();
  }
},{passive:false});

// on-screen controls (item 3, 4, 15)
const btnPause=document.getElementById('btnPause');
const btnMute=document.getElementById('btnMute');
btnMute.textContent=game.muted?'🔇':'🔊';
btnPause.addEventListener('click',e=>{e.stopPropagation();togglePause();});
btnPause.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();togglePause();},{passive:false});
btnMute.addEventListener('click',e=>{e.stopPropagation();toggleMute();});
btnMute.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();toggleMute();},{passive:false});

let last=0;
function loop(ts){
  if(!last)last=ts;
  const dt=ts-last;last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
game.state='title';draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},
  get player(){return player;},
  get traffic(){return traffic;},
  resetGame,buildLevel,tryMove,update,draw,
  togglePause,toggleMute,
  LANES,LANE_H,LANE_CENTERS,TOTAL
};
</script>
