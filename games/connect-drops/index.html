<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Connect Drops</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:#060410;font-family:Arial,Helvetica,sans-serif;}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#stage{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;width:100%;height:100%;max-width:calc(100vh * 16 / 9);max-height:calc(100vw * 9 / 16);aspect-ratio:16/9;}
#hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
#ctrls{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:5;}
#ctrls button{touch-action:manipulation;width:40px;height:40px;border-radius:10px;border:1.5px solid rgba(160,120,255,.35);background:rgba(10,7,22,.85);color:#eaf2f6;font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#ctrls button:active{background:rgba(160,120,255,.3);}
#diffwrap{position:fixed;top:10px;left:10px;display:flex;gap:6px;z-index:5;}
#diffwrap button{touch-action:manipulation;padding:8px 10px;border-radius:10px;border:1.5px solid rgba(160,120,255,.35);background:rgba(10,7,22,.85);color:rgba(234,242,246,.65);font-size:11px;cursor:pointer;font-weight:bold;}
#diffwrap button.active{background:rgba(160,120,255,.35);color:#fff;border-color:#c090ff;}
</style>
</head>
<body>
<div id="wrap"><div id="stage"><canvas id="game" width="960" height="540"></canvas></div></div>
<div id="ctrls">
<button id="btnMute" title="Mute">🔊</button>
<button id="btnPause" title="Pause">⏸</button>
<button id="btnHint" title="Hint">💡</button>
<button id="btnUndo" title="Undo last drop">↶</button>
</div>
<div id="diffwrap">
<button id="diffEasy" data-d="easy">Easy</button>
<button id="diffNorm" data-d="normal">Normal</button>
<button id="diffHard" data-d="hard">Hard</button>
</div>
<div id="hint">Click/tap a column to drop &middot; connect 4 same-colour discs &middot; P pause &middot; M mute &middot; H hint &middot; U undo</div>
<script>
'use strict';
// Connect Drops (#36) — Connect Four
// Drop discs to connect 4 in a row (H, V, or diagonal).
// Play vs a simple AI. Theme: building connections on your own terms.
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=960,H=540;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const GCOLS=7,GROWS=6,CELL=64,R=26;
const GX=(W-GCOLS*CELL)/2,GY=H-GROWS*CELL-40;
const PLAYER=1,AI=2;
const COL1='#ffd560',COL2='#f07070';

// ---- persistence ----
const LS_KEY='connectDropsProgress_v1';
function loadProgress(){
  let d={wins:0,losses:0,draws:0,streak:0,bestStreak:0,difficulty:'normal',muted:false};
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){const p=JSON.parse(raw);d=Object.assign(d,p);}
  }catch(e){}
  return d;
}
function saveProgress(){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({
      wins:game.wins,losses:game.losses,draws:game.draws,
      streak:game.streak,bestStreak:game.bestStreak,
      difficulty:game.difficulty,muted:game.muted
    }));
  }catch(e){}
}
const saved=loadProgress();

const game={
  state:'title',time:0,
  wins:saved.wins||0,losses:saved.losses||0,draws:saved.draws||0,
  streak:saved.streak||0,bestStreak:saved.bestStreak||0,
  turn:PLAYER,shakeT:0,shakeMag:0,
  muted:!!saved.muted,
  difficulty:saved.difficulty||'normal',
  hintCol:-1,hintUsedThisTurn:false,
  undoAvailable:false,undoUsedThisRound:false,
  particles:[],popups:[],
  winCells:null,threatCols:[]
};
let grid,animCol,animY,animTarget,animPiece,dropQueue;
let lastMoveSnapshot=null; // {grid, turn} for undo
// The AI reply is a pending timer, so it must be cancellable: undo/reset can revoke the AI's
// turn after it was armed, and a stale fire would move for a player who never played.
let aiTimer=null;
function cancelAiTimer(){if(aiTimer!==null){clearTimeout(aiTimer);aiTimer=null;}}
// Arm the AI reply. Re-checks the turn on fire (it can change while pending) and is a no-op if
// one is already armed or a disc is mid-drop, so resume/reset may call it unconditionally.
function armAiReply(){
  if(game.state!=='playing'||game.turn!==AI||animCol!==null||aiTimer!==null)return;
  aiTimer=setTimeout(()=>{aiTimer=null;if(game.state==='playing'&&game.turn===AI)aiMove();},300);
}

const DIFF_DEPTH={easy:2,normal:3,hard:4};
function aiDepth(){
  let d=DIFF_DEPTH[game.difficulty]||3;
  // scale a bit harder after win streaks, capped
  if(game.streak>=3)d=Math.min(d+1,5);
  return d;
}

function makeGrid(){return Array.from({length:GROWS},()=>Array(GCOLS).fill(0));}
function resetGame(){
  cancelAiTimer();
  grid=makeGrid();game.turn=PLAYER;animCol=null;animPiece=null;dropQueue=null;
  game.state='playing';game.hintCol=-1;game.hintUsedThisTurn=false;
  game.undoAvailable=false;game.undoUsedThisRound=false;lastMoveSnapshot=null;
  game.particles=[];game.popups=[];game.winCells=null;game.threatCols=[];
}
function topRow(c){for(let r=GROWS-1;r>=0;r--)if(grid[r][c]===0)return r;return-1;}
function dropPiece(c,player){const r=topRow(c);if(r<0)return false;grid[r][c]=player;return true;}
function checkWin(p){// horiz
for(let r=0;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)if(grid[r][c]===p&&grid[r][c+1]===p&&grid[r][c+2]===p&&grid[r][c+3]===p)return true;// vert
for(let c=0;c<GCOLS;c++)for(let r=0;r<=GROWS-4;r++)if(grid[r][c]===p&&grid[r+1][c]===p&&grid[r+2][c]===p&&grid[r+3][c]===p)return true;// diag
for(let r=0;r<=GROWS-4;r++)for(let c=0;c<=GCOLS-4;c++)if(grid[r][c]===p&&grid[r+1][c+1]===p&&grid[r+2][c+2]===p&&grid[r+3][c+3]===p)return true;for(let r=3;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)if(grid[r][c]===p&&grid[r-1][c+1]===p&&grid[r-2][c+2]===p&&grid[r-3][c+3]===p)return true;return false;}
function findWinCells(p){
  for(let r=0;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)if(grid[r][c]===p&&grid[r][c+1]===p&&grid[r][c+2]===p&&grid[r][c+3]===p)return[[r,c],[r,c+1],[r,c+2],[r,c+3]];
  for(let c=0;c<GCOLS;c++)for(let r=0;r<=GROWS-4;r++)if(grid[r][c]===p&&grid[r+1][c]===p&&grid[r+2][c]===p&&grid[r+3][c]===p)return[[r,c],[r+1,c],[r+2,c],[r+3,c]];
  for(let r=0;r<=GROWS-4;r++)for(let c=0;c<=GCOLS-4;c++)if(grid[r][c]===p&&grid[r+1][c+1]===p&&grid[r+2][c+2]===p&&grid[r+3][c+3]===p)return[[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]];
  for(let r=3;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)if(grid[r][c]===p&&grid[r-1][c+1]===p&&grid[r-2][c+2]===p&&grid[r-3][c+3]===p)return[[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]];
  return null;
}
function isDraw(){return grid[0].every(c=>c!==0);}
function scoreWindow(w,p){const o=p===PLAYER?AI:PLAYER;let s=0;const pc=w.filter(x=>x===p).length,oc=w.filter(x=>x===o).length,ec=w.filter(x=>x===0).length;if(pc===4)s+=1000;else if(pc===3&&ec===1)s+=5;else if(pc===2&&ec===2)s+=2;if(oc===3&&ec===1)s-=4;return s;}
function aiScore(g2,p){let sc=0;for(let r=0;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)sc+=scoreWindow([g2[r][c],g2[r][c+1],g2[r][c+2],g2[r][c+3]],p);for(let c=0;c<GCOLS;c++)for(let r=0;r<=GROWS-4;r++)sc+=scoreWindow([g2[r][c],g2[r+1][c],g2[r+2][c],g2[r+3][c]],p);for(let r=0;r<=GROWS-4;r++)for(let c=0;c<=GCOLS-4;c++)sc+=scoreWindow([g2[r][c],g2[r+1][c+1],g2[r+2][c+2],g2[r+3][c+3]],p);for(let r=3;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)sc+=scoreWindow([g2[r][c],g2[r-1][c+1],g2[r-2][c+2],g2[r-3][c+3]],p);return sc;}
function minimax(g2,depth,alpha,beta,maximising){if(checkWinG(g2,AI))return 1000+depth;if(checkWinG(g2,PLAYER))return -1000-depth;const valid=[];for(let c=0;c<GCOLS;c++){let r=GROWS-1;while(r>=0&&g2[r][c]!==0)r--;if(r>=0)valid.push([r,c]);}if(!valid.length||depth===0)return aiScore(g2,AI)-aiScore(g2,PLAYER);if(maximising){let best=-Infinity;for(const[r,c]of valid){g2[r][c]=AI;const sc=minimax(g2,depth-1,alpha,beta,false);g2[r][c]=0;best=Math.max(best,sc);alpha=Math.max(alpha,sc);if(beta<=alpha)break;}return best;}else{let best=Infinity;for(const[r,c]of valid){g2[r][c]=PLAYER;const sc=minimax(g2,depth-1,alpha,beta,true);g2[r][c]=0;best=Math.min(best,sc);beta=Math.min(beta,sc);if(beta<=alpha)break;}return best;}}
function checkWinG(g2,p){for(let r=0;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)if(g2[r][c]===p&&g2[r][c+1]===p&&g2[r][c+2]===p&&g2[r][c+3]===p)return true;for(let c=0;c<GCOLS;c++)for(let r=0;r<=GROWS-4;r++)if(g2[r][c]===p&&g2[r+1][c]===p&&g2[r+2][c]===p&&g2[r+3][c]===p)return true;for(let r=0;r<=GROWS-4;r++)for(let c=0;c<=GCOLS-4;c++)if(g2[r][c]===p&&g2[r+1][c+1]===p&&g2[r+2][c+2]===p&&g2[r+3][c+3]===p)return true;for(let r=3;r<GROWS;r++)for(let c=0;c<=GCOLS-4;c++)if(g2[r][c]===p&&g2[r-1][c+1]===p&&g2[r-2][c+2]===p&&g2[r-3][c+3]===p)return true;return false;}
function bestMoveFor(player,depth){
  const valid=[];for(let c=0;c<GCOLS;c++){let r=GROWS-1;while(r>=0&&grid[r][c]!==0)r--;if(r>=0)valid.push(c);}
  if(!valid.length)return -1;
  let best=-Infinity,bestC=valid[0];
  const maximisingFirst=player===AI;
  for(const c of valid){
    const r=topRow(c);grid[r][c]=player;
    const sc=minimax(grid.map(r2=>[...r2]),Math.max(1,depth-1),-Infinity,Infinity,!maximisingFirst);
    grid[r][c]=0;
    const val=maximisingFirst?sc:-sc;
    if(val>best){best=val;bestC=c;}
  }
  return bestC;
}
function threatColumns(){
  // columns where AI could win next drop — used for a subtle warning highlight
  const cols=[];
  for(let c=0;c<GCOLS;c++){
    const r=topRow(c);if(r<0)continue;
    grid[r][c]=AI;
    if(checkWinG(grid,AI))cols.push(c);
    grid[r][c]=0;
  }
  return cols;
}
function aiMove(){
  const depth=Math.max(1,aiDepth());
  const bestC=bestMoveFor(AI,depth);
  if(bestC<0)return;
  startDrop(bestC,AI);
}
function startDrop(c,player){
  const r=topRow(c);if(r<0)return;
  if(player===PLAYER){lastMoveSnapshot={grid:grid.map(row=>[...row]),turn:game.turn};game.undoAvailable=!game.undoUsedThisRound;}
  animCol=c;animPiece=player;animY=GY-CELL;animTarget=GY+r*CELL;dropQueue={c,r,player};sndDrop();
  game.hintCol=-1;
}
function triggerShake(mag){game.shakeT=Math.max(game.shakeT,220);game.shakeMag=Math.max(game.shakeMag||0,mag);}
function spawnBurst(x,y,col){
  for(let i=0;i<22;i++){
    const a=Math.random()*Math.PI*2,sp=1.2+Math.random()*3.2;
    game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:600+Math.random()*400,age:0,col,size:2+Math.random()*3});
  }
}
function spawnPopup(text,x,y,col){game.popups.push({text,x,y,age:0,life:1100,col});}
function undoLastDrop(){
  if(!game.undoAvailable||game.undoUsedThisRound||!lastMoveSnapshot||animCol!==null||game.state!=='playing')return;
  cancelAiTimer();
  grid=lastMoveSnapshot.grid.map(row=>[...row]);
  game.turn=lastMoveSnapshot.turn;
  game.undoUsedThisRound=true;game.undoAvailable=false;lastMoveSnapshot=null;
  game.hintCol=-1;
}
function useHint(){
  if(game.state!=='playing'||game.turn!==PLAYER||animCol!==null||game.hintUsedThisTurn)return;
  const c=bestMoveFor(PLAYER,Math.max(2,aiDepth()));
  if(c>=0){game.hintCol=c;game.hintUsedThisTurn=true;}
}
function update(dt){
  dt=clamp(dt,0,48);game.time+=dt;
  if(game.shakeT>0)game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.shakeT<=0)game.shakeMag=0;
  // particles/popups animate regardless of pause? keep them tied to playing/won for consistency
  for(let i=game.particles.length-1;i>=0;i--){
    const p=game.particles[i];p.age+=dt;
    if(p.age>=p.life){game.particles.splice(i,1);continue;}
    p.x+=p.vx*(dt/16.67);p.y+=p.vy*(dt/16.67);p.vy+=0.06*(dt/16.67);
  }
  for(let i=game.popups.length-1;i>=0;i--){
    const p=game.popups[i];p.age+=dt;
    if(p.age>=p.life){game.popups.splice(i,1);continue;}
    p.y-=0.02*dt;
  }
  if(game.state!=='playing')return;
  if(animCol!==null){
    animY=Math.min(animY+12,animTarget);
    if(animY>=animTarget){
      const{c,r,player}=dropQueue;
      grid[r][c]=player;animCol=null;animPiece=null;
      const cx=GX+c*CELL+CELL/2,cy=GY+r*CELL+CELL/2;
      if(checkWin(player)){
        game.winCells=findWinCells(player);
        if(player===PLAYER){
          game.wins++;game.streak++;game.bestStreak=Math.max(game.bestStreak,game.streak);
          spawnBurst(cx,cy,COL1);spawnPopup('You Win!',W/2,H/2-40,COL1);
        }else{
          game.losses++;game.streak=0;
          spawnBurst(cx,cy,COL2);
        }
        triggerShake(player===PLAYER?6:8);
        sndWin();game.state='won';game.lastWinner=player;
        saveProgress();
        return;
      }
      if(isDraw()){game.draws++;game.streak=0;game.state='won';game.lastWinner=0;saveProgress();return;}
      game.turn=player===PLAYER?AI:PLAYER; // whoever's disc just landed, not whoever game.turn says
      game.hintCol=-1;game.hintUsedThisTurn=false;
      game.threatCols=game.turn===PLAYER?threatColumns():[];
      armAiReply();
    }
  }
}
function clickCol(mx){
  if(game.state!=='playing')return;
  const c=Math.floor((mx-GX)/CELL);
  if(c<0||c>=GCOLS||animCol!==null||game.turn!==PLAYER)return;
  if(topRow(c)<0)return;
  startDrop(c,PLAYER);
}
// audio
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(f,d,t,v){
  if(game.muted)return;
  const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(v||0.06,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.15));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(d||0.15)+0.02);}catch(e){}
}
const sndDrop=()=>tone(300,0.1,'sine',0.05);
const sndWin=()=>{[528,660,792,1056].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.07),i*80));};
const sndClick=()=>tone(440,0.06,'square',0.03);
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r2){r2=Math.min(r2,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r2,y);ctx.arcTo(x+w,y,x+w,y+h,r2);ctx.arcTo(x+w,y+h,x,y+h,r2);ctx.arcTo(x,y+h,x,y,r2);ctx.arcTo(x,y,x+w,y,r2);ctx.closePath();}
function drawBg(){ctx.fillStyle=lgrad(0,0,0,H,[[0,'#060410'],[1,'#030208']]);ctx.fillRect(0,0,W,H);}
function drawSymbol(x,y,player){
  // colorblind-friendly shape/icon stamped on each disc
  ctx.save();ctx.translate(x,y);
  ctx.strokeStyle='rgba(10,6,20,.55)';ctx.lineWidth=2.5;ctx.lineCap='round';
  if(player===PLAYER){
    // plus/cross shape
    ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.moveTo(0,-8);ctx.lineTo(0,8);ctx.stroke();
  }else{
    // ring shape
    ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}
function drawGrid2(mx,touchHoverCol){
ctx.fillStyle='rgba(14,10,30,.9)';rr(GX-8,GY-8,GCOLS*CELL+16,GROWS*CELL+16,10);ctx.fill();
// threat warning highlight (AI 3-in-a-row danger columns)
if(game.state==='playing'&&game.turn===PLAYER&&game.threatCols&&game.threatCols.length){
  for(const tc of game.threatCols){ctx.fillStyle='rgba(240,112,112,.10)';rr(GX+tc*CELL,GY,CELL,GROWS*CELL,0);ctx.fill();}
}
// hover column (mouse or touch-drag preview)
const hc=touchHoverCol!==null&&touchHoverCol!==undefined?touchHoverCol:(mx>=0?Math.floor((mx-GX)/CELL):-1);
if(game.state==='playing'&&game.turn===PLAYER&&hc>=0&&hc<GCOLS){
  ctx.fillStyle='rgba(255,213,96,.09)';rr(GX+hc*CELL,GY,CELL,GROWS*CELL,0);ctx.fill();
  // preview ghost disc at top of column
  const r=topRow(hc);
  if(r>=0&&animCol===null){
    ctx.globalAlpha=.35;ctx.fillStyle=COL1;ctx.beginPath();ctx.arc(GX+hc*CELL+CELL/2,GY-CELL/2+CELL/2,R,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
}
// hint highlight
if(game.hintCol>=0){ctx.fillStyle='rgba(160,255,180,.14)';rr(GX+game.hintCol*CELL,GY,CELL,GROWS*CELL,0);ctx.fill();}
// cells
for(let r=0;r<GROWS;r++)for(let c=0;c<GCOLS;c++){
  const x=GX+c*CELL,y=GY+r*CELL;const v=grid[r][c];
  const isWinCell=game.winCells&&game.winCells.some(wc=>wc[0]===r&&wc[1]===c);
  ctx.fillStyle=v===0?'rgba(6,4,16,.8)':v===PLAYER?COL1:COL2;
  if(isWinCell){ctx.shadowColor=v===PLAYER?COL1:COL2;ctx.shadowBlur=22;}
  ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  if(v!==0){
    ctx.strokeStyle=isWinCell?'rgba(255,255,255,.9)':'rgba(255,255,255,.15)';
    ctx.lineWidth=isWinCell?2.5:1.5;
    ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,R,0,Math.PI*2);ctx.stroke();
    drawSymbol(x+CELL/2,y+CELL/2,v);
  }else{
    ctx.strokeStyle='rgba(60,40,100,.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,R,0,Math.PI*2);ctx.stroke();
  }
}
// animating disc
if(animCol!==null){const col=animPiece===PLAYER?COL1:COL2;ctx.shadowColor=col;ctx.shadowBlur=16;ctx.fillStyle=col;ctx.beginPath();ctx.arc(GX+animCol*CELL+CELL/2,animY+CELL/2,R,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;drawSymbol(GX+animCol*CELL+CELL/2,animY+CELL/2,animPiece);}
}
function drawParticles(){
  for(const p of game.particles){
    const t=1-p.age/p.life;if(t<=0)continue;
    ctx.globalAlpha=Math.max(0,t);ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawPopups(){
  for(const p of game.popups){
    const t=1-p.age/p.life;if(t<=0)continue;
    ctx.save();ctx.globalAlpha=Math.max(0,t);ctx.fillStyle=p.col;ctx.font='bold 26px Arial';ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);ctx.restore();
  }
}
function drawHUD(mx){ctx.save();ctx.fillStyle='rgba(3,2,8,.88)';rr(0,0,W,46,0);ctx.fill();ctx.textBaseline='top';ctx.textAlign='left';ctx.fillStyle='#c090ff';ctx.font='bold 13px Arial';ctx.fillText('Connect Drops',18,8);ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('You: yellow +  vs  AI: red o',18,28);ctx.textAlign='center';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText(game.turn===PLAYER?'Your turn':'AI thinking…',W/2,8);ctx.fillStyle='#ffd580';ctx.font='bold 16px Arial';ctx.fillText('W:'+game.wins+' L:'+game.losses+' D:'+game.draws+'  Streak:'+game.streak+' (Best:'+game.bestStreak+')',W/2,24);ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';ctx.fillText('Difficulty: '+game.difficulty,W-18,8);ctx.fillText(game.muted?'Muted':'Sound on',W-18,24);ctx.restore();}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.38,W/2,H/2,H*0.85);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.42)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function panelDraw(title,lines){ctx.save();ctx.fillStyle='rgba(3,2,8,.78)';ctx.fillRect(0,0,W,H);const pw=560,ph=320,px=(W-pw)/2,py=(H-ph)/2;ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(12,8,26,.97)'],[1,'rgba(7,5,16,.97)']]);rr(px,py,pw,ph,22);ctx.fill();ctx.strokeStyle='rgba(160,120,255,.22)';ctx.lineWidth=1.5;rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillStyle='#c090ff';ctx.font='bold 34px Arial';ctx.fillText(title,W/2,py+62);ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';let ly=py+98;for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}ctx.restore();}
function drawPauseOverlay(){
  panelDraw('Paused',['Game paused.','','Tap Resume, press P, or click/tap the board to continue.']);
}
let mx2=W/2;
let touchHoverCol=null;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mx2=(e.clientX-r.left)*W/r.width;});
function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);ctx.save();
    let sx=0,sy=0;
    if(game.shakeT>0){
      const mag=game.shakeMag||0;
      sx=(Math.random()-0.5)*mag*(game.shakeT/220);
      sy=(Math.random()-0.5)*mag*(game.shakeT/220);
      ctx.translate(sx,sy);
    }
    drawBg();
    if(game.state!=='title'){drawGrid2(mx2,touchHoverCol);}
    drawParticles();
    vignette();
    if(game.state==='playing')drawHUD(mx2);
    if(game.state==='playing')drawPopups();
    if(game.state==='title')panelDraw('Connect Drops',['Drop discs to connect 4 in a row.','Horizontal, vertical, or diagonal.','Play vs AI. Pick a difficulty top-left.','','Build connections on your own terms.','','Click / tap to begin.']);
    else if(game.state==='won'){
      const lw=game.lastWinner;
      drawPopups();
      panelDraw(lw===PLAYER?'You Connected!':lw===AI?'AI Wins':'Draw!',['W: '+game.wins+'  L: '+game.losses+'  D: '+game.draws,'Streak: '+game.streak+'   Best streak: '+game.bestStreak,'','Click / tap to play again.']);
    }
    else if(game.state==='paused'){drawHUD(mx2);drawPauseOverlay();}
    ctx.restore();
  }catch(e){}
}
function pointerXY(clientX,clientY){
  const r=canvas.getBoundingClientRect();
  return {x:(clientX-r.left)*W/r.width,y:(clientY-r.top)*H/r.height};
}
canvas.addEventListener('mousedown',e=>{
  e.preventDefault();const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  if(game.state==='title'){resetGame();return;}
  if(game.state==='won'){resetGame();return;}
  if(game.state==='paused'){resumePlay();return;}
  const r2=canvas.getBoundingClientRect();const px2=(e.clientX-r2.left)*W/r2.width;clickCol(px2);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();const a2=AC();if(a2&&a2.state==='suspended')try{a2.resume();}catch(ex){}
  const t=e.touches[0];const p=pointerXY(t.clientX,t.clientY);
  if(game.state==='title'){resetGame();return;}
  if(game.state==='won'){resetGame();return;}
  if(game.state==='paused'){resumePlay();return;}
  touchHoverCol=clamp(Math.floor((p.x-GX)/CELL),0,GCOLS-1);
  clickCol(p.x);
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(game.state!=='playing')return;
  const t=e.touches[0];const p=pointerXY(t.clientX,t.clientY);
  const c=Math.floor((p.x-GX)/CELL);
  touchHoverCol=c>=0&&c<GCOLS?c:null;
},{passive:false});
canvas.addEventListener('touchend',e=>{touchHoverCol=null;},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='KeyP'){e.preventDefault();togglePause();}
  else if(e.code==='KeyM'){e.preventDefault();toggleMute();}
  else if(e.code==='KeyH'){e.preventDefault();useHint();}
  else if(e.code==='KeyU'){e.preventDefault();undoLastDrop();}
});
function togglePause(){
  if(game.state==='playing')game.state='paused';
  else if(game.state==='paused')resumePlay();
}
// Every resume path must go through this: a pending AI reply that fires while paused is
// swallowed by its own state guard, so without re-arming the turn would stay stuck on AI.
function resumePlay(){game.state='playing';armAiReply();}
function toggleMute(){game.muted=!game.muted;saveProgress();updateCtrlUI();}
function updateCtrlUI(){
  const bm=document.getElementById('btnMute');if(bm)bm.textContent=game.muted?'🔇':'🔊';
  const bp=document.getElementById('btnPause');if(bp)bp.textContent=game.state==='paused'?'▶':'⏸';
  document.querySelectorAll('#diffwrap button').forEach(b=>{b.classList.toggle('active',b.dataset.d===game.difficulty);});
}
document.getElementById('btnMute').addEventListener('click',e=>{e.preventDefault();toggleMute();});
document.getElementById('btnPause').addEventListener('click',e=>{e.preventDefault();togglePause();updateCtrlUI();});
document.getElementById('btnHint').addEventListener('click',e=>{e.preventDefault();useHint();});
document.getElementById('btnUndo').addEventListener('click',e=>{e.preventDefault();undoLastDrop();});
document.querySelectorAll('#diffwrap button').forEach(b=>{
  b.addEventListener('click',e=>{e.preventDefault();game.difficulty=b.dataset.d;saveProgress();updateCtrlUI();});
});
updateCtrlUI();
let last=0;function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;update(dt);draw();updateCtrlUI();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);
window.__cfq={get game(){return game;},get grid(){return grid;},resetGame,dropPiece,checkWin,aiMove,clickCol,update,draw,GCOLS,GROWS,PLAYER,AI,undoLastDrop,useHint,togglePause,toggleMute,saveProgress,loadProgress};
</script>
</body>
</html>
