<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Boundary Tower</title>
<style>
  *{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;height:100%;overflow:hidden;background:#08100e;font-family:Arial,Helvetica,sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{width:100vw;height:100vh;display:block;}
  #hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:rgba(234,242,246,.4);pointer-events:none;text-align:center;}
  #ctrl{position:fixed;top:8px;right:8px;display:flex;gap:6px;z-index:5;}
  #ctrl button{width:38px;height:38px;border-radius:10px;border:1.5px solid rgba(64,200,144,.4);
    background:rgba(4,12,8,.85);color:#eaf2f6;font-size:16px;line-height:1;display:flex;align-items:center;
    justify-content:center;padding:0;touch-action:manipulation;}
  #ctrl button:active{background:rgba(64,200,144,.3);}
  #ctrl button[data-active="1"]{border-color:#40d090;color:#40d090;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="ctrl">
  <button id="btnFF" title="Fast forward">1x</button>
  <button id="btnMute" title="Mute">🔊</button>
  <button id="btnPause" title="Pause">⏸</button>
</div>
<div id="hint">Click / tap to place boundary towers &middot; P pause &middot; M mute &middot; F fast-forward</div>
<script>
'use strict';

// =========================================================
// Boundary Tower (#14)
// Tower-defense. Waves of social pressures march along a
// winding path. Click empty grid squares to place "boundary"
// towers that slow and drain pressure. Earn currency by
// stopping pressure before it breaches your space.
// Theme: active boundary-setting protects inner peace.
// =========================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W=960, H=540;
const CELL=36;
const COLS=Math.floor(W/CELL);  // 26
const ROWS=Math.floor(H/CELL);  // 15

function seeded(s){let n=s>>>0||1;return()=>{n=(n*1664525+1013904223)>>>0;return n/4294967296;};}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;

// ---- localStorage helpers (private browsing can throw) ----
const LS_KEY='boundaryTower_best_v1';
function loadBest(){
  try{
    const v=window.localStorage&&window.localStorage.getItem(LS_KEY);
    return v?parseInt(v,10)||0:0;
  }catch(e){return 0;}
}
function saveBest(v){
  try{ if(window.localStorage) window.localStorage.setItem(LS_KEY,String(v)); }catch(e){}
}

// ---- hex to rgba helper (fixes range-ring opacity bug) ----
function hexToRgba(hex,alpha){
  let h=hex.replace('#','');
  if(h.length===3) h=h.split('').map(c=>c+c).join('');
  const r=parseInt(h.substr(0,2),16)||0, g=parseInt(h.substr(2,2),16)||0, b=parseInt(h.substr(4,2),16)||0;
  return `rgba(${r},${g},${b},${alpha})`;
}

// ---- Path (tile coords) ----
const PATH=[
  {c:0,r:7},{c:1,r:7},{c:2,r:7},{c:3,r:7},{c:4,r:7},{c:4,r:5},{c:4,r:4},{c:4,r:3},
  {c:5,r:3},{c:6,r:3},{c:7,r:3},{c:8,r:3},{c:9,r:3},{c:10,r:3},{c:11,r:3},{c:11,r:5},
  {c:11,r:6},{c:11,r:7},{c:11,r:8},{c:11,r:9},{c:11,r:10},{c:11,r:11},{c:10,r:11},
  {c:9,r:11},{c:8,r:11},{c:7,r:11},{c:7,r:9},{c:7,r:8},{c:7,r:7},{c:6,r:7},
  {c:13,r:7},{c:14,r:7},{c:15,r:7},{c:15,r:5},{c:15,r:4},{c:15,r:3},{c:16,r:3},
  {c:17,r:3},{c:18,r:3},{c:19,r:3},{c:19,r:5},{c:19,r:6},{c:19,r:7},{c:19,r:9},
  {c:19,r:10},{c:19,r:11},{c:18,r:11},{c:17,r:11},{c:16,r:11},{c:15,r:11},{c:15,r:9},
  {c:15,r:8},{c:15,r:7},
  {c:21,r:7},{c:22,r:7},{c:23,r:7},{c:24,r:7},{c:25,r:7},
];

// Normalize path: remove jumps, build a connected walk
function buildPath(){
  const pts=[];
  for(let i=0;i<PATH.length-1;i++){
    const a=PATH[i],b=PATH[i+1];
    let c=a.c,r=a.r;
    pts.push({c,r});
    while(c!==b.c||r!==b.r){
      if(c<b.c) c++;
      else if(c>b.c) c--;
      else if(r<b.r) r++;
      else if(r>b.r) r--;
      pts.push({c,r});
    }
  }
  pts.push(PATH[PATH.length-1]);
  // deduplicate consecutive
  const out=[];
  for(let i=0;i<pts.length;i++){
    if(i===0||pts[i].c!==out[out.length-1].c||pts[i].r!==out[out.length-1].r) out.push(pts[i]);
  }
  return out;
}
const WALKPATH=buildPath();
const PATHSET=new Set(WALKPATH.map(p=>p.c+','+p.r));

// ---- Pressure types ----
const PRESSURES=[
  {name:'Peer Pressure',hp:60,speed:0.4,reward:10,color:'#c06080',tier:1},
  {name:'Social Clock',hp:120,speed:0.25,reward:18,color:'#c07030',tier:2},
  {name:'Guilt Trip',hp:40,speed:0.65,reward:8,color:'#8040c0',tier:1},
  {name:'Life Script',hp:200,speed:0.15,reward:30,color:'#4060c0',tier:3},
];
// Boss-tier milestone enemy — appears every 5th wave
const BOSS_PRESSURE={name:'Unsolicited Advice',hp:900,speed:0.12,reward:120,color:'#ff5060',tier:5,boss:true};

// ---- Tower types ----
const TOWER_TYPES=[
  {name:'Boundary',letter:'B',cost:50,range:2.5,damage:8,rate:1200,color:'#40d090'},
  {name:'Clarity',letter:'C',cost:80,range:2.0,damage:18,rate:1800,color:'#60a0ff'},
  {name:'Calm',letter:'K',cost:120,range:3.5,damage:6,rate:800,color:'#c0a0ff'},
];
let selectedTower=0;

const game={
  state:'title',time:0,wave:0,lives:10,maxLives:10,gold:100,score:0,best:loadBest(),
  shakeT:0,waveTimer:0,spawning:false,combo:0,comboT:0,muted:false,speedMul:1,
  waveBannerT:0,waveBannerText:'',livesLostThisWave:0,
};
let towers=[],enemies=[],projectiles=[],particles=[],popups=[],rng,enQueue=[];
let selectedPlacedTower=null; // for sell/upgrade panel

function startWave(n){
  game.wave=n; game.spawning=true;
  enQueue=[];
  rng=seeded(n*1337+7);
  // soft cap on enemy count so late waves stay winnable
  const count=Math.min(60, 5+n*3);
  const isMilestone = n>0 && n%5===0;
  // spawn delay tightens slightly with wave but never below a floor
  const spawnGap=Math.max(260, 700-n*12);
  for(let i=0;i<count;i++){
    const type=PRESSURES[Math.min(Math.floor(rng()*Math.min(PRESSURES.length,1+Math.floor(n/2))),PRESSURES.length-1)];
    enQueue.push({delay:i*spawnGap+rng()*200,type});
  }
  if(isMilestone){
    // add one boss near the middle of the wave, scaled gently by wave number
    const scaledBoss=Object.assign({},BOSS_PRESSURE,{
      hp:Math.round(BOSS_PRESSURE.hp*(1+n*0.08)),
      reward:Math.round(BOSS_PRESSURE.reward*(1+n*0.05)),
    });
    enQueue.push({delay:Math.max(0,Math.floor(count/2))*spawnGap+400,type:scaledBoss});
    enQueue.sort((a,b)=>a.delay-b.delay);
  }
  game.waveTimer=0;
  game.livesLostThisWave=0;
  game.waveBannerText=isMilestone?`Wave ${n} — Milestone Pressure incoming`:`Wave ${n} incoming`;
  game.waveBannerT=2000;
}

function resetGame(){
  towers=[]; enemies=[]; projectiles=[]; particles=[]; popups=[];
  game.wave=0; game.lives=10; game.maxLives=10; game.gold=100; game.score=0;
  game.state='playing'; game.time=0; game.spawning=false; game.shakeT=0;
  game.combo=0; game.comboT=0; game.speedMul=1; game.waveBannerT=0;
  selectedTower=0; selectedPlacedTower=null;
  startWave(1);
}

// ---- Audio ----
let actx=null;
function AC(){if(actx)return actx;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return null;actx=new A();}catch(e){actx=null;}return actx;}
function tone(freq,dur,type,vol){
  if(game.muted) return;
  const a=AC();if(!a)return;try{if(a.state==='suspended')a.resume();const o=a.createOscillator(),g=a.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(0.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(vol||0.07,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(dur||0.2));o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+(dur||0.2)+0.02);}catch(e){}
}
const sndPlace=()=>tone(440,0.12,'sine',0.06);
const sndShoot=()=>tone(660,0.08,'sine',0.04);
const sndDie  =()=>tone(280,0.18,'triangle',0.06);
const sndBreach=()=>{tone(200,0.4,'sawtooth',0.07);setTimeout(()=>tone(140,0.5,'sine',0.06),100);};
const sndSell =()=>tone(360,0.12,'square',0.05);
const sndUpgrade=()=>tone(520,0.15,'sine',0.06);

// ---- Place tower ----
function placeTower(col,row){
  if(game.state!=='playing') return;
  const tt=TOWER_TYPES[selectedTower];
  if(game.gold<tt.cost) return;
  if(PATHSET.has(col+','+row)) return;
  if(col<0||col>=COLS||row<0||row>=ROWS) return;
  if(towers.some(t=>t.col===col&&t.row===row)) return;
  towers.push({col,row,type:tt,cooldown:0,x:col*CELL+CELL/2,y:row*CELL+CELL/2,level:1,spent:tt.cost});
  game.gold-=tt.cost;
  sndPlace();
}

function sellTower(t){
  if(!t) return;
  const refund=Math.floor((t.spent||t.type.cost)*0.6);
  game.gold+=refund;
  towers=towers.filter(x=>x!==t);
  selectedPlacedTower=null;
  sndSell();
}

function upgradeTower(t){
  if(!t) return;
  const cost=Math.round(t.type.cost*0.75*t.level);
  if(game.gold<cost) return;
  game.gold-=cost;
  t.spent=(t.spent||t.type.cost)+cost;
  t.level+=1;
  sndUpgrade();
}

function towerStats(t){
  // effective stats scale with level
  const mul=1+(t.level-1)*0.35;
  return {damage:t.type.damage*mul, rate:Math.max(180,t.type.rate*(1-(t.level-1)*0.12)), range:t.type.range};
}

// ---- Spawn / update enemies ----
function spawnEnemy(type){
  const start=WALKPATH[0];
  enemies.push({
    type, hp:type.hp, maxHp:type.hp,
    pathIdx:0, progress:0,
    x:start.c*CELL+CELL/2, y:start.r*CELL+CELL/2,
    dead:false, reached:false, hitFlashT:0,
  });
}

function moveEnemy(e,dt){
  if(e.dead||e.reached) return;
  const spd=e.type.speed*(dt/16);
  e.progress+=spd;
  while(e.progress>=1 && e.pathIdx<WALKPATH.length-1){
    e.progress-=1; e.pathIdx++;
  }
  if(e.pathIdx>=WALKPATH.length-1){
    e.reached=true;
    // scale life loss to enemy tier for weight/consequence
    const loss=Math.max(1,Math.min(3, e.type.tier||1));
    game.lives=Math.max(0,game.lives-loss);
    game.livesLostThisWave+=loss;
    game.combo=0;
    sndBreach();
    game.shakeT=300;
    if(game.lives<=0){
      game.state='gameover';
      if(game.score>game.best){ game.best=game.score; saveBest(game.best); }
    }
    return;
  }
  const cur=WALKPATH[e.pathIdx], nxt=WALKPATH[Math.min(e.pathIdx+1,WALKPATH.length-1)];
  e.x=lerp(cur.c*CELL+CELL/2, nxt.c*CELL+CELL/2, e.progress);
  e.y=lerp(cur.r*CELL+CELL/2, nxt.r*CELL+CELL/2, e.progress);
}

// ---- Towers shoot ----
function towersUpdate(dt){
  for(const t of towers){
    t.cooldown=Math.max(0,t.cooldown-dt);
    if(t.cooldown>0) continue;
    const stats=towerStats(t);
    // find nearest enemy in range
    let best=null, bestDist=stats.range*CELL+1;
    for(const e of enemies){
      if(e.dead||e.reached) continue;
      const dx=e.x-t.x,dy=e.y-t.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<bestDist){bestDist=d;best=e;}
    }
    if(best){
      t.cooldown=Math.max(120,stats.rate);
      projectiles.push({x:t.x,y:t.y,tx:best,damage:stats.damage,color:t.type.color,spd:5});
      sndShoot();
    }
  }
}

function spawnHitParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*2.2;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:400+Math.random()*200,maxLife:600,color});
  }
}

function spawnPopup(x,y,text,color){
  popups.push({x,y,text,color,life:800,maxLife:800});
}

function projUpdate(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    if(p.tx.dead||p.tx.reached){projectiles.splice(i,1);continue;}
    const dx=p.tx.x-p.x,dy=p.tx.y-p.y,d=Math.sqrt(dx*dx+dy*dy)||0.001;
    if(d<6){
      p.tx.hp-=p.damage;
      p.tx.hitFlashT=120;
      if(p.tx.hp<=0&&!p.tx.dead){
        p.tx.dead=true; sndDie();
        game.combo=Math.min(20,game.combo+1);
        game.comboT=1500;
        const comboMul=1+Math.min(1.0, game.combo*0.05); // up to +100% at combo 20
        const gained=Math.round(p.tx.type.reward*comboMul);
        game.gold+=p.tx.type.reward; game.score+=gained;
        spawnHitParticles(p.tx.x,p.tx.y,p.tx.type.color,p.tx.type.boss?18:8);
        spawnPopup(p.tx.x,p.tx.y-10,'+'+gained+(game.combo>1?` x${game.combo}`:''),p.tx.type.color);
      }
      projectiles.splice(i,1);
    } else {
      const spd=p.spd*(dt/16);
      p.x+=dx/d*spd; p.y+=dy/d*spd;
    }
  }
}

function particlesUpdate(dt){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.life-=dt;
    if(pt.life<=0){particles.splice(i,1);continue;}
    pt.x+=pt.vx*(dt/16); pt.y+=pt.vy*(dt/16);
    pt.vx*=0.92; pt.vy*=0.92;
  }
  for(let i=popups.length-1;i>=0;i--){
    const pu=popups[i];
    pu.life-=dt;
    pu.y-=0.03*dt;
    if(pu.life<=0) popups.splice(i,1);
  }
}

function update(dt){
  dt=clamp(dt,0,48);
  const simDt=dt*clamp(game.speedMul,1,3);
  game.time+=dt;
  if(game.shakeT>0) game.shakeT=Math.max(0,game.shakeT-dt);
  if(game.comboT>0){ game.comboT=Math.max(0,game.comboT-dt); if(game.comboT===0) game.combo=0; }
  if(game.waveBannerT>0) game.waveBannerT=Math.max(0,game.waveBannerT-dt);
  particlesUpdate(dt);
  if(game.state!=='playing') return;

  // spawn from queue
  game.waveTimer+=simDt;
  for(let i=enQueue.length-1;i>=0;i--){
    if(game.waveTimer>=enQueue[i].delay){ spawnEnemy(enQueue[i].type); enQueue.splice(i,1); }
  }

  for(const e of enemies){
    if(e.hitFlashT>0) e.hitFlashT=Math.max(0,e.hitFlashT-simDt);
    moveEnemy(e,simDt);
  }
  enemies=enemies.filter(e=>!e.dead&&!e.reached);
  towersUpdate(simDt);
  projUpdate(simDt);

  if(enQueue.length===0&&enemies.length===0&&game.spawning){
    game.spawning=false;
    // wave-clear bonus, scaled by how clean the wave was
    const clearBonus=Math.round((20+game.wave*4)*(game.livesLostThisWave===0?1.5:1));
    game.score+=clearBonus;
    spawnPopup(W/2,H/2-40,`Wave clear +${clearBonus}`,'#8affd2');
    // next wave auto-starts after short pause
    setTimeout(()=>{ if(game.state==='playing') startWave(game.wave+1); },2000);
  }
}

// ---- Draw ----
function lgrad(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);for(const s of stops)g.addColorStop(s[0],s[1]);return g;}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawBackground(){
  ctx.fillStyle='#08100e'; ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(60,120,80,.09)'; ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();}
}

function drawPath(){
  ctx.fillStyle='rgba(140,100,60,.22)';
  for(const p of WALKPATH){
    ctx.fillRect(p.c*CELL+1,p.r*CELL+1,CELL-2,CELL-2);
  }
  // arrows
  ctx.fillStyle='rgba(200,160,100,.35)';
  for(let i=1;i<WALKPATH.length-1;i+=4){
    const a=WALKPATH[i],b=WALKPATH[Math.min(i+1,WALKPATH.length-1)];
    const dx=b.c-a.c,dy=b.r-a.r;
    const ax=a.c*CELL+CELL/2,ay=a.r*CELL+CELL/2;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(Math.atan2(dy,dx));
    ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(-4,-4);ctx.lineTo(-4,4);ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

function drawTowers(){
  for(const t of towers){
    const px=t.col*CELL,py=t.row*CELL;
    const isSel=t===selectedPlacedTower;
    ctx.fillStyle='rgba(20,40,30,.9)';
    rr(px+3,py+3,CELL-6,CELL-6,6); ctx.fill();
    ctx.strokeStyle=t.type.color; ctx.lineWidth=isSel?2.5:1.5;
    rr(px+3,py+3,CELL-6,CELL-6,6); ctx.stroke();
    if(isSel){
      ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
      rr(px+1,py+1,CELL-2,CELL-2,7); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.fillStyle=t.type.color;
    ctx.font=`bold ${Math.floor(CELL*0.38)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🛡',px+CELL/2,py+CELL/2-3);
    // per-type letter for colorblind-safe differentiation
    ctx.fillStyle='#08100e';
    ctx.font=`bold 8px Arial`;
    ctx.fillText(t.type.letter,px+CELL/2,py+CELL-8);
    if(t.level>1){
      ctx.fillStyle='#ffd580';ctx.font='bold 8px Arial';ctx.textAlign='right';
      ctx.fillText('L'+t.level,px+CELL-4,py+6);
      ctx.textAlign='center';
    }
    // range ring (faint) — proper hex-to-rgba conversion fixes opacity bug
    ctx.strokeStyle=hexToRgba(t.type.color,0.08);
    ctx.lineWidth=1;
    const rng=towerStats(t).range;
    ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,rng*CELL,0,Math.PI*2);ctx.stroke();
  }
}

function drawEnemies(){
  for(const e of enemies){
    const r=e.type.boss?18:12;
    ctx.fillStyle=e.hitFlashT>0?'#ffffff':e.type.color;
    ctx.beginPath();ctx.arc(e.x,e.y,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=e.type.boss?'rgba(255,80,96,.8)':'rgba(255,255,255,.3)';ctx.lineWidth=e.type.boss?2:1;
    ctx.beginPath();ctx.arc(e.x,e.y,r,0,Math.PI*2);ctx.stroke();
    // hp bar
    const bw=e.type.boss?40:28,bh=4,bx=e.x-bw/2,by=e.y-r-8;
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=e.type.color;
    ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
    // label
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font=e.type.boss?'8px Arial':'7px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(e.type.name.split(' ')[0],e.x,e.y);
  }
}

function drawProjectiles(){
  for(const p of projectiles){
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawParticlesAndPopups(){
  for(const pt of particles){
    const a=Math.max(0,pt.life/pt.maxLife);
    ctx.fillStyle=hexToRgba(pt.color,a);
    ctx.beginPath();ctx.arc(pt.x,pt.y,2.2*a+0.5,0,Math.PI*2);ctx.fill();
  }
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const pu of popups){
    const a=Math.max(0,pu.life/pu.maxLife);
    ctx.fillStyle=hexToRgba(pu.color||'#ffffff',a);
    ctx.font='bold 12px Arial';
    ctx.fillText(pu.text,pu.x,pu.y);
  }
}

function drawHUD(){
  ctx.save();
  // top bar
  ctx.fillStyle='rgba(4,12,8,.85)';rr(0,0,W,48,0);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(0,47,W,1);
  ctx.textBaseline='top';
  // lives — pulse red when low
  const lowLives=game.lives<=2;
  const pulse=lowLives?0.6+0.4*Math.sin(game.time*0.012):1;
  ctx.textAlign='left';
  ctx.fillStyle=lowLives?`rgba(255,${Math.floor(60*pulse)},${Math.floor(60*pulse)},1)`:'#ff8080';
  ctx.font='bold 13px Arial';
  ctx.fillText('♥ '+game.lives,18,8);
  ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText(`Wave ${game.wave}`,18,28);
  // gold
  ctx.textAlign='center';ctx.fillStyle='#ffd580';ctx.font='bold 16px Arial';
  ctx.fillText('⬡ '+game.gold,W/2,14);
  if(game.combo>1){
    ctx.fillStyle='#ff9040';ctx.font='bold 11px Arial';
    ctx.fillText('Combo x'+game.combo,W/2,33);
  }
  // score + best
  ctx.textAlign='right';ctx.fillStyle='rgba(234,242,246,.5)';ctx.font='11px Arial';
  ctx.fillText('SCORE',W-18,8);
  ctx.fillStyle='#8affd2';ctx.font='bold 20px Arial';
  ctx.fillText(game.score,W-18,22);
  ctx.fillStyle='rgba(255,213,128,.6)';ctx.font='10px Arial';
  ctx.fillText('Best '+game.best,W-18,40);

  // low-lives pulsing border
  if(lowLives){
    ctx.strokeStyle=`rgba(255,60,60,${0.25*pulse})`;
    ctx.lineWidth=10;
    ctx.strokeRect(5,5,W-10,H-10);
  }

  // wave banner
  if(game.waveBannerT>0){
    const a=Math.min(1,game.waveBannerT/2000)*Math.min(1,(2000-game.waveBannerT)/200+0.3);
    ctx.textAlign='center';
    ctx.fillStyle=`rgba(4,12,8,${0.7*Math.min(1,game.waveBannerT/300+0.3)})`;
    rr(W/2-160,58,320,28,8);ctx.fill();
    ctx.fillStyle=`rgba(138,255,210,${Math.min(1,game.waveBannerT/300+0.3)})`;
    ctx.font='bold 13px Arial';
    ctx.fillText(game.waveBannerText,W/2,72);
  }

  // tower selector (bottom bar)
  ctx.fillStyle='rgba(4,12,8,.9)';rr(0,H-50,W,50,0);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(0,H-51,W,1);
  TOWER_TYPES.forEach((tt,i)=>{
    const bx=W/2+(i-1)*140,by=H-44,bw=120,bh=36;
    const sel=i===selectedTower;
    ctx.fillStyle=sel?'rgba(64,200,144,.25)':'rgba(20,40,30,.8)';
    rr(bx-bw/2,by,bw,bh,8);ctx.fill();
    ctx.strokeStyle=sel?tt.color:'rgba(255,255,255,.15)';ctx.lineWidth=sel?2:1;
    rr(bx-bw/2,by,bw,bh,8);ctx.stroke();
    if(sel){
      // extra checkmark cue beyond color, for colorblind accessibility
      ctx.fillStyle=tt.color;
      ctx.font='bold 12px Arial';ctx.textAlign='left';
      ctx.fillText('✓',bx-bw/2+6,by+bh/2-6);
      ctx.textAlign='center';
    }
    ctx.fillStyle=tt.color;ctx.font=`bold 11px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`${tt.letter} ${tt.name} ⬡${tt.cost}`,bx,by+bh/2);
  });

  // sell/upgrade mini-panel for selected placed tower
  if(selectedPlacedTower && towers.includes(selectedPlacedTower)){
    const t=selectedPlacedTower;
    const pw=180,ph=64,px2=clamp(t.x-pw/2,4,W-pw-4),py2=clamp(t.y-ph-14,52,H-108);
    ctx.fillStyle='rgba(4,12,8,.94)';rr(px2,py2,pw,ph,10);ctx.fill();
    ctx.strokeStyle=t.type.color;ctx.lineWidth=1.5;rr(px2,py2,pw,ph,10);ctx.stroke();
    ctx.fillStyle='#eaf2f6';ctx.font='bold 11px Arial';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(`${t.type.name} · Lv${t.level}`,px2+8,py2+6);
    const upCost=Math.round(t.type.cost*0.75*t.level);
    const refund=Math.floor((t.spent||t.type.cost)*0.6);
    ctx.font='10px Arial';ctx.fillStyle='rgba(234,242,246,.7)';
    ctx.fillText(`Upgrade ⬡${upCost}`,px2+8,py2+24);
    ctx.fillText(`Sell for ⬡${refund}`,px2+8,py2+40);
    ctx.fillStyle='rgba(234,242,246,.4)';ctx.font='9px Arial';
    ctx.fillText('Tap again to close',px2+8,py2+54);
  }
  ctx.restore();
}

function vignette(){ctx.fillStyle=`rgba(0,0,0,${Math.max(0,(game.shakeT/300)*0.3)})`;ctx.fillRect(0,0,W,H);}

function panelDraw(title,lines){
  ctx.save();ctx.fillStyle='rgba(4,10,7,.75)';ctx.fillRect(0,0,W,H);
  const pw=540,ph=320,px=(W-pw)/2,py=(H-ph)/2;
  ctx.fillStyle=lgrad(px,py,px,py+ph,[[0,'rgba(10,24,16,.98)'],[1,'rgba(6,14,10,.98)']]);
  rr(px,py,pw,ph,22);ctx.fill();
  ctx.strokeStyle='rgba(64,200,144,.25)';ctx.lineWidth=1.5;
  rr(px+.5,py+.5,pw-1,ph-1,22);ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle='#40d090';ctx.font='bold 36px Arial';
  ctx.fillText(title,W/2,py+66);
  ctx.fillStyle='rgba(234,242,246,.88)';ctx.font='15px Arial';
  let ly=py+104;
  for(const l of lines){ctx.fillText(l,W/2,ly);ly+=26;}
  ctx.restore();
}

function draw(){
  try{
    ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,W,H);
    let dx=0,dy=0;
    if(game.shakeT>0){const m=game.shakeT/300*4;dx=Math.sin(game.time*.07)*m;dy=Math.cos(game.time*.09)*m;}
    ctx.save();ctx.translate(dx,dy);
    drawBackground();drawPath();drawTowers();drawEnemies();drawProjectiles();drawParticlesAndPopups();
    vignette();
    if(game.state==='playing'||game.state==='paused')drawHUD();
    if(game.state==='title'){
      panelDraw('Boundary Tower',[
        'Pressure waves march along the path.',
        'Click empty squares to place boundary towers.',
        'Stop pressures before they breach your space.',
        `Best score: ${game.best}`,
        '','1 — Boundary  ·  2 — Clarity  ·  3 — Calm',
        '','Click / tap to begin.']);
    } else if(game.state==='paused'){
      panelDraw('Paused',['Breathe.','','Press P or tap ⏸ to continue.']);
    } else if(game.state==='gameover'){
      const isNewBest=game.score>=game.best&&game.score>0;
      panelDraw('Breached',[
        `Wave ${game.wave}  ·  Score: ${game.score}`,
        isNewBest?'New best score!':`Best: ${game.best}`,
        '','Boundaries take time to build and rebuild.','','Click / tap to try again.']);
    }
    ctx.restore();
  }catch(e){}
}

// ---- Input ----
function pointerDown(e){
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  let px,py;
  if(e.touches){px=(e.touches[0].clientX-rect.left)*sx;py=(e.touches[0].clientY-rect.top)*sy;}
  else{px=(e.clientX-rect.left)*sx;py=(e.clientY-rect.top)*sy;}
  const a2=AC();if(a2&&a2.state==='suspended'){try{a2.resume();}catch(ex){}}
  if(game.state==='title'){resetGame();return;}
  if(game.state==='gameover'){resetGame();return;}
  if(game.state!=='playing') return;

  // check tower type selector first — short-circuit properly (bug fix: forEach+return doesn't exit function)
  for(let i=0;i<TOWER_TYPES.length;i++){
    const bx=W/2+(i-1)*140,by=H-44,bw=120,bh=36;
    if(px>=bx-bw/2&&px<=bx+bw/2&&py>=by&&py<=by+bh){ selectedTower=i; selectedPlacedTower=null; return; }
  }

  // check tap on an already-placed tower (toggle sell/upgrade panel)
  if(py>48&&py<H-50){
    const col=Math.floor(px/CELL),row=Math.floor(py/CELL);
    const hitTower=towers.find(t=>t.col===col&&t.row===row);
    if(hitTower){
      selectedPlacedTower = selectedPlacedTower===hitTower ? null : hitTower;
      return;
    }
    // if a sell/upgrade panel is open and tap lands in it, don't also place
    if(selectedPlacedTower){ selectedPlacedTower=null; return; }
    placeTower(col,row);
  }
}
canvas.addEventListener('mousedown',e=>{e.preventDefault();pointerDown(e);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown(e);},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='KeyP'){e.preventDefault();togglePause();}
  if(e.code==='KeyM'){e.preventDefault();toggleMute();}
  if(e.code==='KeyF'){e.preventDefault();toggleSpeed();}
  if(e.code==='Digit1')selectedTower=0;
  if(e.code==='Digit2')selectedTower=1;
  if(e.code==='Digit3')selectedTower=2;
  if(e.code==='KeyU'&&selectedPlacedTower) upgradeTower(selectedPlacedTower);
  if(e.code==='KeyX'&&selectedPlacedTower) sellTower(selectedPlacedTower);
  if((e.code==='Enter'||e.code==='Space')&&(game.state==='title'||game.state==='gameover')){e.preventDefault();resetGame();}
});

// ---- On-screen mobile controls ----
function togglePause(){
  if(game.state==='playing') game.state='paused';
  else if(game.state==='paused') game.state='playing';
  const b=document.getElementById('btnPause');
  if(b) b.textContent=game.state==='paused'?'▶':'⏸';
}
function toggleMute(){
  game.muted=!game.muted;
  const b=document.getElementById('btnMute');
  if(b){ b.textContent=game.muted?'🔇':'🔊'; b.setAttribute('data-active',game.muted?'1':'0'); }
}
function toggleSpeed(){
  game.speedMul = game.speedMul>=2 ? 1 : game.speedMul+1;
  const b=document.getElementById('btnFF');
  if(b) b.textContent=game.speedMul+'x';
}
(function wireButtons(){
  const bp=document.getElementById('btnPause');
  const bm=document.getElementById('btnMute');
  const bf=document.getElementById('btnFF');
  if(bp) bp.addEventListener('click',e=>{e.preventDefault();togglePause();});
  if(bm) bm.addEventListener('click',e=>{e.preventDefault();toggleMute();});
  if(bf) bf.addEventListener('click',e=>{e.preventDefault();toggleSpeed();});
})();

let last=0;
function loop(ts){if(!last)last=ts;const dt=ts-last;last=ts;if(game.state==='playing')update(dt);else game.time+=dt;draw();requestAnimationFrame(loop);}
game.state='title';draw();requestAnimationFrame(loop);

window.__cfq={
  get game(){return game;},get towers(){return towers;},get enemies(){return enemies;},
  get particles(){return particles;},get popups(){return popups;},
  resetGame,startWave,placeTower,sellTower,upgradeTower,update,draw,
  togglePause,toggleMute,toggleSpeed,
  WALKPATH,PATHSET,TOWER_TYPES,PRESSURES,BOSS_PRESSURE,
};
</script>
